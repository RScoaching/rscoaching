<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RS Coaching — Program Builder</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23FF6830'/><text x='16' y='23' font-family='Arial Black,sans-serif' font-size='18' font-weight='900' fill='white' text-anchor='middle'>RS</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   RS.COACHING — PROGRAM BUILDER — v4
   Dark Soft · Warm · Human · Orange brand
   ═══════════════════════════════════════════ */
:root{
  --bg:#060610;
  --sb:rgba(6,6,10,.82);
  --surface:rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.06);
  --surface3:rgba(255,255,255,0.09);
  --content:#07070F;
  --card:rgba(255,255,255,0.04);--card2:rgba(255,255,255,0.06);--card3:rgba(255,255,255,0.09);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.20);
  --blue:#6366F1;--teal:#06D6A0;--amber:#F59E0B;--red:#EF4444;
  --green:#22C55E;--purple:#818CF8;--orange:#8B5CF6;--orange2:#A78BFA;--violet:#7C3AED;--violet2:#818CF8;--shadow-v:0 4px 14px rgba(99,102,241,.3);
  --emerald:#06D6A0;--cyan:#22D3EE;--gold:#FFB020;--pink:#F472B6;
  --white:#EEF0FF;--muted:#64748B;--text:#94A3B8;
  --grad-o:linear-gradient(135deg,#8B5CF6,#6D28D9);
  --grad-v:linear-gradient(135deg,#6366F1,#4F46E5);
  --shadow-sm:0 1px 4px rgba(0,0,0,.5);
  --shadow-md:0 8px 28px rgba(0,0,0,.55);
  --shadow-card:0 8px 28px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.07);
  --shadow-btn:0 4px 20px rgba(255,104,48,.4);
  --r:12px;--r-sm:8px;--r-xs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 5% 0%,rgba(139,92,246,.10) 0%,transparent 50%),
    radial-gradient(ellipse 55% 45% at 95% 100%,rgba(124,58,237,.10) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes dp{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}

/* ── Main layout ── */
.main{flex:1;display:flex;overflow:hidden;position:relative;z-index:1;}

/* ── LEFT PANEL — Program browser ── */
.left-panel{
  width:290px;
  background:rgba(8,6,16,.90);
  border-right:1px solid rgba(255,255,255,.07);
  display:flex;flex-direction:column;
  height:100vh;position:sticky;top:0;
  flex-shrink:0;overflow-y:auto;
  z-index:5;
}

/* Panel header */
.panel-head{
  padding:18px 16px 14px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.panel-head-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.panel-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;letter-spacing:1.5px;
  color:var(--white);
}
.panel-sub{font-size:11px;color:var(--muted);margin-top:1px;}

/* Filter bar */
.filter-bar{
  padding:12px 14px 10px;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,.15);
  display:flex;flex-direction:column;gap:8px;flex-shrink:0;
}
.filter-row{display:flex;gap:6px;align-items:center;}
.filter-inp{
  flex:1;padding:7px 10px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:8px;
  font-family:'Inter',sans-serif;font-size:12px;color:var(--white);
}
.filter-inp:focus{outline:none;border-color:rgba(255,104,48,.4);}
.filter-inp::placeholder{color:var(--muted);}
.filter-sel{
  flex:1;padding:7px 10px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:8px;
  font-family:'Inter',sans-serif;font-size:12px;color:var(--white);
  -webkit-appearance:none;cursor:pointer;
}
.filter-sel:focus{outline:none;border-color:rgba(255,104,48,.4);}
.filter-sel option{background:rgba(255,255,255,.05);}
.filter-status-tabs{display:flex;gap:4px;}
.fst{
  padding:5px 11px;border-radius:7px;
  font-size:10px;font-weight:700;cursor:pointer;
  border:1px solid var(--border);color:var(--muted);
  background:transparent;transition:all .15s;letter-spacing:.3px;
}
.fst.active{
  background:rgba(139,92,246,.10);
  border-color:rgba(255,104,48,.35);
  color:var(--orange);
}
.fst.arch.active{background:rgba(100,116,139,.12);border-color:rgba(100,116,139,.3);color:#94a3b8;}

/* Program list items */
#prog-list{overflow-y:auto;flex:1;}
.prog-item{
  padding:13px 16px 12px;
  cursor:pointer;transition:all .18s;
  border-bottom:1px solid var(--border);
  border-left:3px solid transparent;
  position:relative;
}
.prog-item::before{
  content:'';
  position:absolute;inset:0;
  background:rgba(255,104,48,0);
  transition:background .18s;
  pointer-events:none;
}
.prog-item:hover::before{background:rgba(255,104,48,.03);}
.prog-item.active{
  background:rgba(255,104,48,.06);
  border-left-color:var(--orange);
}
.prog-item.archived{opacity:.5;}
.prog-name{font-weight:600;font-size:13px;color:var(--white);margin-bottom:3px;display:flex;align-items:center;gap:6px;letter-spacing:.2px;}
.prog-meta{font-size:11px;color:var(--muted);}
.prog-sport{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;display:inline-block;margin-top:4px;letter-spacing:.4px;}
.sport-calcio{background:rgba(139,92,246,.09);color:var(--orange);}
.sport-hybrid{background:rgba(245,158,11,.1);color:var(--amber);}
.sport-forza{background:rgba(99,102,241,.10);color:var(--purple);}
.sport-corsa{background:rgba(99,102,241,.1);color:var(--blue);}
.sport-conditioning{background:rgba(255,104,48,.1);color:var(--orange);}
.prog-archived-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:rgba(100,116,139,.15);color:#94a3b8;letter-spacing:.4px;}
.prog-cat-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:rgba(99,102,241,.12);color:var(--blue);letter-spacing:.4px;}

/* ── BUTTONS ── */
.btn{
  padding:8px 15px;border-radius:10px;
  font-family:'Inter',sans-serif;
  font-size:12px;font-weight:600;
  cursor:pointer;transition:all .18s;
  display:inline-flex;align-items:center;gap:5px;
  border:none;letter-spacing:.2px;
}
.btn-teal{
  background:var(--grad-o);
  color:#fff;
  box-shadow:var(--shadow-btn);
}
.btn-teal:hover{opacity:.9;transform:translateY(-1px);}
.btn-outline{
  background:rgba(255,255,255,.05);
  color:var(--text);
  border:1px solid var(--border2);
}
.btn-outline:hover{border-color:var(--orange);color:var(--orange);background:rgba(255,104,48,.06);}
.btn-purple{background:rgba(99,102,241,.10);color:var(--purple);border:1px solid rgba(99,102,241,.25);}
.btn-red{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.btn-blue{background:rgba(99,102,241,.1);color:var(--blue);border:1px solid rgba(99,102,241,.2);}
.btn-amber{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2);}
.btn-green{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:8px;}

/* ── RIGHT PANEL — Editor canvas ── */
.right-panel{
  flex:1;
  background:var(--content);
  overflow-y:auto;height:100vh;
  position:relative;
}

.rp-inner{padding:28px 30px;}
.rp-head{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:24px;gap:14px;flex-wrap:wrap;
  animation:fadeUp .3s ease both;
}
.rp-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:30px;letter-spacing:1.5px;
  color:var(--white);
}
.rp-sub{font-size:12px;color:var(--muted);margin-top:3px;letter-spacing:.2px;}
.rp-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}

/* ── WEEK TABS ── */
.week-tabs-wrap{
  display:flex;align-items:center;gap:8px;
  margin-bottom:22px;
  animation:fadeUp .3s .05s ease both;
}
.week-tabs{
  display:flex;gap:5px;
  overflow-x:auto;padding-bottom:2px;
  flex:1;
  scrollbar-width:none;
}
.week-tabs::-webkit-scrollbar{display:none;}
.week-tab{
  flex-shrink:0;
  padding:7px 16px;
  border-radius:50px;
  font-size:12px;font-weight:600;
  cursor:pointer;
  border:1px solid var(--border);
  color:var(--muted);
  background:rgba(255,255,255,.03);
  transition:all .18s;white-space:nowrap;
  letter-spacing:.3px;
}
.week-tab:hover{border-color:rgba(255,104,48,.3);color:var(--orange2);}
.week-tab.active{
  background:rgba(139,92,246,.10);
  border-color:rgba(255,104,48,.45);
  color:var(--orange);
  box-shadow:0 2px 12px rgba(255,104,48,.2);
}
.week-tab.deload{
  background:rgba(34,197,94,.05);
  border-color:rgba(34,197,94,.2);
  color:var(--green);
}
.week-tab.deload.active{
  background:rgba(34,197,94,.12);
  border-color:rgba(34,197,94,.4);
  box-shadow:0 2px 10px rgba(34,197,94,.15);
}
.add-week-btn{
  flex-shrink:0;
  padding:7px 13px;border-radius:50px;
  font-size:11px;font-weight:600;
  cursor:pointer;
  border:1px dashed var(--border);
  color:var(--muted);background:transparent;
  transition:all .18s;white-space:nowrap;
}
.add-week-btn:hover{border-color:var(--orange);color:var(--orange);}

/* ── SESSION CARDS — vertical layout ── */
.sessions-grid{
  display:flex;flex-direction:column;gap:10px;
  margin-bottom:18px;
}
.sess-card{
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  box-shadow:var(--shadow-card);
  transition:border-color .18s,box-shadow .18s;
  animation:fadeUp .25s ease both;
}
.sess-card:hover{
  border-color:var(--border2);
  box-shadow:var(--shadow-md);
}
.sess-card-head{
  padding:14px 18px;
  display:flex;align-items:center;gap:12px;
  cursor:pointer;
  position:relative;
}
.sess-type-icon{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.si-pesi{background:rgba(168,85,247,.15);box-shadow:0 2px 8px rgba(168,85,247,.15);}
.si-campo{background:rgba(139,92,246,.09);box-shadow:0 2px 8px rgba(139,92,246,.09);}
.si-sprint{background:rgba(239,68,68,.12);box-shadow:0 2px 8px rgba(239,68,68,.12);}
.si-conditioning{background:rgba(245,158,11,.12);box-shadow:0 2px 8px rgba(245,158,11,.12);}
.si-recupero{background:rgba(34,197,94,.1);box-shadow:0 2px 8px rgba(34,197,94,.08);}
.si-corsa{background:rgba(16,185,129,.12);box-shadow:0 2px 8px rgba(16,185,129,.08);}
.sess-info{flex:1;}
.sess-name{font-weight:600;font-size:14px;color:var(--white);letter-spacing:.2px;}
.sess-type-lbl{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-top:2px;}
.sess-chevron{
  width:24px;height:24px;border-radius:50%;
  background:rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--muted);
  transition:transform .2s,background .18s;
  flex-shrink:0;
}
.sess-card.open .sess-chevron{transform:rotate(180deg);background:rgba(255,104,48,.1);color:var(--orange);}
.sess-actions-bar{display:flex;gap:5px;align-items:center;flex-shrink:0;}
.sess-body{
  padding:14px 18px 18px;
  border-top:1px solid var(--border);
  display:none;
  background:rgba(0,0,0,.12);
}

/* ── EXERCISE BLOCKS ── */
.ex-block{
  background:rgba(255,255,255,.06);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  margin-bottom:7px;
  overflow:hidden;
  transition:border-color .15s;
}
.ex-block:hover{border-color:var(--border2);}
.ex-block-head{
  padding:10px 14px;
  display:flex;align-items:flex-start;gap:10px;
  cursor:default;
}
.ex-num{
  width:22px;height:22px;border-radius:50%;
  background:rgba(139,92,246,.25);
  color:#c4b5fd;
  font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.ex-info{flex:1;}
.ex-name{font-weight:600;font-size:13px;color:var(--white);letter-spacing:.2px;}
.ex-params{font-size:11px;color:var(--white);margin-top:2px;opacity:.85;}
.ex-cue{font-size:10px;color:rgba(245,158,11,.75);margin-top:3px;font-style:italic;}
.ex-block-body{padding:0 14px 10px;display:none;}
.ex-block-body.open{display:block;}

/* Complex groups */
.complex-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:rgba(255,104,48,.15);color:var(--orange);margin-left:5px;}
.complex-group{
  border:1px solid rgba(255,104,48,.18);
  border-radius:var(--r-sm);
  padding:10px;margin-bottom:8px;
  background:rgba(255,104,48,.03);
}
.complex-label{font-size:9px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}

/* Drag-to-reorder */
.ex-block[draggable="true"],.complex-group[draggable="true"]{cursor:grab;}
.ex-block[draggable="true"]:active,.complex-group[draggable="true"]:active{cursor:grabbing;}
.ex-drag-handle{display:none;}
.ex-block.drag-over,.complex-group.drag-over{border-color:rgba(139,92,246,.6)!important;background:rgba(139,92,246,.06)!important;}
.ex-block.dragging,.complex-group.dragging{opacity:.35;}

/* Add buttons row */
.add-row{display:flex;gap:6px;flex-wrap:wrap;padding-top:8px;}

/* ── FORM FIELDS ── */
.field{margin-bottom:13px;}
.field label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:6px;}
.field input,.field select,.field textarea{
  width:100%;padding:10px 12px;
  background:rgba(255,255,255,.06);
  border:1px solid var(--border2);border-radius:10px;
  font-family:'Inter',sans-serif;font-size:13px;
  color:#E2E8F0;-webkit-text-fill-color:#E2E8F0;
  -webkit-appearance:none;transition:border-color .2s;
}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:rgba(139,92,246,.4);
  background:var(--surface3);
}
.field select option{background:rgba(255,255,255,.06);}
.field textarea{color:#E2E8F0;-webkit-text-fill-color:#E2E8F0;}
.field textarea{resize:vertical;min-height:68px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;}

/* ── SET TYPE badges ── */
.st-badge{display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;padding:2px 5px;border-radius:4px;letter-spacing:.5px;margin-right:4px;flex-shrink:0;}
.st-w{background:rgba(148,163,184,.15);color:#94a3b8;}
.st-bo{background:rgba(245,158,11,.15);color:#f59e0b;}
.st-d{background:rgba(239,100,68,.15);color:#ef6444;}
.st-f{background:rgba(239,68,68,.15);color:#ef4444;}
.st-work{background:rgba(139,92,246,.10);color:var(--orange);}

/* SET ROWS table */
.set-rows-table{width:100%;border-collapse:collapse;}
.set-rows-table th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:5px 6px;text-align:left;}
.set-rows-table td{padding:3px 4px;vertical-align:middle;}
.set-rows-table .sr-type{width:90px;}
.set-rows-table .sr-sets{width:62px;}
.set-rows-table .sr-reps{width:auto;}
.set-rows-table .sr-rm{width:26px;}
.sr-inp{
  width:100%;padding:6px 8px;
  background:var(--surface3);
  border:1px solid var(--border2);border-radius:7px;
  font-family:'Inter',sans-serif;font-size:13px;
  color:#fff;
  -webkit-text-fill-color:#fff;
}
/* Colonna SERIE: centrato e leggibile come gli altri */
.sr-sets .sr-inp{
  text-align:center;
  font-weight:600;
}
.sr-inp:focus{outline:none;border-color:rgba(139,92,246,.6);background:rgba(139,92,246,.22);}
.sr-inp option{background:rgba(255,255,255,.08);}
.sr-rm-btn{background:none;border:none;color:rgba(255,255,255,.2);cursor:pointer;font-size:18px;line-height:1;padding:0 2px;}
.sr-rm-btn:hover{color:var(--red);}
.add-sr-btn{
  margin-top:7px;font-size:11px;padding:6px 14px;
  background:rgba(255,255,255,.04);
  border:1px dashed var(--border);border-radius:8px;
  color:var(--muted);cursor:pointer;width:100%;text-align:left;
}
.add-sr-btn:hover{border-color:var(--orange);color:var(--orange);}

/* ── BULK UPDATE BAR ── */
.bulk-bar{
  display:none;flex-wrap:wrap;align-items:center;gap:8px;
  padding:8px 10px;margin-bottom:10px;
  background:rgba(139,92,246,.08);
  border:1px solid rgba(139,92,246,.22);
  border-radius:10px;
}
.bulk-bar label{font-size:11px;color:var(--muted);margin-right:2px;}
.bulk-bar .bulk-inp{
  width:64px;padding:5px 7px;
  background:var(--surface3);border:1px solid var(--border2);border-radius:7px;
  font-size:12px;color:#fff;font-family:'Inter',sans-serif;
}
.ex-block.bulk-mode{padding-left:36px;position:relative;}
/* ── MODAL / OVERLAY ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.75);
  z-index:1000;display:none;
  align-items:flex-start;justify-content:center;
  padding:32px 20px;overflow-y:auto;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.overlay.open{display:flex;animation:fadeIn .2s ease;}
.modal{
  background:rgba(255,255,255,.05);
  border:1px solid var(--border2);
  border-radius:14px;padding:26px;
  width:100%;max-width:580px;
  box-shadow:0 24px 60px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.06);
}
.modal h3{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:1.5px;
  color:var(--white);margin-bottom:16px;
}
.mactions{display:flex;gap:8px;margin-top:16px;}
.mactions .btn{flex:1;justify-content:center;}

/* Assign chips */
.athlete-chip{
  display:flex;align-items:center;gap:9px;
  padding:9px 12px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);border-radius:10px;
  cursor:pointer;transition:all .18s;margin-bottom:6px;
}
.athlete-chip:hover{border-color:var(--orange);background:rgba(255,104,48,.04);}
.athlete-chip.sel{background:rgba(139,92,246,.07);border-color:rgba(255,104,48,.3);}
.ac-av{width:28px;height:28px;border-radius:50%;background:rgba(139,92,246,.09);border:1px solid rgba(255,104,48,.22);color:var(--orange);font-family:'Bebas Neue',sans-serif;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ac-name{font-size:13px;font-weight:600;color:var(--white);flex:1;}
.ac-meta{font-size:11px;color:var(--muted);}

/* ── EMPTY STATES ── */
.empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.6;}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--white);margin-bottom:6px;letter-spacing:.5px;}
.empty-sub{font-size:13px;line-height:1.6;}

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;
  background:#07070F;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:24px;z-index:999;

.logo-big{font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:4px;color:var(--white);}
.logo-big span{color:var(--orange);}
.dots{display:flex;gap:9px;}
.dots i{width:8px;height:8px;border-radius:50%;background:var(--primary);opacity:.2;animation:dp 1.2s ease-in-out infinite;}
.dots i:nth-child(2){animation-delay:.2s;}.dots i:nth-child(3){animation-delay:.4s;}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(100px);
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,104,48,.3);
  color:var(--orange);
  padding:11px 22px;border-radius:50px;
  font-size:13px;font-weight:600;
  box-shadow:0 8px 32px rgba(0,0,0,.7);
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  z-index:9999;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0);}

/* Section labels */

.week-ctrl-left{flex:1;}
.week-ctrl-title{font-size:16px;font-weight:700;color:var(--white);letter-spacing:.3px;}
.week-ctrl-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.week-ctrl-actions{display:flex;gap:6px;}

.tmpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.tmpl-card{

// Restituisce categorie DB filtrate per progType × sessType
function _getBldExCats(progType, sessType){
  const pt=PROG_TYPES[progType]||PROG_TYPES.sc;
  const allowed=new Set(pt.cats);
  // Ulteriore filtro per tipo sessione
  const sessCatMap={
    pesi:        ['forza','olimpico','pliometria','mobilita'],
    sprint:      ['velocita_sprint','velocita_prep','priming'],
    corsa:       ['resistenza','condizionamento'],
    conditioning:['condizionamento','resistenza','olimpico','pliometria'],
    recupero:    ['recupero','mobilita']
  };
  const sessCats=sessCatMap[sessType]||null;
  if(!sessCats) return pt.cats; // nessun filtro extra
  return sessCats.filter(c=>allowed.has(c));
}

function _getBldExNames(progType, sessType, group, muscle, equip){
  const cats=new Set(_getBldExCats(progType, sessType));
  const db=window.EXERCISES_DB||[];
  const seen=new Set();
  const names=[];
  db.forEach(function(e){
    if(!cats.has(e.cat)) return;
    if(group && (e.group||'')!==group) return;
    if(muscle && !(e.muscles && e.muscles.indexOf(muscle)>=0)) return;
    if(equip && (e.equip||'')!==equip) return;
    if(seen.has(e.name)) return;
    seen.add(e.name); names.push(e.name);
  });
  return names.sort(function(a,b){return a.localeCompare(b,'it');});
}
// Returns sorted list of groups available for given prog/sess type
function _getBldExGroups(progType, sessType){
  const cats=new Set(_getBldExCats(progType, sessType));
  const db=window.EXERCISES_DB||[];
  const gs=new Set();
  db.forEach(e=>{if(cats.has(e.cat)&&e.group)gs.add(e.group);});
  return [...gs].sort((a,b)=>a.localeCompare(b,'it'));
}
// Returns sorted [value,label] list of a tag facet ('muscles'|'equip') available for prog/sess type
function _getBldExFacet(progType, sessType, facet){
  const cats=new Set(_getBldExCats(progType, sessType));
  const db=window.EXERCISES_DB||[];
  const L=(window.EX_TAG_LABELS||{})[facet]||{};
  const set=new Set();
  db.forEach(e=>{
    if(!cats.has(e.cat)) return;
    if(facet==='muscles'){ (e.muscles||[]).forEach(m=>set.add(m)); }
    else { if(e.equip) set.add(e.equip); }
  });
  return [...set].map(v=>[v, L[v]||v]).sort((a,b)=>a[1].localeCompare(b[1],'it'));
}

function renderExDb(){
  const el=document.getElementById('exdb-list');if(!el)return;

  // Merge: exercises_db.js (static, 404 ex) + Firebase custom overrides
  const OLD_CATS=new Set(['Squat','Hinge','Unilaterale','Potenza','Pliometria','Spinta','Tirata','Core','Conditioning','Altro']);
  const staticMap={};
  (window.EXERCISES_DB||[]).forEach(e=>{
    staticMap[e.name.toLowerCase().trim()]={name:e.name,cat:e.cat,group:e.group,url:e.url||null,src:'static'};
  });
  // Firebase entries: skip legacy seeded entries (default:true or old category names)
  Object.entries(exercises).forEach(([k,e])=>{
    if(!e||!e.name)return;
    if(e.default||OLD_CATS.has(e.cat))return; // skip old legacy seeds
    const key=e.name.toLowerCase().trim();
    if(staticMap[key]){
      // Override url if firebase has one
      if(e.url||e.video)staticMap[key].url=e.url||e.video;
      staticMap[key].fbKey=k;
    } else {
      // Truly custom exercise added by coach
      staticMap[key]={name:e.name,cat:e.cat||'altro',group:e.group||'',url:e.url||e.video||null,src:'firebase',fbKey:k,custom:true};
    }
  });

  const catMap={'forza':'forza','pliometria':'pliometria','pliomet ria':'pliometria','olimpico':'olimpico','velocita_prep':'velocita_prep','velocita_sprint':'velocita_sprint','resistenza':'resistenza','condizionamento':'condizionamento','priming':'priming','mobilita':'mobilita','recupero':'recupero'};
  let all=Object.values(staticMap);
  let filtered=_exDbFilter?all.filter(e=>(e.cat||'')===_exDbFilter):all;
  if(_exDbSearch)filtered=filtered.filter(e=>(e.name||'').toLowerCase().includes(_exDbSearch));
  filtered.sort((a,b)=>(a.name||'').localeCompare(b.name||'','it'));

  document.getElementById('exdb-count').textContent=all.length+' esercizi totali'+(filtered.length!==all.length?' · '+filtered.length+' filtrati':'');
  if(!filtered.length){el.innerHTML='<div style="color:var(--muted);text-align:center;padding:40px;">Nessun esercizio in questa categoria.</div>';return;}

  // Raggruppamento per group (sottocategoria)
  const byGroup={};
  filtered.forEach(e=>{
    const g=e.group||e.cat||'Altro';
    if(!byGroup[g])byGroup[g]=[];
    byGroup[g].push(e);
  });

  const ytIcon=`<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>`;

  el.innerHTML=Object.entries(byGroup).sort((a,b)=>a[0].localeCompare(b[0],'it')).map(([grp,items])=>`
    <div style="margin-bottom:20px;">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--teal);margin-bottom:8px;">${grp} <span style="color:var(--muted);font-weight:400;">(${items.length})</span></div>
      ${items.map(e=>{
        const hasUrl=!!e.url;
        const nameEsc=e.name.replace(/'/g,"\\'");
        const urlEsc=(e.url||'').replace(/'/g,"\\'");
        return `<div class="exdb-card" style="cursor:pointer;" onclick="openExDbDetail('${nameEsc}','${urlEsc}','${e.fbKey||''}','${e.cat||''}')">
          <div style="flex:1;min-width:0;">
            <span class="exdb-name">${e.name}</span>
            ${e.custom?'<span class="exdb-cat-badge">custom</span>':''}
            ${hasUrl?`<span style="color:#ff4e45;margin-left:8px;vertical-align:middle;" title="${e.url}">${ytIcon}</span>`:'<span style="color:var(--muted);font-size:11px;margin-left:8px;">no video</span>'}
          </div>
          <div style="display:flex;gap:6px;align-items:center;">
            ${hasUrl?`<a href="${e.url}" target="_blank" onclick="event.stopPropagation()" style="color:#ff4e45;font-size:11px;text-decoration:none;white-space:nowrap;">${ytIcon} Guarda</a>`:''}
            ${e.fbKey?`<button onclick="event.stopPropagation();deleteExFromDb('${e.fbKey}')" style="background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.15);border-radius:7px;padding:4px 8px;font-size:11px;cursor:pointer;">🗑</button>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

window.openExDbDetail=function(name,url,fbKey,cat){
  // Open a small inline modal to view/edit the YouTube link
  document.getElementById('exdb-detail-name').textContent=name;
  document.getElementById('exdb-detail-url').value=url||'';
  document.getElementById('exdb-detail-fbkey').value=fbKey||'';
  document.getElementById('exdb-detail-name-hidden').value=name;
  document.getElementById('exdb-detail-cat').value=cat||'forza';
  // Show preview
  _updateExDbPreview(url);
  openModal('exdb-detail');
};

window._updateExDbPreview=function(url){
  const box=document.getElementById('exdb-detail-preview');
  if(!box)return;
  if(url&&url.includes('youtu')){
    const id=url.match(/(?:v=|youtu\.be\/|shorts\/)([A-Za-z0-9_-]{11})/)?.[1];
    box.innerHTML=id?`<iframe width="100%" height="160" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen style="border-radius:8px;"></iframe>`:'<div style="color:var(--muted);font-size:12px;">URL non valido</div>';
  } else {
    box.innerHTML='<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px;">Nessun video impostato</div>';
  }
};

window.saveExDbDetail=async function(){
  const name=document.getElementById('exdb-detail-name-hidden').value;
  const url=document.getElementById('exdb-detail-url').value.trim();
  const fbKey=document.getElementById('exdb-detail-fbkey').value;
  const cat=document.getElementById('exdb-detail-cat').value;
  // Save to Firebase exercise_db (creates or updates entry)
  const key=fbKey||'ex_'+name.toLowerCase().replace(/[^a-z0-9]/g,'_').slice(0,30)+'_'+Date.now();
  await set(ref(db,'exercise_db/'+key),{name,category:cat,url:url||null,custom:false});
  showToast('✓ Link salvato');
  closeModal('exdb-detail');
};

window.deleteExFromDb=async function(key){
  if(!confirm('Rimuovere questo esercizio dal database?'))return;
  await remove(ref(db,'exercise_db/'+key));
  showToast('✓ Esercizio rimosso');
};

async function init(){
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  const [pSnap,aSnap]=await Promise.all([
    get(ref(db,'programs')),
    get(ref(db,'athletes'))
  ]);
  programs=pSnap.val()||{};
  athletes=aSnap.val()||{};
  populateAthleteFilter();
  // Restore last opened program
  const _lastProg=localStorage.getItem('rsc_last_prog');
  if(_lastProg&&programs[_lastProg])setTimeout(()=>selectProg(_lastProg),0);
  onValue(ref(db,'programs'),s=>{programs=s.val()||{};renderProgList();if(currentProgId)renderEditor();});
  onValue(ref(db,'athletes'),s=>{athletes=s.val()||{};populateAthleteFilter();});
}
init();

function populateAthleteFilter(){
  const sel=document.getElementById('filter-athlete');

  const cur=sel.value;
  sel.innerHTML='<option value="">Tutti gli atleti</option>'+Object.entries(athletes).map(([id,a])=>`<option value="${id}"${id===cur?' selected':''}>${a.name||id}</option>`).join('');
}

// ── PROGRAM LIST
function renderProgList(){
  let ids=Object.keys(programs);
  // Status filter
  if(_filterStatus==='active') ids=ids.filter(id=>!programs[id].archived);
  else if(_filterStatus==='archived') ids=ids.filter(id=>!!programs[id].archived);
  // Athlete filter
  if(_filterAthlete) ids=ids.filter(id=>{const assigned=programs[id].assignedTo||{};return !!assigned[_filterAthlete];});
  // Category/sport filter — matches either the sport field (sc/hybrid/pesi/corsa) or the new category field
  if(_filterCat) ids=ids.filter(id=>programs[id].sport===_filterCat||programs[id].category===_filterCat);
  // Search
  if(_filterSearch) ids=ids.filter(id=>(programs[id].name||'').toLowerCase().includes(_filterSearch));

  const total=Object.keys(programs).length;
  document.getElementById('prog-count').textContent=`${ids.length}/${total} programm${total===1?'o':'i'}`;

  if(!ids.length){
    document.getElementById('prog-list').innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Nessun programma</div><div class="empty-sub">${total?'Nessun risultato con i filtri attivi.':'Crea il tuo primo mesociclo'}</div></div>`;
    return;
  }
  document.getElementById('prog-list').innerHTML=ids.sort((a,b)=>(programs[b].createdAt||0)-(programs[a].createdAt||0)).map(id=>{
    const p=programs[id];
    const sp=PROG_TYPES[p.sport]||PROG_TYPES.sc;
    const wks=p.weeks?Object.keys(p.weeks).length:0;
    const assigned=p.assignedTo?Object.keys(p.assignedTo).filter(aid=>athletes[aid]).map(aid=>athletes[aid].name).join(', '):'—';
    const isArchived=!!p.archived;
    const catBadge=p.category?`<span class="prog-cat-badge">${p.category}</span>`:'';
    const archBadge=isArchived?`<span class="prog-archived-badge">ARCHIVIATO</span>`:'';
    return `<div class="prog-item${id===currentProgId?' active':''}${isArchived?' archived':''}" onclick="selectProg('${id}')">
      <div class="prog-name">${p.name}${archBadge}</div>
      ${catBadge?`<div style="margin-bottom:2px;">${catBadge}</div>`:''}
      <div class="prog-meta">${wks} sett. · ${assigned}</div>
      <span class="prog-sport ${sp.cls}">${sp.icon} ${sp.label}</span>
    </div>`;
  }).join('');
}

// ── RENDER EDITOR
function renderEditor(){
  const p=programs[currentProgId]; if(!p)return;
  document.getElementById('rp-empty').style.display='none';
  document.getElementById('rp-editor').style.display='block';
  const sp=PROG_TYPES[p.sport]||PROG_TYPES.sc;
  const wks=p.weeks?Object.keys(p.weeks).length:0;
  const assigned=p.assignedTo?Object.keys(p.assignedTo).filter(id=>athletes[id]).map(id=>athletes[id].name).join(', '):'Nessun atleta';
  const catStr=p.category?` · ${p.category}`:'';
  const archStr=p.archived?' · 📦 ARCHIVIATO':'';
  document.getElementById('ed-prog-name').textContent=p.name;
  document.getElementById('ed-prog-meta').textContent=`${sp.icon} ${sp.label}${catStr} · ${wks} settiman${wks===1?'a':'e'} · Atleti: ${assigned}${archStr}`;
  // Archive button text
  const archBtn=document.getElementById('archive-btn');
  if(archBtn){archBtn.textContent=p.archived?'✅ Riattiva':'📦 Archivia';archBtn.className=p.archived?'btn btn-teal btn-sm':'btn btn-amber btn-sm';}
  renderWeekTabs();
  renderWeekContent();
}

// ── WEEK TABS
function renderWeekTabs(){
  const p=programs[currentProgId]; if(!p||!p.weeks)return;
  const weeks=Object.entries(p.weeks).sort((a,b)=>a[1].order-b[1].order);
  document.getElementById('week-tabs').innerHTML=weeks.map(([wid,w],i)=>{
    const isDeload=w.label?.toLowerCase().includes('deload');
    return `<div class="week-tab${i===currentWeekIdx?' active':''}${isDeload?' deload':''}" onclick="selectWeek(${i},'${wid}')">

// ── EXERCISE BLOCKS
function renderExerciseBlocks(wid,sid,exs){
  _exCounter=0; // reset numbering per session
  if(!exs.length)return `<div style="font-size:12px;color:var(--muted);padding:8px 0;">Nessun esercizio. Aggiungine uno.</div>`;

  // Build ordered list respecting complex groups inline
  const seen=new Set();
  const ordered=[];
  exs.forEach(([eid,e])=>{
    if(e.complexGroup){
      if(!seen.has(e.complexGroup)){
        seen.add(e.complexGroup);
        // collect all items of this group in order
        const grpItems=exs.filter(([,x])=>x.complexGroup===e.complexGroup);
        ordered.push({type:'complex',gkey:e.complexGroup,items:grpItems});
      }
    } else {
      ordered.push({type:'standalone',eid,e});
    }
  });

  let html='';
  ordered.forEach(item=>{
    if(item.type==='complex'){
      html+=`<div class="complex-group" draggable="true" data-drag-group="${item.gkey}" data-wid="${wid}" data-sid="${sid}">
        <div class="complex-label"><span class="ex-drag-handle" style="margin-right:2px;">⠿</span>🔁 Complex / Superset</div>
        ${item.items.map(([eid,e])=>renderExBlock(wid,sid,eid,e,true)).join('')}
      </div>`;
    } else {
      html+=renderExBlock(wid,sid,item.eid,item.e,false);
    }
  });
  return html;
}

// ── DRAG-TO-REORDER EXERCISES ────────────────────────────────────────
(function(){
  let _dragEl=null; // the element being dragged
  let _dragOverEl=null;

  function getDraggable(target){
    // Returns the top-level draggable (.ex-block or .complex-group) from any child
    return target.closest('.ex-block[draggable], .complex-group[draggable]');
  }

  function getSessBody(el){
    return el.closest('.sess-body');
  }

  // Collect all draggable top-level items in a sess-body (ex-blocks + complex-groups)
  function getDraggables(body){
    // Direct children only (complex-group children are .ex-block inside .complex-group — we skip those)
    return Array.from(body.querySelectorAll(':scope > .ex-block, :scope > .complex-group'));
  }

  document.addEventListener('dragstart',function(e){
    const el=getDraggable(e.target);
    // Don't allow drag from inside a complex-group on a child ex-block
    if(!el)return;
    // If the el is an .ex-block that's inside a .complex-group, skip individual drag
    if(el.classList.contains('ex-block')&&el.closest('.complex-group'))return;
    _dragEl=el;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain','');
  },{passive:false});

  document.addEventListener('dragover',function(e){
    if(!_dragEl)return;
    const target=getDraggable(e.target);
    if(!target||target===_dragEl)return;
    // Same session body?
    if(getSessBody(target)!==getSessBody(_dragEl))return;
    e.preventDefault();
    if(_dragOverEl&&_dragOverEl!==target){
      _dragOverEl.classList.remove('drag-over');
    }
    _dragOverEl=target;
    target.classList.add('drag-over');
  },{passive:false});

  document.addEventListener('dragleave',function(e){
    const target=getDraggable(e.target);
    if(target){target.classList.remove('drag-over');}
    if(_dragOverEl&&!_dragOverEl.contains(e.relatedTarget)){
      _dragOverEl.classList.remove('drag-over');
    }
  });

  document.addEventListener('drop',function(e){
    if(!_dragEl||!_dragOverEl||_dragEl===_dragOverEl)return;
    e.preventDefault();
    const body=getSessBody(_dragEl);
    if(!body||getSessBody(_dragOverEl)!==body)return;

    // Get wid/sid from the drag element
    const wid=_dragEl.dataset.wid||_dragEl.querySelector('[data-wid]')?.dataset.wid;
    const sid=_dragEl.dataset.sid||_dragEl.querySelector('[data-sid]')?.dataset.sid;
    if(!wid||!sid)return;

    // Reorder in DOM
    const items=getDraggables(body);
    const fromIdx=items.indexOf(_dragEl);
    const toIdx=items.indexOf(_dragOverEl);
    if(fromIdx<toIdx){
      _dragOverEl.after(_dragEl);
    } else {
      _dragOverEl.before(_dragEl);
    }

    // Persist new order to Firebase
    _persistOrder(wid,sid,body);
  });

  document.addEventListener('dragend',function(){
    if(_dragEl)_dragEl.classList.remove('dragging');
    if(_dragOverEl)_dragOverEl.classList.remove('drag-over');
    _dragEl=null;_dragOverEl=null;
  });

  function _persistOrder(wid,sid,body){
    const items=getDraggables(body);
    const updates={};
    let orderVal=10;
    items.forEach(el=>{
      if(el.classList.contains('complex-group')){
        // All ex-blocks inside this complex-group get same order block
        el.querySelectorAll('.ex-block[data-eid]').forEach(cxEl=>{
          const eid=cxEl.dataset.eid;
          if(eid)updates[`weeks/${wid}/sessions/${sid}/exercises/${eid}/order`]=orderVal;
        });
        orderVal+=10;
      } else {
        const eid=el.dataset.eid;
        if(eid){updates[`weeks/${wid}/sessions/${sid}/exercises/${eid}/order`]=orderVal;orderVal+=10;}
      }
    });
    if(Object.keys(updates).length){
      update(ref(db),updates).catch(err=>console.error('Order update failed',err));
    }
  }
})();

  const sessRef=push(ref(db,`programs/${currentProgId}/weeks/${wid}/sessions`));
  const sessData={
    name:tmpl.name,
    type:tmpl.type,
    order:Date.now(),
  };
  if(tmpl.condType){
    sessData.condType=tmpl.condType;
    sessData.duration=tmpl.duration;
    sessData.condContent=tmpl.condContent;
  } else if(tmpl.corsaTipo){
    sessData.corsaTipo=tmpl.corsaTipo;
    sessData.corsaZona=tmpl.corsaZona||'';
    sessData.corsaDist=tmpl.corsaDist||'';
    sessData.corsaPace=tmpl.corsaPace||'';
    sessData.corsaNote=tmpl.corsaNote||'';
  } else {
    const exObj={};
    (tmpl.exercises||[]).forEach((ex,i)=>{
      const k='ex_'+Date.now()+'_'+i;
      exObj[k]={...ex,order:i};
    });
    sessData.exercises=exObj;
  }
  await set(sessRef,sessData);
  closeModal();
  showToast('✓ Template aggiunto: '+tmpl.name);
}

window.saveProgram=async function(editId){
  const name=document.getElementById('m-name').value.trim();

  const data={
    name,
    sport:document.getElementById('m-sport').value,
    category:document.getElementById('m-cat')?.value||null,
    duration:+(document.getElementById('m-dur')?.value||4),
    notes:document.getElementById('m-notes').value.trim(),
    createdAt:editId?programs[editId]?.createdAt||Date.now():Date.now()
  };
  if(editId){await update(ref(db,`programs/${editId}`),data);}
  else{const r=await push(ref(db,'programs'),data);currentProgId=r.key;setTimeout(()=>selectProg(r.key),300);}

};

window.copyProgram=async function(){
  const targetId=document.getElementById('copy-target-athlete').value;
  if(!targetId){showToast('⚠ Seleziona un atleta');return;}
  const p=programs[currentProgId];
  if(!p){showToast('⚠ Nessun programma');return;}
  const newName=document.getElementById('copy-prog-name').value.trim()||(p.name+' (copia)');

  // Deep copy the program (JSON round-trip to strip Firebase references)
  const copy=JSON.parse(JSON.stringify(p));
  copy.name=newName;
  copy.createdAt=Date.now();
  copy.archived=false;
  // Assign only to the target athlete
  copy.assignedTo={[targetId]:true};

  const newRef=await push(ref(db,'programs'),copy);
  closeModal();
  showToast(`✓ "${newName}" copiato!`);
  // Optionally navigate to the new copy
  setTimeout(()=>selectProg(newRef.key),400);
};

window._setRows=[{type:'',sets:3,reps:''}];
const ST_LABELS={'':{label:'Working',cls:'st-work'},'W':{label:'W · Warm Up',cls:'st-w'},'BO':{label:'BO · Back Off',cls:'st-bo'},'D':{label:'D · Drop Set',cls:'st-d'},'F':{label:'F · Failure',cls:'st-f'}};

function renderSetRowsList(){
  const tbody=document.getElementById('sr-list');
  if(!tbody)return;
  tbody.innerHTML=window._setRows.map((r,i)=>`
    <tr>
      <td class="sr-type">
        <select class="sr-inp" data-row="${i}" data-col="0" onchange="window._setRows[${i}].type=this.value;renderSetRowsList()">
          ${Object.entries(ST_LABELS).map(([v,d])=>`<option value="${v}"${r.type===v?' selected':''}>${d.label}</option>`).join('')}
        </select>
      </td>
      <td class="sr-sets"><input class="sr-inp" type="number" data-row="${i}" data-col="1" value="${r.sets}" min="1" max="20" style="text-align:center;" oninput="window._setRows[${i}].sets=+this.value"></td>
      <td class="sr-reps"><input class="sr-inp" type="text" data-row="${i}" data-col="2" value="${r.reps}" placeholder='8 / "30 / 8-12' oninput="window._setRows[${i}].reps=this.value"></td>
      <td class="sr-rm"><button class="sr-rm-btn" onclick="removeSetRow(${i})" title="Rimuovi">&times;</button></td>
    </tr>`).join('');
  _attachSrNavigation();
}

function _attachSrNavigation(){
  const tbody=document.getElementById('sr-list');
  if(!tbody||tbody._navAttached)return;
  tbody._navAttached=true;
  tbody.addEventListener('keydown',function(e){
    const el=e.target;
    if(!el.matches('.sr-inp[data-col]'))return;
    const row=+el.dataset.row;
    const col=+el.dataset.col;
    const totalRows=window._setRows.length;
    if(e.key==='Tab'){
      e.preventDefault();
      if(!e.shiftKey&&col===2){
        if(row===totalRows-1){window.addSetRow();setTimeout(()=>{document.querySelector(`#sr-list .sr-inp[data-row="${row+1}"][data-col="1"]`)?.focus()},40);}
        else{document.querySelector(`#sr-list .sr-inp[data-row="${row+1}"][data-col="1"]`)?.focus();}
      } else if(e.shiftKey&&col===0){
        if(row>0)document.querySelector(`#sr-list .sr-inp[data-row="${row-1}"][data-col="2"]`)?.focus();
      } else {
        document.querySelector(`#sr-list .sr-inp[data-row="${row}"][data-col="${e.shiftKey?col-1:col+1}"]`)?.focus();
      }
    } else if(e.key==='Enter'){
      e.preventDefault();
      if(row===totalRows-1){window.addSetRow();setTimeout(()=>{document.querySelector(`#sr-list .sr-inp[data-row="${row+1}"][data-col="1"]`)?.focus()},40);}
      else{document.querySelector(`#sr-list .sr-inp[data-row="${row+1}"][data-col="1"]`)?.focus();}
    }
  });
}
window.addSetRow=function(){
  const last=window._setRows[window._setRows.length-1]||{};
  window._setRows.push({type:'',sets:last.sets||3,reps:''});
  renderSetRowsList();
};
window.removeSetRow=function(i){
  if(window._setRows.length<=1)return;
  window._setRows.splice(i,1);
  renderSetRowsList();
};

window.toggleBulkMode=function(sid){
  const sessBody=document.getElementById('sess-body-'+sid);
  if(!sessBody)return;
  const bulkBar=document.getElementById('bulk-bar-'+sid);
  const isActive=bulkBar&&bulkBar.style.display==='flex';
  if(isActive){
    sessBody.querySelectorAll('.ex-bulk-cb').forEach(cb=>cb.remove());
    sessBody.querySelectorAll('.ex-block').forEach(bl=>{bl.classList.remove('bulk-mode');bl.style.position='';});
    if(bulkBar)bulkBar.style.display='none';
  } else {
    sessBody.querySelectorAll('.ex-block').forEach(bl=>{
      bl.classList.add('bulk-mode');
      if(!bl.querySelector('.ex-bulk-cb')){
        const cb=document.createElement('input');
        cb.type='checkbox';cb.className='ex-bulk-cb';
        Object.assign(cb.style,{position:'absolute',left:'10px',top:'50%',transform:'translateY(-50%)',width:'16px',height:'16px',accentColor:'var(--primary)',cursor:'pointer',zIndex:'2'});
        bl.prepend(cb);
      }
    });
    if(bulkBar)bulkBar.style.display='flex';
  }
};

window.applyBulkUpdate=async function(sid,wid){
  const sessBody=document.getElementById('sess-body-'+sid);
  if(!sessBody)return;
  const checked=[...sessBody.querySelectorAll('.ex-bulk-cb:checked')];
  if(!checked.length){showToast('Seleziona almeno un esercizio');return;}
  const bulkSets=document.getElementById('bulk-sets-'+sid)?.value?.trim();
  const bulkReps=document.getElementById('bulk-reps-'+sid)?.value?.trim();
  const bulkLoad=document.getElementById('bulk-load-'+sid)?.value?.trim();
  if(!bulkSets&&!bulkReps&&!bulkLoad){showToast('Inserisci almeno un valore');return;}
  const updates={};
  checked.forEach(cb=>{
    const eid=cb.closest('.ex-block')?.dataset.eid;
    if(!eid)return;
    const base=`programs/${currentProgId}/weeks/${wid}/sessions/${sid}/exercises/${eid}`;
    if(bulkSets)updates[`${base}/sets`]=+bulkSets;
    if(bulkReps)updates[`${base}/reps`]=bulkReps;
    if(bulkLoad)updates[`${base}/pct`]=bulkLoad;
  });
  await update(ref(db),updates);
  showToast(`✓ Aggiornati ${checked.length} esercizi`);
};

window.applyCustomTemplate=async function(tid,wid,coachId){
  const snap=await get(ref(db,`templates/${coachId}/${tid}`));

window.copyWeek=async function(wid){
  const p=programs[currentProgId]; if(!p){showToast('⚠ Nessun programma');return;}
  const srcWk=p.weeks?.[wid]; if(!srcWk){showToast('⚠ Settimana non trovata');return;}
  // 1. Duplicate in current program
  const allWks=Object.values(p.weeks||{});
  const newOrder=(allWks.length>0?Math.max(...allWks.map(w=>w.order||0)):0)+1;
  const newWkRef=push(ref(db,`programs/${currentProgId}/weeks`));
  const newWk={label:(srcWk.label?srcWk.label+' (copia)':'Copia'),notes:srcWk.notes||'',order:newOrder,sessions:{}};
  const srcSessions=Object.values(srcWk.sessions||{});
  await set(newWkRef,newWk);
  for(const s of srcSessions){
    const newSRef=push(ref(db,`programs/${currentProgId}/weeks/${newWkRef.key}/sessions`));
    const {_key:_k,...sData}=s;
    await set(newSRef,{...sData,order:(s.order||0)});
  }
  // 2. Save to clipboard for cross-program paste
  const clip={
    weekData:{label:srcWk.label||'',notes:srcWk.notes||'',sessions:srcWk.sessions||{}},
    fromProgName:p.name,
    fromProgId:currentProgId,
    ts:Date.now()
  };
  localStorage.setItem('rsc_week_clipboard',JSON.stringify(clip));
  showToast('✓ Settimana copiata — disponibile per incollare in altri programmi');
  renderWeekTabs(); // refresh to show paste btn if clipboard present
};

  const DAYS=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];

`;
  weeks.forEach(([,wk],wi)=>{
    txt+=`
*Settimana ${wi+1}${wk.label?' — '+wk.label:''}*
`;
    const sessions=Object.values(wk.sessions||{}).sort((a,b)=>(a.order||0)-(b.order||0));

      txt+=`
📋 *${s.name||s.type}*${dayLbl}
`;
      const exs=Object.values(s.exercises||{}).sort((a,b)=>(a.order||0)-(b.order||0));
      if(s.type==='conditioning'){
        txt+=`${s.condType||''}${s.duration?' · '+s.duration:''}
${s.condContent||''}
`;
      } else {
        exs.forEach(e=>{
          const groups=e.complexGroup?`[${e.complexLabel||'A'}] `:'';
          txt+=`${groups}${e.name} — ${e.sets||3}×${e.reps||'—'}${e.pct?' @'+e.pct+'%':''}${e.rpe?' RPE'+e.rpe:''}${e.rest?' rec '+e.rest:''}
`;
          if(e.cue)txt+=`  💡 ${e.cue}
`;
        });

    });

  navigator.clipboard.writeText(txt).then(()=>showToast('✓ Copiato per WhatsApp!'));
};

.tl-seg{flex:1;padding:6px 5px 5px;border-top:3px solid #e2dcd3;text-align:center;background:#faf8f4}
.tl-seg:not(:last-child){border-right:1px solid #e2dcd3}
.tl-w{font-size:8.5px;font-weight:900;letter-spacing:.3px}
.tl-ph{font-size:6px;color:#6d6459;margin-top:1px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-s{font-size:5.5px;color:#8a7f72;margin-top:2px}

/* ── WEEK BLOCK */
.wb{margin-bottom:10px;page-break-inside:avoid}
.wh{display:flex;align-items:center;gap:6px;padding:6px 8px;margin-bottom:5px;background:#f7f4ef;border-radius:4px;border:1px solid #e2dcd3}
.wh-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.wh-num{font-size:8.5px;font-weight:800;color:#241d17;letter-spacing:.3px}
.wh-lbl{font-size:7.5px;font-weight:700;color:inherit}
.wh-note{font-size:7px;color:#6d6459;font-style:italic;flex:1;padding-left:4px}
.wh-cnt{font-size:6.5px;color:#8a7f72;margin-left:auto;white-space:nowrap}
.sw{display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start}

/* ── SESSION CARD */
.sc{background:#ffffff;border:1px solid #e2dcd3;border-radius:5px;overflow:hidden;flex:1 1 220px;max-width:420px;min-width:150px;page-break-inside:avoid;break-inside:avoid}
.sc--corsa{flex:1 1 200px;max-width:300px}
.sc--recupero{flex:1 1 150px;max-width:240px}
.sc--conditioning{flex:1 1 180px;max-width:300px}
.sc-head{display:flex;align-items:center;gap:6px;padding:6px 8px 5px;border-bottom:1px solid #ece7df;background:#faf8f4}
.sc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sc-meta{flex:1;display:flex;align-items:center;gap:4px;min-width:0}
.sc-day{font-size:6px;font-weight:800;color:#6d6459;text-transform:uppercase;letter-spacing:.5px;background:#efeae2;padding:1px 4px;border-radius:3px;white-space:nowrap}
.sc-name{font-size:8.5px;font-weight:700;color:#241d17;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-tag{font-size:6px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;margin-left:auto;padding-left:4px}
.sc-snote{font-size:6.5px;color:#6d6459;font-style:italic;padding:4px 8px;background:#faf8f4;border-bottom:1px solid #ece7df}
.empty-body{font-size:7.5px;color:#8a7f72;padding:7px 8px;font-style:italic}
.empty-week{font-size:7.5px;color:#8a7f72;padding:9px;font-style:italic;text-align:center;border:1px dashed #d9d2c8;border-radius:5px;width:100%}

/* ── EXERCISE TABLE */
.ex-tbl{width:100%;border-collapse:collapse}
.ex-tbl thead tr{background:#f7f4ef;border-bottom:1px solid #e2dcd3}
.ex-tbl th{font-size:6px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#74695c;padding:4px 6px;text-align:left}
.ex-tbl th:nth-child(n+2){text-align:center}
.ex-tbl td{padding:3px 6px;font-size:8px;border-bottom:1px solid #ece7df;vertical-align:top}
.ex-tbl tbody tr:last-child td{border-bottom:none}
.en{font-weight:600;color:#241d17}
.nu{text-align:center;color:#4a4239;white-space:nowrap}
.cx-sep td{background:#fbeee4;font-size:6px;font-weight:700;color:#A8480F;text-transform:uppercase;letter-spacing:.5px;padding:3px 6px}
.cx-b{display:inline-block;font-size:6px;font-weight:800;padding:0 3px;border-radius:2px;margin-right:2px}
.note-cell{font-size:6.5px;color:#6d6459;font-style:italic;max-width:100px;word-break:break-word}
.note-th{text-align:left!important;color:#74695c}

/* ── CONDITIONING */
.c-cond{padding:6px 8px}
.cond-title{font-size:8.5px;font-weight:700;margin-bottom:4px}
.cond-row{font-size:7px;color:#4a4239;padding:2px 0;border-bottom:1px solid #ece7df}
.cond-row:last-child{border-bottom:none}

/* ── RUNNING – single phase */
.c-run-single{padding:6px 8px}
.run-z-badge{font-size:7px;font-weight:800;padding:1px 5px;border-radius:3px;letter-spacing:.4px;margin-right:4px}
.run-tipo{font-size:7.5px;font-weight:700;color:#241d17}
.run-kv-row{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap}
.run-kv{display:flex;flex-direction:column;gap:1px}
.kv-k{font-size:5.5px;text-transform:uppercase;letter-spacing:.5px;color:#8a7f72;font-weight:700}
.kv-v{font-size:9px;font-weight:700;color:#241d17}
.run-fnote{font-size:6.5px;color:#4a4239;margin-top:6px;padding-top:4px;border-top:1px solid #ece7df;white-space:pre-line;line-height:1.5}

/* ── RUNNING – multi phase */
.c-run-multi{padding:4px 8px}
.rf{display:grid;grid-template-columns:1fr auto;gap:4px 6px;align-items:start;padding:4px 0;border-bottom:1px solid #ece7df}
.rf:last-child{border-bottom:none}
.rf-left{display:flex;align-items:center;gap:4px;min-width:0}
.rf-z{font-size:6.5px;font-weight:800;padding:1px 4px;border-radius:3px;letter-spacing:.3px;white-space:nowrap}
.rf-num{font-size:6.5px;font-weight:700;color:#8a7f72;min-width:10px;text-align:center}
.rf-tipo{font-size:7px;font-weight:600;color:#241d17;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rf-right{display:flex;gap:6px;align-items:center;white-space:nowrap}
.rf-kv{font-size:7px;font-weight:700;color:#241d17}
.rf-kv.muted{font-weight:500;color:#6d6459}
.rf-note{font-size:6px;color:#6d6459;font-style:italic;grid-column:1/-1;padding-left:0;margin-top:1px}
.rf-intv{grid-column:1/-1;display:flex;flex-wrap:wrap;gap:3px;padding:2px 0}
.rf-rec{grid-column:1/-1;display:flex;flex-wrap:wrap;gap:3px;padding:2px 0;align-items:center}
.intv-chip{font-size:6.5px;font-weight:700;color:#0a7d52;background:#e6f5ee;padding:1px 4px;border-radius:2px}
.rec-lbl{font-size:6px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#8a7f72;margin-right:1px}
.rf-rec span{font-size:6.5px;color:#4a4239}

/* ── FOOTER */
.pg-foot{margin-top:12px;padding-top:8px;border-top:1px solid #e2dcd3;display:flex;justify-content:space-between;align-items:center;font-size:6px;color:#8a7f72}
.pg-foot strong{color:#A8480F;font-weight:800}
@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
`;

window.closeModal=()=>document.getElementById('modal').classList.remove('open');
function ini(n){return n?n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2):'?';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
