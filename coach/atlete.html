<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlete Fiorentina · RS Coaching</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Crect width='36' height='36' rx='8' fill='%230E0B11'/%3E%3Crect x='9' y='20' width='4.2' height='7' rx='2.1' fill='%23FF8A57'/%3E%3Crect x='15.9' y='13' width='4.2' height='14' rx='2.1' fill='%23FF7A3D'/%3E%3Crect x='22.8' y='8' width='4.2' height='19' rx='2.1' fill='%23FF6A2E'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RS Coaching · Atlete Fiorentina
   Rosa U19W: ruolo per atleta (override locali), stat stagione,
   deep-link al carico atleta. Stesso design system del carico.
   ============================================================ */
:root{
  --bg:      oklch(8.5% 0.014 38);
  --surface: oklch(12%  0.016 38);
  --surface2:oklch(15%  0.018 38);
  --surface3:oklch(18%  0.020 38);
  --orange:  oklch(68% 0.19 42);
  --orange2: oklch(74% 0.15 50);
  --primary: oklch(68% 0.19 42);
  --violet:  oklch(62% 0.22 280);
  --violet2: oklch(68% 0.18 285);
  --violet-bg: oklch(62% 0.22 280 / 0.10);
  --violet-border: oklch(62% 0.22 280 / 0.22);
  --ember-bg: oklch(68% 0.19 42 / 0.10);
  --ember-border: oklch(68% 0.19 42 / 0.24);
  --text:    oklch(78% 0.012 38);
  --ink:     oklch(93% 0.010 38);
  --muted:   oklch(58% 0.014 38);
  --faint:   oklch(46% 0.014 38);
  --green:   oklch(70% 0.18 152);
  --red:     oklch(62% 0.22 25);
  --border:  oklch(22% 0.016 38 / 0.70);
  --border2: oklch(28% 0.018 38 / 0.80);
  --border3: oklch(36% 0.020 38 / 0.90);
  --shadow-sm:   0 1px 4px oklch(0% 0 0 / 0.45);
  --shadow-card: 0 4px 20px oklch(0% 0 0 / 0.45), 0 1px 3px oklch(0% 0 0 / 0.55);
  --shadow-md:   0 12px 40px oklch(0% 0 0 / 0.60);
  --shadow-btn:  0 4px 18px oklch(68% 0.19 42 / 0.35);
  --r-sm: 8px; --r: 12px; --r-lg: 16px;
  --ease: cubic-bezier(0.23, 1, 0.32, 1);
  --z-nav: 40; --z-toast: 90;
}
*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{
  background: var(--bg);
  color: var(--text);
  font-family:'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
  font-size:15px; line-height:1.55;
  -webkit-font-smoothing:antialiased;
  min-height:100dvh;
}
body::before{
  content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(60% 45% at 82% -5%, oklch(68% 0.19 42 / 0.10), transparent 60%),
    radial-gradient(55% 40% at -8% 8%, oklch(62% 0.22 280 / 0.08), transparent 62%);
}
a{ color:inherit; text-decoration:none; }
:focus-visible{ outline:2px solid var(--orange); outline-offset:2px; border-radius:4px; }
.tnum{ font-variant-numeric: tabular-nums; font-feature-settings:"tnum" 1; }

/* ---------- layout shell ---------- */
.app{ display:flex; min-height:100dvh; position:relative; z-index:1; }
.main{ flex:1 1 auto; min-width:0; padding:0 0 64px; }
.topbar{
  position:sticky; top:0; z-index:var(--z-nav);
  display:flex; align-items:center; gap:14px;
  padding:16px 28px; background:oklch(8.5% 0.014 38 / 0.82);
  backdrop-filter:saturate(160%) blur(12px); border-bottom:1px solid var(--border);
}
.crest{ width:42px; height:42px; flex:0 0 42px; object-fit:contain;
  filter: drop-shadow(0 2px 8px oklch(62% 0.22 280 / 0.35)); }
.crest-fallback{ width:42px; height:42px; border-radius:10px; background:var(--violet-bg);
  border:1px solid var(--violet-border); display:grid; place-items:center; color:var(--violet2);
  font-family:'Bebas Neue',sans-serif; font-size:16px; }
.title-wrap{ display:flex; flex-direction:column; min-width:0; }
.title-wrap h1{ margin:0; font-family:'Bebas Neue',sans-serif; font-weight:400;
  font-size:30px; letter-spacing:.5px; color:var(--ink); line-height:1; }
.title-wrap .sub{ font-size:12.5px; color:var(--muted); margin-top:2px; }
.title-wrap .sub b{ color:var(--text); font-weight:600; }
.top-right{ margin-left:auto; display:flex; align-items:center; gap:10px; text-align:right; }
.gen-pill{
  display:inline-flex; align-items:center; gap:7px; padding:7px 12px; border-radius:999px;
  background:var(--surface2); border:1px solid var(--border2); font-size:11.5px; color:var(--muted); white-space:nowrap;
}
.gen-pill svg{ width:13px; height:13px; color:var(--green); }

.wrap{ max-width:1360px; margin:0 auto; padding:26px 28px 0; }

/* ---------- KPI strip ---------- */
.kpis{ display:grid; grid-template-columns:repeat(4, 1fr); gap:14px; margin-bottom:22px; }
.kpi{
  position:relative; overflow:hidden; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); padding:16px 18px; box-shadow: var(--shadow-card);
}
.kpi::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:3px 0 0 3px;
  background:linear-gradient(180deg, var(--violet), var(--violet2)); }
.kpi.o::before{ background:linear-gradient(180deg, var(--orange), var(--orange2)); }
.kpi.g::before{ background:linear-gradient(180deg, var(--green), oklch(74% 0.16 152)); }
.kpi.r::before{ background:linear-gradient(180deg, var(--red), oklch(70% 0.18 30)); }
.kpi .k-label{ font-size:11.5px; color:var(--muted); font-weight:600; letter-spacing:.02em; text-transform:uppercase; }
.kpi .k-val{ font-family:'Bebas Neue',sans-serif; font-size:34px; letter-spacing:.5px; color:var(--ink); line-height:1.05; margin-top:6px; }
.kpi .k-val small{ font-family:'Inter',sans-serif; font-size:13px; font-weight:600; color:var(--muted); letter-spacing:0; margin-left:4px; }

/* ---------- controls ---------- */
.controls{ display:flex; flex-wrap:wrap; align-items:center; gap:12px; margin-bottom:14px; }
.search{ position:relative; flex:1 1 260px; min-width:200px; max-width:360px; }
.search svg{ position:absolute; left:12px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--muted); pointer-events:none; }
.search input{
  width:100%; font-family:inherit; font-size:14px; color:var(--ink);
  background:var(--surface2); border:1px solid var(--border2); border-radius:10px;
  padding:10px 14px 10px 36px; min-height:42px; outline:none;
  transition: border-color .18s var(--ease);
}
.search input::placeholder{ color:var(--muted); }
.search input:hover{ border-color:var(--border3); }
.search input:focus{ border-color:var(--violet-border); }
.field{ position:relative; display:inline-flex; align-items:center; }
select.picker{
  appearance:none; font-family:inherit; font-size:13.5px; font-weight:500; color:var(--text);
  background:var(--surface2); border:1px solid var(--border2); border-radius:9px;
  padding:9px 34px 9px 14px; cursor:pointer; min-height:42px;
}
select.picker:hover{ border-color:var(--border3); }
.field::after{ content:""; position:absolute; right:13px; top:50%; width:8px; height:8px; pointer-events:none;
  border-right:2px solid var(--muted); border-bottom:2px solid var(--muted); transform:translateY(-70%) rotate(45deg); }
.spacer{ flex:1 1 auto; }
.btn{
  display:inline-flex; align-items:center; gap:8px; appearance:none; cursor:pointer;
  font-family:inherit; font-size:13px; font-weight:600; color:var(--text);
  background:var(--surface2); border:1px solid var(--border2); border-radius:10px;
  padding:9px 14px; min-height:42px; white-space:nowrap;
  transition: background .18s var(--ease), color .18s var(--ease), border-color .18s var(--ease), transform .1s var(--ease);
}
.btn svg{ width:15px; height:15px; }
.btn:hover{ color:var(--ink); border-color:var(--border3); background:var(--surface3); }
.btn:active{ transform:scale(.97); }
.btn.primary{ color:#1a0d05; background:var(--orange); border-color:transparent; box-shadow: var(--shadow-btn); }
.btn.primary:hover{ background:var(--orange2); color:#1a0d05; }
.btn.ghost{ background:transparent; }
.btn[disabled]{ opacity:.42; cursor:not-allowed; pointer-events:none; }

/* ---------- role filter pills ---------- */
.pills{ display:flex; gap:8px; overflow-x:auto; padding:2px 2px 10px; margin:0 -2px 18px; scrollbar-width:thin; }
.pills::-webkit-scrollbar{ height:6px; }
.pills::-webkit-scrollbar-thumb{ background:var(--border3); border-radius:3px; }
.pill{
  flex:0 0 auto; appearance:none; border:1px solid var(--border2); background:var(--surface);
  color:var(--muted); cursor:pointer; font-family:inherit; font-size:12.5px; font-weight:600;
  padding:7px 13px; border-radius:999px; white-space:nowrap; display:inline-flex; align-items:center; gap:7px;
  transition: background .18s var(--ease), color .18s var(--ease), border-color .18s var(--ease), transform .1s var(--ease);
}
.pill:hover{ color:var(--text); border-color:var(--border3); }
.pill:active{ transform:scale(.96); }
.pill .cnt{ font-size:11px; color:var(--faint); font-variant-numeric:tabular-nums; }
.pill.on{ background:var(--violet-bg); color:var(--violet2); border-color:var(--violet-border); }
.pill.on .cnt{ color:var(--violet2); }
.pill.warn.on{ background:var(--ember-bg); color:var(--orange2); border-color:var(--ember-border); }
.pill.warn.on .cnt{ color:var(--orange2); }

/* ---------- roster grid ---------- */
.grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:14px; }
.pcard{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg);
  box-shadow: var(--shadow-card); padding:16px; display:flex; flex-direction:column; gap:14px;
  transition: border-color .2s var(--ease), transform .2s var(--ease);
}
.pcard:hover{ border-color:var(--border3); transform:translateY(-2px); }
.pcard-top{ display:flex; align-items:center; gap:12px; min-width:0; }
.avatar{
  flex:0 0 46px; width:46px; height:46px; border-radius:13px;
  background:linear-gradient(150deg, var(--violet-bg), oklch(62% 0.22 280 / 0.04));
  border:1px solid var(--violet-border); display:grid; place-items:center;
  font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:.5px; color:var(--violet2);
}
.pcard-id{ min-width:0; flex:1 1 auto; }
.pname{ font-size:14.5px; font-weight:600; color:var(--ink); line-height:1.2;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.role-wrap{ position:relative; display:inline-flex; align-items:center; margin-top:6px; max-width:100%; }
.role-wrap::after{ content:""; position:absolute; right:10px; top:50%; width:6px; height:6px; pointer-events:none;
  border-right:2px solid currentColor; border-bottom:2px solid currentColor; transform:translateY(-70%) rotate(45deg); opacity:.6; }
.role-select{
  appearance:none; font-family:inherit; font-size:11.5px; font-weight:600; cursor:pointer;
  padding:5px 24px 5px 11px; border-radius:999px; max-width:100%;
  background:var(--violet-bg); border:1px solid var(--violet-border); color:var(--violet2);
  transition: background .18s var(--ease), border-color .18s var(--ease), color .18s var(--ease);
}
.role-wrap.unassigned{ color:var(--orange2); }
.role-wrap.unassigned .role-select{
  background:transparent; border:1px dashed var(--ember-border); color:var(--orange2);
}
.role-select:hover{ border-color:var(--border3); }
.pstats{ display:grid; grid-template-columns:repeat(4, 1fr); gap:6px; }
.pstat{ display:flex; flex-direction:column; align-items:center; gap:2px; padding:9px 4px;
  background:var(--surface2); border-radius:var(--r-sm); }
.ps-v{ font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:.4px; color:var(--ink); line-height:1;
  font-variant-numeric:tabular-nums; }
.ps-l{ font-size:9.5px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); }
.pcard-link{
  display:inline-flex; align-items:center; justify-content:space-between; gap:8px;
  font-size:12.5px; font-weight:600; color:var(--orange2); margin-top:auto;
  padding:9px 12px; border-radius:10px; border:1px solid var(--ember-border); background:var(--ember-bg);
  transition: background .18s var(--ease), transform .1s var(--ease);
}
.pcard-link:hover{ background:oklch(68% 0.19 42 / 0.16); }
.pcard-link:active{ transform:scale(.98); }
.pcard-link svg{ width:15px; height:15px; }

.empty{ padding:52px 20px; text-align:center; color:var(--muted); border:1px dashed var(--border2);
  border-radius:var(--r-lg); background:var(--surface); }
.empty svg{ width:34px; height:34px; color:var(--faint); margin-bottom:10px; }
.empty b{ display:block; color:var(--text); font-size:15px; margin-bottom:4px; }

.foot-note{ max-width:1360px; margin:16px auto 0; padding:0 28px; font-size:11.5px; color:var(--faint); }

/* ---------- toast ---------- */
.toast{
  position:fixed; left:50%; bottom:24px; transform:translate(-50%, 16px); z-index:var(--z-toast);
  opacity:0; pointer-events:none; display:flex; align-items:center; gap:9px;
  padding:11px 16px; border-radius:12px; background:var(--surface3); border:1px solid var(--border3);
  box-shadow: var(--shadow-md); font-size:13px; color:var(--ink);
  transition: opacity .22s var(--ease), transform .22s var(--ease);
}
.toast svg{ width:16px; height:16px; color:var(--green); }
.toast.show{ opacity:1; transform:translate(-50%, 0); }

/* reveal */
.reveal{ opacity:0; transform:translateY(10px); animation:rv .5s var(--ease) forwards; animation-delay:calc(var(--i,0) * 34ms); }
@keyframes rv{ to{ opacity:1; transform:none; } }

/* ---------- responsive ---------- */
@media (max-width: 900px){
  .main{ padding-top:52px; }
  .topbar{ position:static; padding:12px 16px; }
  .kpis{ grid-template-columns:repeat(2, 1fr); }
  .title-wrap h1{ font-size:25px; }
  .wrap{ padding:20px 16px 0; }
  .foot-note{ padding:0 16px; }
}
@media (max-width: 560px){
  .kpis{ grid-template-columns:1fr 1fr; gap:10px; }
  .kpi .k-val{ font-size:28px; }
  .search{ max-width:none; flex-basis:100%; }
  .top-right .gen-pill{ display:none; }
}
@media (prefers-reduced-motion: reduce){
  .reveal{ animation:none; opacity:1; transform:none; }
  .pcard:hover{ transform:none; }
  *{ transition:none !important; }
}

/* ---------- tabella solo-stampa (PDF rosa per reparto) ---------- */
#print-only{ display:none; }
#print-only .proster-h{ font-size:12.5px; font-weight:700; color:#5b2d90; margin:2px 0 10px; }
#print-only table.ptbl{ width:100%; border-collapse:collapse; font-size:11px; }
#print-only table.ptbl th, #print-only table.ptbl td{ border:1px solid #d9d2e6; padding:5px 8px; text-align:right; }
#print-only table.ptbl th.l, #print-only table.ptbl td.l{ text-align:left; }
#print-only table.ptbl thead th{ background:#5b2d90; color:#fff; }
#print-only tr.rep td{ background:#efe7f7; color:#5b2d90; font-weight:700; text-align:left; }
#print-only tr.na td.l{ color:#9f2f2d; font-style:italic; }

/* ---------- print (PDF pulito, tema chiaro) ---------- */
@media print{
  @page{ margin:13mm; }
  html,body{ background:#fff !important; color:#14110f !important; }
  body::before{ display:none !important; }
  .sb-mob-bar, .sb-mob-overlay, .sidebar, .controls, .pills, .grid, .toast,
  .top-right, .foot-note{ display:none !important; }
  .app{ display:block !important; }
  .main{ padding:0 !important; }
  .topbar{ position:static !important; background:#fff !important; border-bottom:1px solid #ccc !important;
    backdrop-filter:none !important; padding:0 0 10px !important; margin-bottom:12px; }
  .title-wrap h1{ color:#14110f !important; }
  .title-wrap .sub, .title-wrap .sub b{ color:#3a332e !important; }
  .wrap{ max-width:none !important; padding:0 !important; }
  .kpis{ margin:0 0 14px !important; }
  .kpi{ box-shadow:none !important; border:1px solid #ccc !important; background:#fafafa !important; break-inside:avoid; }
  .kpi::before{ background:#5b2d90 !important; }
  .kpi .k-label{ color:#5a524c !important; }
  .kpi .k-val{ color:#14110f !important; }
  .kpi .k-val small{ color:#5a524c !important; }
  #print-only{ display:block !important; }
  #print-only tr.rep td, #print-only table.ptbl thead th{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
}
</style>
</head>
<body>
<div class="app">

  <!-- ============ SIDEBAR condivisa Fiorentina (iniettata da fio_sidebar.js) ============ -->
  <div id="sidebar-mount"></div>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <header class="topbar">
      <img class="crest" id="crest" alt="Stemma Fiorentina">
      <div class="title-wrap">
        <h1>Atlete</h1>
        <div class="sub" id="subtitle"><b>Rosa U19W</b> · Stagione 2025-26</div>
      </div>
      <div class="top-right">
        <span class="gen-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span id="gen-txt">—</span></span>
      </div>
    </header>

    <div class="wrap">
      <!-- KPIs -->
      <div class="kpis" id="kpis"></div>

      <!-- controls -->
      <div class="controls">
        <label class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="search" type="search" placeholder="Cerca atleta..." aria-label="Cerca atleta">
        </label>
        <div class="field">
          <select class="picker" id="sort" aria-label="Ordina rosa">
            <option value="nome">Nome (A-Z)</option>
            <option value="minuti">Minuti</option>
            <option value="sedute">Sedute</option>
            <option value="partite">Partite</option>
          </select>
        </div>
        <span class="spacer"></span>
        <button class="btn ghost" id="btn-reset" title="Annulla le modifiche ai ruoli salvate su questo dispositivo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
          Azzera modifiche
        </button>
        <button class="btn ghost" id="btn-print" title="Stampa o salva la rosa in PDF, raggruppata per reparto">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          PDF
        </button>
        <button class="btn ghost" id="btn-export" title="Esporta i ruoli in CSV per il database della rosa">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="M8 11l4 4 4-4"/><path d="M4 21h16"/></svg>
          CSV
        </button>
        <button class="btn primary" id="btn-xls" title="Esporta la rosa in Excel (.xls) con reparti e statistiche di stagione">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 8l8 8M16 8l-8 8"/></svg>
          Excel
        </button>
      </div>

      <!-- role filter pills -->
      <div class="pills" id="pills" role="tablist" aria-label="Filtra per reparto"></div>

      <!-- roster grid -->
      <div class="grid" id="grid"></div>

      <!-- tabella solo-stampa (PDF rosa per reparto) -->
      <div id="print-only" aria-hidden="true"></div>
    </div>

    <p class="foot-note">
      Sezione coach · i ruoli assegnati qui restano su questo dispositivo. Usa "Esporta CSV ruoli"
      per riportarli nel database della rosa. Le statistiche sono i totali di stagione gia' calcolati.
    </p>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<!-- snapshot dati calcolati (window.SNAP) -->
<script src="./carico_data.js"></script>
<script>
window.SNAP = window.SNAP || {generato:'',stagione:'2025-26',squadra:'Fiorentina Primavera U19W',
  metrics_full:[],metrics_short:[],metrics_unit:[],sum_flags:[],key_idx:[],model:[],
  team:{months:[],matches:[]},players:{},logo:''};
</script>

<!-- sidebar area Fiorentina -->
<script src="./fio_sidebar.js"></script>
<script>
(function(){
  if(window.SIDEBAR_CSS){ const s=document.createElement('style'); s.textContent=window.SIDEBAR_CSS; document.head.appendChild(s); }
  const mount=document.getElementById('sidebar-mount');
  if(window.SIDEBAR_HTML && mount){ mount.outerHTML=window.SIDEBAR_HTML; }
  if(window.markActiveNav) window.markActiveNav('atlete');
  if(window.initSidebarToggle) window.initSidebarToggle();
})();
</script>

<!-- rosa -->
<script>
(function(){
  "use strict";
  const S = window.SNAP;
  const M = S.metrics_full || [];
  const NF0 = new Intl.NumberFormat('it-IT', { maximumFractionDigits: 0 });
  const NF1 = new Intl.NumberFormat('it-IT', { maximumFractionDigits: 1 });
  const REDUCE = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const LS_KEY = 'rs_fio_roles';

  // ruoli canonici assegnabili (portiere separato, poi difesa -> attacco)
  const ROLES = ['Portiere','Difensore centrale','Terzino','Play','Mezzala','Esterno','Punta'];
  const UNASSIGNED = 'Da assegnare';

  const iMin  = M.indexOf('Minuti') >= 0 ? M.indexOf('Minuti') : 0;
  const iDist = M.indexOf('Dist tot') >= 0 ? M.indexOf('Dist tot') : 1;

  // ---------- helpers ----------
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function normRole(r){
    const v = (r==null?'':String(r)).trim();
    if(!v || v.toLowerCase()==='nan') return '';
    return v;
  }
  function initials(name){
    const parts = String(name||'').trim().split(/\s+/).filter(Boolean);
    if(!parts.length) return '?';
    if(parts.length===1) return parts[0].slice(0,2).toUpperCase();
    return (parts[0][0]+parts[1][0]).toUpperCase();
  }

  // ---------- overrides (localStorage) ----------
  function loadOverrides(){
    try{ const o = JSON.parse(localStorage.getItem(LS_KEY)||'{}'); return (o && typeof o==='object') ? o : {}; }
    catch(e){ return {}; }
  }
  function saveOverrides(o){
    try{ localStorage.setItem(LS_KEY, JSON.stringify(o)); }catch(e){}
  }
  let overrides = loadOverrides();

  // ---------- build player model ----------
  function buildPlayers(){
    const src = S.players || {};
    return Object.keys(src).sort((a,b)=> a.localeCompare(b,'it')).map(name=>{
      const p = src[name] || {};
      const months = p.months || [];
      let min=0, dist=0, sedute=0, partite=0;
      months.forEach(m=>{
        (m.rows||[]).forEach(r=>{
          if(r.type==='day') sedute++;
          else if(r.type==='match') partite++;
          else if(r.type==='tot_month'){
            const vm = (r.v && r.v[iMin]  != null) ? r.v[iMin]  : 0;
            const vd = (r.v && r.v[iDist] != null) ? r.v[iDist] : 0;
            min  += (+vm||0);
            dist += (+vd||0);
          }
        });
      });
      const snapRole = normRole(p.role);
      return { name, snapRole, min, dist, sedute, partite };
    });
  }
  const PLAYERS = buildPlayers();

  function effRole(pl){
    if(Object.prototype.hasOwnProperty.call(overrides, pl.name)) return normRole(overrides[pl.name]);
    return pl.snapRole;
  }

  // ---------- state ----------
  const state = { q:'', sort:'nome', filter:'__all__' };

  // ---------- KPIs ----------
  function renderKPIs(){
    const host = document.getElementById('kpis');
    const total = PLAYERS.length;
    let assigned = 0;
    const repartiSet = new Set();
    PLAYERS.forEach(pl=>{ const r = effRole(pl); if(r){ assigned++; repartiSet.add(r); } });
    const daAssegnare = total - assigned;
    const cards = [
      { c:'',  label:'Rosa totale',   val: total,        unit:'' },
      { c:'g', label:'Assegnate',     val: assigned,     unit:'' },
      { c:'r', label:'Da assegnare',  val: daAssegnare,  unit:'' },
      { c:'o', label:'Reparti coperti', val: repartiSet.size, unit:'/'+ROLES.length },
    ];
    host.innerHTML = cards.map(k=>
      '<div class="kpi '+k.c+'"><div class="k-label">'+esc(k.label)+'</div>'+
      '<div class="k-val tnum">'+NF0.format(k.val)+ (k.unit?'<small>'+esc(k.unit)+'</small>':'') +'</div></div>'
    ).join('');
  }

  // ---------- filter pills ----------
  function renderPills(){
    const host = document.getElementById('pills');
    const counts = {}; ROLES.forEach(r=> counts[r]=0);
    let unassignedCount = 0;
    PLAYERS.forEach(pl=>{ const r = effRole(pl); if(r && counts.hasOwnProperty(r)) counts[r]++; else if(!r) unassignedCount++; });
    let html = '';
    html += pillHTML('__all__', 'Tutte', PLAYERS.length, false);
    ROLES.forEach(r=>{ if(counts[r]>0) html += pillHTML(r, r, counts[r], false); });
    if(unassignedCount>0) html += pillHTML('__none__', UNASSIGNED, unassignedCount, true);
    host.innerHTML = html;
    host.querySelectorAll('.pill').forEach(b=> b.addEventListener('click', ()=>{
      state.filter = b.getAttribute('data-f'); syncPills(); renderGrid();
    }));
    syncPills();
  }
  function pillHTML(key, label, count, warn){
    return '<button class="pill'+(warn?' warn':'')+'" data-f="'+esc(key)+'" role="tab" aria-selected="false">'+
      esc(label)+' <span class="cnt tnum">'+count+'</span></button>';
  }
  function syncPills(){
    document.querySelectorAll('#pills .pill').forEach(b=>{
      const on = b.getAttribute('data-f')===state.filter;
      b.classList.toggle('on', on); b.setAttribute('aria-selected', on);
    });
  }

  // ---------- grid ----------
  function currentList(){
    const q = state.q.trim().toLowerCase();
    let list = PLAYERS.filter(pl=>{
      if(q && pl.name.toLowerCase().indexOf(q)<0) return false;
      if(state.filter==='__all__') return true;
      const r = effRole(pl);
      if(state.filter==='__none__') return !r;
      return r===state.filter;
    });
    const s = state.sort;
    list = list.slice().sort((a,b)=>{
      if(s==='minuti')  return b.min-a.min || a.name.localeCompare(b.name,'it');
      if(s==='sedute')  return b.sedute-a.sedute || a.name.localeCompare(b.name,'it');
      if(s==='partite') return b.partite-a.partite || a.name.localeCompare(b.name,'it');
      return a.name.localeCompare(b.name,'it');
    });
    return list;
  }
  function renderGrid(){
    const host = document.getElementById('grid');
    const list = currentList();
    if(!list.length){
      host.style.display='block';
      host.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">'+
        '<circle cx="9" cy="8" r="3.2"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M17 8h4M19 6v4"/></svg>'+
        '<b>Nessuna atleta</b>Nessun risultato per i filtri attivi.</div>';
      return;
    }
    host.style.display='grid';
    host.innerHTML = list.map((pl,i)=>{
      const r = effRole(pl);
      const unassigned = !r;
      const km = pl.dist/1000;
      const opts = '<option value=""'+(unassigned?' selected':'')+'>'+esc(UNASSIGNED)+'</option>'+
        ROLES.map(role=> '<option value="'+esc(role)+'"'+(role===r?' selected':'')+'>'+esc(role)+'</option>').join('');
      return ''+
      '<article class="pcard reveal" style="--i:'+Math.min(i,16)+'">'+
        '<div class="pcard-top">'+
          '<div class="avatar" aria-hidden="true">'+esc(initials(pl.name))+'</div>'+
          '<div class="pcard-id">'+
            '<div class="pname" title="'+esc(pl.name)+'">'+esc(pl.name)+'</div>'+
            '<span class="role-wrap'+(unassigned?' unassigned':'')+'">'+
              '<select class="role-select" data-name="'+esc(pl.name)+'" aria-label="Ruolo di '+esc(pl.name)+'">'+opts+'</select>'+
            '</span>'+
          '</div>'+
        '</div>'+
        '<div class="pstats">'+
          '<div class="pstat"><span class="ps-v">'+NF0.format(Math.round(pl.min))+'</span><span class="ps-l">Min</span></div>'+
          '<div class="pstat"><span class="ps-v">'+NF0.format(pl.sedute)+'</span><span class="ps-l">Sedute</span></div>'+
          '<div class="pstat"><span class="ps-v">'+NF0.format(pl.partite)+'</span><span class="ps-l">Partite</span></div>'+
          '<div class="pstat"><span class="ps-v">'+NF1.format(km)+'</span><span class="ps-l">Km</span></div>'+
        '</div>'+
        '<a class="pcard-link" href="carico.html?atleta='+encodeURIComponent(pl.name)+'">'+
          'Dettaglio carico'+
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>'+
        '</a>'+
      '</article>';
    }).join('');
    host.querySelectorAll('.role-select').forEach(sel=> sel.addEventListener('change', onRoleChange));
  }

  // ---------- role edit ----------
  function onRoleChange(e){
    const sel = e.target;
    const name = sel.getAttribute('data-name');
    const val = normRole(sel.value);
    const pl = PLAYERS.find(p=> p.name===name);
    if(!pl) return;
    // salva override solo se diverso dallo snapshot, altrimenti rimuovi
    if(val === pl.snapRole){ delete overrides[name]; }
    else { overrides[name] = val; }
    saveOverrides(overrides);
    // aggiorna solo lo stile del chip senza ridisegnare tutta la griglia (evita perdita di focus)
    const wrap = sel.closest('.role-wrap');
    if(wrap) wrap.classList.toggle('unassigned', !val);
    renderKPIs(); renderPills();
    updateResetBtn();
    // se la card non rientra piu' nel filtro, ridisegna
    if(state.filter!=='__all__'){
      const r = effRole(pl);
      const stillIn = state.filter==='__none__' ? !r : r===state.filter;
      if(!stillIn) renderGrid();
    }
  }

  function updateResetBtn(){
    const btn = document.getElementById('btn-reset');
    const has = Object.keys(overrides).length>0;
    btn.disabled = !has;
  }

  // ---------- export CSV ----------
  function exportCSV(){
    const rows = [['player','role']];
    PLAYERS.forEach(pl=> rows.push([pl.name, effRole(pl)]));
    const csv = rows.map(r=> r.map(csvCell).join(';')).join('\r\n');
    const blob = new Blob(['﻿'+csv], { type:'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'rosa_ruoli_'+dateStamp()+'.csv';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=> URL.revokeObjectURL(url), 1500);
    toast('CSV ruoli esportato ('+PLAYERS.length+' atlete)');
  }
  function csvCell(v){
    const s = String(v==null?'':v);
    return /[";\r\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }
  function dateStamp(){
    const d = new Date(), p = n=> String(n).padStart(2,'0');
    return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate());
  }

  // ---------- raggruppa la rosa per reparto (ordine ROLES, ordinata per minuti) ----------
  function groupByReparto(){
    const order = ROLES.slice();
    const groups = {}; order.forEach(r=> groups[r]=[]);
    const none = [];
    PLAYERS.forEach(pl=>{ const r=effRole(pl); if(r && groups[r]) groups[r].push(pl); else none.push(pl); });
    const byMin = arr=> arr.slice().sort((a,b)=> b.min-a.min || a.name.localeCompare(b.name,'it'));
    order.forEach(r=> groups[r]=byMin(groups[r]));
    return { order, groups, none: byMin(none) };
  }

  // ---------- tabella solo-stampa (PDF) ----------
  function buildPrintRoster(){
    const host = document.getElementById('print-only');
    if(!host) return;
    const { order, groups, none } = groupByReparto();
    let rows='';
    const emit = (label, arr, na)=>{
      if(!arr.length) return;
      rows += '<tr class="rep"><td class="l" colspan="5">'+esc(label)+' &#183; '+arr.length+'</td></tr>';
      arr.forEach(pl=>{
        rows += '<tr'+(na?' class="na"':'')+'><td class="l">'+esc(pl.name)+'</td>'+
          '<td>'+NF0.format(Math.round(pl.min))+'</td>'+
          '<td>'+NF0.format(pl.sedute)+'</td>'+
          '<td>'+NF0.format(pl.partite)+'</td>'+
          '<td>'+NF1.format(pl.dist/1000)+'</td></tr>';
      });
    };
    order.forEach(r=> emit(r, groups[r], false));
    emit(UNASSIGNED, none, true);
    const assigned = PLAYERS.length - none.length;
    const gen = S.generato ? ('agg. '+esc(S.generato)) : 'anteprima';
    host.innerHTML =
      '<div class="proster-h">Rosa Fiorentina Primavera U19W &#183; '+PLAYERS.length+' atlete ('+assigned+' assegnate, '+none.length+' da assegnare) &#183; Stagione '+esc(S.stagione||'2025-26')+' &#183; '+gen+'</div>'+
      '<table class="ptbl"><thead><tr><th class="l">Atleta</th><th>Min</th><th>Sedute</th><th>Partite</th><th>Km</th></tr></thead>'+
      '<tbody>'+rows+'</tbody></table>';
  }

  // ---------- export XLS (Excel vero, con colori, per reparto) ----------
  function exportXLS(){
    const VIO='#5b2d90', VIOL='#efe7f7', BRD='#d9d2e6', MUT='#6b6472', REDBG='#fdebec', REDT='#9f2f2d';
    const { order, groups, none } = groupByReparto();
    let body='';
    const emit = (label, arr, na)=>{
      if(!arr.length) return;
      body += '<tr class="rep"><td class="lbl" colspan="6">'+esc(label)+' &#183; '+arr.length+'</td></tr>';
      arr.forEach(pl=>{
        body += '<tr'+(na?' class="na"':'')+'><td class="lbl">'+esc(pl.name)+'</td>'+
          '<td class="lbl">'+esc(effRole(pl)||UNASSIGNED)+'</td>'+
          '<td>'+NF0.format(Math.round(pl.min))+'</td>'+
          '<td>'+NF0.format(pl.sedute)+'</td>'+
          '<td>'+NF0.format(pl.partite)+'</td>'+
          '<td>'+NF1.format(pl.dist/1000)+'</td></tr>';
      });
    };
    order.forEach(r=> emit(r, groups[r], false));
    emit(UNASSIGNED, none, true);
    const assigned = PLAYERS.length - none.length;

    let h = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel">'+
      '<head><meta charset="utf-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet>'+
      '<x:Name>Rosa</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>'+
      '</x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->'+
      '<style>table{border-collapse:collapse;font-family:Calibri,Arial,sans-serif;font-size:11pt}'+
      'td,th{border:1px solid '+BRD+';padding:5px 9px;text-align:right}'+
      'th{background:'+VIO+';color:#fff;font-weight:700;text-align:center}'+
      'td.lbl,th.lbl{text-align:left}td.lbl{font-weight:500}'+
      'tr.rep td{background:'+VIOL+';font-weight:700;color:'+VIO+';text-align:left}'+
      'tr.na td{background:'+REDBG+'}tr.na td.lbl{color:'+REDT+'}'+
      '.ttl{font-size:15pt;font-weight:700;color:'+VIO+';border:none;text-align:left}'+
      '.sub{color:'+MUT+';border:none;text-align:left}</style></head><body>';
    h += '<table><tr><td class="ttl" colspan="6">Rosa Fiorentina Primavera U19W</td></tr>'+
      '<tr><td class="sub" colspan="6">'+PLAYERS.length+' atlete &#183; '+assigned+' assegnate &#183; '+none.length+' da assegnare &#183; Stagione '+esc(S.stagione||'2025-26')+'</td></tr>'+
      (S.generato?'<tr><td class="sub" colspan="6">Aggiornato: '+esc(S.generato)+'</td></tr>':'')+
      '</table>';
    h += '<table><tr><th class="lbl">Atleta</th><th class="lbl">Ruolo</th><th>Minuti</th><th>Sedute</th><th>Partite</th><th>Km</th></tr>'+body+'</table>';
    h += '</body></html>';

    const blob = new Blob(['﻿'+h], { type:'application/vnd.ms-excel;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'rosa_ruoli_'+dateStamp()+'.xls';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=> URL.revokeObjectURL(url), 1500);
    toast('Excel rosa esportato ('+PLAYERS.length+' atlete)');
  }

  // ---------- reset overrides ----------
  function resetOverrides(){
    if(!Object.keys(overrides).length) return;
    overrides = {}; saveOverrides(overrides);
    renderKPIs(); renderPills(); renderGrid(); updateResetBtn();
    toast('Modifiche ai ruoli annullate');
  }

  // ---------- toast ----------
  let toastTmr=null;
  function toast(msg){
    const t = document.getElementById('toast');
    t.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>'+esc(msg);
    t.classList.add('show');
    clearTimeout(toastTmr);
    toastTmr = setTimeout(()=> t.classList.remove('show'), 3000);
  }

  // ---------- logo ----------
  (function(){
    const c = document.getElementById('crest');
    c.src = S.logo || './fiorentina.png';
    c.addEventListener('error', function(){
      const f=document.createElement('div'); f.className='crest-fallback'; f.textContent='ACF'; c.replaceWith(f);
    });
  })();
  document.getElementById('gen-txt').textContent = S.generato ? ('agg. '+S.generato) : 'anteprima';
  document.getElementById('subtitle').innerHTML = '<b>Rosa U19W</b> · '+esc(PLAYERS.length)+' atlete · Stagione '+esc(S.stagione||'2025-26');

  // ---------- wiring ----------
  let qTmr=null;
  document.getElementById('search').addEventListener('input', e=>{
    clearTimeout(qTmr); const v=e.target.value;
    qTmr = setTimeout(()=>{ state.q=v; renderGrid(); }, 120);
  });
  document.getElementById('sort').addEventListener('change', e=>{ state.sort=e.target.value; renderGrid(); });
  document.getElementById('btn-export').addEventListener('click', exportCSV);
  document.getElementById('btn-xls').addEventListener('click', exportXLS);
  document.getElementById('btn-print').addEventListener('click', ()=>{ buildPrintRoster(); window.print(); });
  document.getElementById('btn-reset').addEventListener('click', resetOverrides);
  window.addEventListener('beforeprint', buildPrintRoster);

  // ---------- init ----------
  renderKPIs(); renderPills(); renderGrid(); updateResetBtn(); buildPrintRoster();
})();
</script>
</body>
</html>
