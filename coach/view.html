<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="color-scheme" content="dark">
<title>RS Coaching - Piano settimanale</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><rect width='36' height='36' rx='10' fill='%23E2611C'/><rect x='9' y='20' width='4.2' height='7' rx='2.1' fill='white' opacity='.6'/><rect x='15.9' y='15' width='4.2' height='12' rx='2.1' fill='white' opacity='.82'/><rect x='22.8' y='9' width='4.2' height='18' rx='2.1' fill='white'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<!-- RS Coaching - Visualizzatore piano in SOLA LETTURA.
     Questa pagina esegue solo richieste GET verso Firebase: non scrive mai nulla.
     Riceve un token in ?t=<base64url(JSON)> che identifica una settimana
     ({wk, ctx:'grp'|'ath'|'ver', aid?, vid?}). -->
<style>
:root{
  --bg:#0E0B11;--content:#0B0810;
  --card:rgba(28,23,30,.90);--card2:rgba(34,28,37,.92);--card3:rgba(41,34,44,.92);
  --border:rgba(255,255,255,.08);--border2:rgba(255,106,46,.26);
  --primary:#FF6A2E;--primary2:#FF8A57;--violet2:#A78BFA;--teal:#06B6D4;
  --red:#F43F5E;--green:#22C55E;--amber:#F59E0B;
  --white:#F4F1EC;--muted:#8E8678;--text:#CAC3B7;
  --shadow-card:0 4px 24px rgba(0,0,0,.40),inset 0 1px 0 rgba(255,255,255,.06);
  --ease-out:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);}
body{
  font-family:'Inter',sans-serif;color:var(--text);min-height:100dvh;
  background:
    radial-gradient(1100px 520px at 78% -8%,rgba(255,106,46,.10),transparent 60%),
    radial-gradient(900px 520px at 8% 4%,rgba(139,92,246,.07),transparent 58%),
    var(--bg);
  -webkit-font-smoothing:antialiased;line-height:1.5;
}
.wrap{max-width:820px;margin:0 auto;padding:22px 18px 56px;}

/* HEADER */
.vh{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:6px 2px 18px;border-bottom:1px solid var(--border);margin-bottom:22px;}
.brand{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--white);line-height:1;}
.brand span{color:var(--primary);}
.brand small{display:block;font-family:'Inter',sans-serif;font-size:9.5px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin-top:3px;}
.vh-meta{flex:1;min-width:160px;text-align:right;}
.vh-week{font-family:'Bebas Neue',sans-serif;font-size:23px;letter-spacing:.6px;color:var(--white);line-height:1.05;}
.vh-scope{font-size:11.5px;font-weight:600;color:var(--violet2);margin-top:3px;letter-spacing:.2px;}
.vh-ro{flex-basis:100%;display:flex;justify-content:flex-end;}
.vh-ro b{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.05);border:1px solid var(--border);padding:3px 9px;border-radius:999px;}

/* STATS */
.stats{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.stats-lbl{font-size:11px;font-weight:700;color:var(--text);margin-right:4px;}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text);background:rgba(255,255,255,.05);border:1px solid var(--border);padding:4px 9px;border-radius:999px;}
.chip .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.chip b{color:var(--white);font-weight:800;}

/* DAY CARD */
.day{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow-card);}
.day-hdr{display:flex;align-items:center;gap:10px;padding:11px 15px;}
.day-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.2px;line-height:1;text-transform:uppercase;}
.day-date{font-size:11.5px;font-weight:600;opacity:.92;}
.day-hdr-neutral{background:rgba(255,255,255,.045);border-bottom:1px solid var(--border);}
.day-hdr-neutral .day-name{color:var(--white);}
.day-hdr-neutral .day-date{color:var(--muted);}
.day-hdr-color .day-name,.day-hdr-color .day-date{color:#fff;}
.rel-badge{margin-left:auto;font-size:10px;font-weight:700;letter-spacing:.4px;padding:3px 8px;border-radius:6px;white-space:nowrap;background:rgba(255,255,255,.22);color:#fff;}
.rel-badge.gara{background:#fff;color:#991B1B;font-weight:900;}
.day-body{padding:11px 13px 13px;}
.day.is-game{border-color:rgba(244,63,94,.5);box-shadow:0 0 0 1px rgba(244,63,94,.22),var(--shadow-card);}

.rest{font-size:13px;color:var(--muted);font-style:italic;padding:5px 2px;}

/* SESSION */
.sess{border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:9px;background:rgba(0,0,0,.18);}
.sess:last-child{margin-bottom:0;}
.sess-hdr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:7px 12px;}
.sess-type{font-size:12px;font-weight:800;letter-spacing:.3px;color:#fff;}
.sess-name{font-size:11px;font-weight:600;color:rgba(255,255,255,.86);}
.sess-dur{margin-left:auto;font-size:10.5px;font-weight:600;color:rgba(255,255,255,.78);white-space:nowrap;}
.sess-note{font-size:12px;color:var(--text);font-style:italic;padding:8px 12px;background:rgba(255,255,255,.03);border-bottom:1px solid var(--border);line-height:1.45;}
.sess-body{padding:4px 0 0;}

/* EXERCISE TABLE */
.extbl{width:100%;border-collapse:collapse;}
.extbl th{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);text-align:left;padding:6px 12px;background:rgba(255,255,255,.025);}
.extbl th.num,.extbl td.num{text-align:center;white-space:nowrap;}
.extbl td{font-size:12.5px;padding:7px 12px;border-top:1px solid var(--border);vertical-align:top;}
.extbl td.exn{font-weight:600;color:var(--white);}
.extbl td.num{color:var(--text);}
.extbl td.note{font-size:11px;color:var(--muted);font-style:italic;line-height:1.4;}
.extbl tr:first-child td{border-top:none;}

/* RUN PHASES */
.run{padding:4px 12px 9px;display:flex;flex-direction:column;gap:7px;}
.fase{display:flex;align-items:flex-start;gap:10px;}
.zchip{flex-shrink:0;width:30px;text-align:center;font-size:11px;font-weight:800;color:#0B0810;padding:3px 0;border-radius:6px;line-height:1.1;margin-top:1px;}
.fase-body{flex:1;min-width:0;}
.fase-main{font-size:13px;font-weight:600;color:var(--white);}
.fase-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.fase-note{font-size:11px;color:var(--text);font-style:italic;margin-top:2px;line-height:1.4;}

/* STATES */
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px;padding:64px 20px;color:var(--muted);}
.state-ic{font-size:42px;opacity:.5;}
.state-ti{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.5px;color:rgba(244,241,236,.7);}
.state-sub{font-size:13px;max-width:320px;line-height:1.5;}
.sk{background:var(--card);border:1px solid var(--border);border-radius:14px;height:120px;margin-bottom:12px;overflow:hidden;position:relative;}
.sk::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.045),transparent);transform:translateX(-100%);animation:shimmer 1.25s infinite;}
@keyframes shimmer{100%{transform:translateX(100%);}}

/* FOOTER */
.vf{margin-top:26px;padding-top:16px;border-top:1px solid var(--border);text-align:center;font-size:10.5px;color:var(--muted);letter-spacing:.3px;}

/* ENTRANCE */
.day,.stats{opacity:0;transform:translateY(10px);animation:rise .5s var(--ease-out) forwards;}
@keyframes rise{to{opacity:1;transform:translateY(0);}}
@media (prefers-reduced-motion:reduce){
  .day,.stats{animation:none;opacity:1;transform:none;}
  .sk::after{animation:none;}
}
@media (max-width:520px){
  .wrap{padding:18px 13px 44px;}
  .vh-meta{text-align:left;min-width:0;}
  .vh-ro{justify-content:flex-start;}
}
</style>
</head>
<body>
<div class="wrap">
  <header class="vh">
    <div class="brand">RS<span>C</span><small>Strength &amp; Conditioning</small></div>
    <div class="vh-meta">
      <div class="vh-week" id="vhWeek">Caricamento</div>
      <div class="vh-scope" id="vhScope"></div>
    </div>
    <div class="vh-ro"><b>Sola lettura</b></div>
  </header>
  <main id="content">
    <div class="sk"></div><div class="sk"></div><div class="sk"></div>
  </main>
  <footer class="vf">RS Coaching &middot; Strength &amp; Conditioning &middot; Piano condiviso in sola lettura</footer>
</div>

<script>
(function(){
  "use strict";
  var DB_URL='https://rscoaching-a6c61-default-rtdb.europe-west1.firebasedatabase.app';

  var DAYS=['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];
  var DAYS_SHORT=['LUN','MAR','MER','GIO','VEN','SAB','DOM'];
  var TYPE_NAME={squadra:'Squadra',forza:'Forza',sprint:'Sprint',plyo:'Pliometria',rec:'Recupero',priming:'Priming',riposo:'Riposo',conditioning:'Conditioning',z2:'Z2 Easy',lungo:'Long Run',tempo:'Tempo/Soglia',interval:'Interval',match:'Partita',test:'Test atletico'};
  var TYPE_COLOR={squadra:'#2563EB',forza:'#7C3AED',sprint:'#DC2626',plyo:'#D97706',rec:'#059669',priming:'#0891B2',riposo:'#64748B',conditioning:'#EA580C',z2:'#22C55E',lungo:'#0EA5E9',tempo:'#F59E0B',interval:'#EF4444',match:'#DC2626',test:'#D97706'};
  var ZC={Z1:'#10B981',Z2:'#3B82F6',Z3:'#F59E0B',Z4:'#F97316',Z5:'#EF4444'};
  var ZL={Z1:'Recupero',Z2:'Aerobica',Z3:'Medio/Tempo',Z4:'Soglia',Z5:'VO₂max'};

  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function isDateWk(wk){return /^\d{4}-\d{2}-\d{2}$/.test(String(wk||''));}

  function b64urlDecode(s){
    try{
      s=String(s).replace(/-/g,'+').replace(/_/g,'/');
      while(s.length%4)s+='=';
      return decodeURIComponent(escape(atob(s)));
    }catch(e){return null;}
  }
  function parseToken(){
    var m=location.search.match(/[?&]t=([^&]+)/);
    if(!m)return null;
    var raw=b64urlDecode(decodeURIComponent(m[1]));
    if(!raw)return null;
    try{var o=JSON.parse(raw);}catch(e){return null;}
    if(!o||!o.wk)return null;
    return o;
  }

  function fmIT(d,long){return d.toLocaleDateString('it-IT',long?{day:'numeric',month:'long'}:{day:'numeric',month:'short'});}

  function dayHdrColor(di,gameDay){
    if(gameDay==null)return null;
    var diff=di-gameDay;
    if(diff===0)return '#991B1B';
    if(diff===-1)return '#6D28D9';
    if(diff===-2)return '#5B21B6';
    if(diff===-3)return '#1E40AF';
    if(diff===1)return '#065F46';
    if(diff===2)return '#047857';
    return null;
  }
  function dayRel(di,gameDay){
    if(gameDay==null)return '';
    var diff=di-gameDay;
    if(diff===0)return '⚽ GARA';
    if(diff===-1)return 'G-1';if(diff===-2)return 'G-2';if(diff===-3)return 'G-3';
    if(diff===1)return 'G+1';if(diff===2)return 'G+2';if(diff===3)return 'G+3';
    return '';
  }

  async function getJSON(path){
    try{var r=await fetch(DB_URL+path);return r.ok?await r.json():null;}catch(e){return null;}
  }

  async function loadPlan(tok){
    var wk=tok.wk, ctx=tok.ctx||'grp', pd=null, scopeName='Gruppo';
    if(ctx==='ver'){
      var v=await getJSON('/plan_versions/'+encodeURIComponent(wk)+'/'+encodeURIComponent(tok.vid)+'.json');
      if(v){pd=v.days||{};scopeName=(v.name?('Versione: '+v.name):'Versione');}
    }else if(ctx==='ath'){
      pd=await getJSON('/athlete_plans/'+encodeURIComponent(tok.aid)+'/'+encodeURIComponent(wk)+'/days.json');
      var nm=await getJSON('/athletes/'+encodeURIComponent(tok.aid)+'/name.json');
      scopeName=(nm||tok.aid||'Atleta');
    }else{
      pd=await getJSON('/plans/'+encodeURIComponent(wk)+'.json');
      scopeName='Gruppo';
    }
    pd=pd||{};
    var conf=pd._config||null;
    if(!conf && isDateWk(wk)){
      var c=await getJSON('/plans/'+encodeURIComponent(wk)+'/_config.json');
      if(c)conf=c;
    }
    return {wk:wk,pd:pd,conf:conf||{},scopeName:scopeName};
  }

  function sessionsOf(dayData){
    return Object.keys(dayData||{}).filter(function(k){return k.charAt(0)!=='_';})
      .map(function(k){return dayData[k];})
      .filter(function(s){return s&&typeof s==='object'&&s.type;});
  }

  function renderExTable(s){
    var exs=s.exercises;
    if(!exs||typeof exs!=='object')return '';
    var arr=Array.isArray(exs)?exs:Object.values(exs);
    arr=arr.filter(function(e){return e&&e.name;}).sort(function(a,b){return (a.order||0)-(b.order||0);});
    if(!arr.length)return '';
    var hasNote=arr.some(function(e){return e.cue||e.notes||e.note;});
    var h='<table class="extbl"><thead><tr><th>Esercizio</th><th class="num">S</th><th class="num">R</th><th class="num">Carico</th><th class="num">Rec</th>'+(hasNote?'<th>Note</th>':'')+'</tr></thead><tbody>';
    arr.forEach(function(e){
      var load=e.pct?('@'+esc(e.pct)+'%'+(e.rpe?(' RPE '+esc(e.rpe)):'')):(e.rpe?('RPE '+esc(e.rpe)):esc(e.carico||e.load||'-'));
      var note=hasNote?'<td class="note">'+esc(e.cue||e.notes||e.note||'')+'</td>':'';
      h+='<tr><td class="exn">'+esc(e.name)+'</td><td class="num">'+esc(e.sets||'-')+'</td><td class="num">'+esc(e.reps||'-')+'</td><td class="num">'+load+'</td><td class="num">'+esc(e.rest||'')+'</td>'+note+'</tr>';
    });
    return h+'</tbody></table>';
  }

  function renderRun(s){
    var cf=s.corsaFasi;
    if(!cf)return '';
    var arr=Array.isArray(cf)?cf:Object.values(cf);
    arr=arr.filter(function(f){return f&&typeof f==='object';});
    if(!arr.length)return '';
    var h='<div class="run">';
    arr.forEach(function(f){
      var isIntv=f.reps||f.repDist||f.repPace;
      var main=isIntv
        ? [(f.reps?(esc(f.reps)+'×'):''),esc(f.repDist||''),(f.repPace?('@ '+esc(f.repPace)):'')].filter(Boolean).join(' ')
        : [esc(f.dist||''),esc(f.pace||'')].filter(Boolean).join(' · ');
      if(!main)main=esc(f.tipo||'Corsa');
      var rec=f.rec||f.recDist||f.recTime||f.recPace||'';
      var sub=[];
      if(f.tipo && main!==esc(f.tipo))sub.push(esc(f.tipo));
      if(rec)sub.push('rec '+esc(rec));
      if(f.zona&&ZL[f.zona])sub.push(ZL[f.zona]);
      var z=f.zona&&ZC[f.zona]?'<span class="zchip" style="background:'+ZC[f.zona]+'">'+esc(f.zona)+'</span>':'<span class="zchip" style="background:#475569;color:#fff">'+esc(f.zona||'-')+'</span>';
      h+='<div class="fase">'+z+'<div class="fase-body"><div class="fase-main">'+main+'</div>'
        +(sub.length?'<div class="fase-sub">'+sub.join(' · ')+'</div>':'')
        +(f.note?'<div class="fase-note">'+esc(f.note)+'</div>':'')
        +'</div></div>';
    });
    return h+'</div>';
  }

  function renderSession(s){
    var col=TYPE_COLOR[s.type]||'#6B7280';
    var tname=TYPE_NAME[s.type]||s.type;
    var nm=(s.name&&s.name!==tname)?'<span class="sess-name">'+esc(s.name)+'</span>':'';
    var dur=s.duration?'<span class="sess-dur">'+esc(s.duration)+'</span>':'';
    var note=s.note?'<div class="sess-note">'+esc(s.note)+'</div>':'';
    var body=renderExTable(s)+renderRun(s);
    return '<div class="sess"><div class="sess-hdr" style="background:'+col+'"><span class="sess-type">'+esc(tname)+'</span>'+nm+dur+'</div>'+note+(body?'<div class="sess-body">'+body+'</div>':'')+'</div>';
  }

  function renderDay(di,dayData,mon,gameDay){
    var sess=sessionsOf(dayData).filter(function(s){return s.type!=='riposo';});
    var hasRiposo=sessionsOf(dayData).some(function(s){return s.type==='riposo';});
    var isGame=gameDay!=null&&String(gameDay)===String(di);
    var col=dayHdrColor(di,gameDay);
    var rel=dayRel(di,gameDay);

    var dateTxt='Giorno '+(di+1);
    if(mon){var d=new Date(mon);d.setDate(mon.getDate()+di);dateTxt=DAYS[di]+' '+fmIT(d,false);}

    var hdrCls=col?'day-hdr day-hdr-color':'day-hdr day-hdr-neutral';
    var hdrStyle=col?' style="background:'+col+'"':'';
    var badge=rel?'<span class="rel-badge'+(isGame?' gara':'')+'">'+rel+'</span>':'';
    var hdr='<div class="'+hdrCls+'"'+hdrStyle+'><span class="day-name">'+DAYS_SHORT[di]+'</span><span class="day-date">'+esc(mon?fmIT(new Date(mon.getTime()+di*864e5),false):('G'+(di+1)))+'</span>'+badge+'</div>';

    var inner;
    if(!sess.length&&hasRiposo){inner='<div class="rest">😴 Riposo</div>';}
    else if(!sess.length){inner='<div class="rest">Non pianificato</div>';}
    else{inner=sess.map(renderSession).join('');}

    return '<section class="day'+(isGame?' is-game':'')+'">'+hdr+'<div class="day-body">'+inner+'</div></section>';
  }

  function renderStats(pd){
    var total=0,counts={};
    for(var i=0;i<7;i++){
      sessionsOf(pd[String(i)]).forEach(function(s){
        if(s.type&&s.type!=='riposo'){total++;counts[s.type]=(counts[s.type]||0)+1;}
      });
    }
    if(!total)return '';
    var chips=Object.keys(counts).map(function(t){
      return '<span class="chip"><i class="dot" style="background:'+(TYPE_COLOR[t]||'#888')+'"></i>'+esc(TYPE_NAME[t]||t)+' <b>'+counts[t]+'</b></span>';
    }).join('');
    return '<div class="stats"><span class="stats-lbl">'+total+' '+(total===1?'seduta':'sedute')+'</span>'+chips+'</div>';
  }

  function showState(ic,ti,sub){
    document.getElementById('content').innerHTML='<div class="state"><div class="state-ic">'+ic+'</div><div class="state-ti">'+esc(ti)+'</div><div class="state-sub">'+esc(sub)+'</div></div>';
  }

  async function main(){
    var tok=parseToken();
    if(!tok){
      document.getElementById('vhWeek').textContent='Link non valido';
      showState('🔗','Link non valido','Il link sembra incompleto o danneggiato. Chiedi al coach di rigenerarlo.');
      return;
    }
    var data;
    try{data=await loadPlan(tok);}catch(e){data=null;}
    if(!data){
      document.getElementById('vhWeek').textContent='Errore';
      showState('⚠','Impossibile caricare','Non è stato possibile recuperare il piano. Controlla la connessione e riprova.');
      return;
    }

    var wk=data.wk, pd=data.pd, conf=data.conf;
    var gameDay=conf.gameDay!=null?parseInt(String(conf.gameDay),10):null;
    if(isNaN(gameDay))gameDay=null;

    var mon=isDateWk(wk)?new Date(wk+'T00:00:00'):null;
    if(mon&&isNaN(mon.getTime()))mon=null;

    var weekLabel,titleLabel;
    if(mon){
      var sun=new Date(mon);sun.setDate(mon.getDate()+6);
      weekLabel=fmIT(mon,true)+' - '+fmIT(sun,true);
      titleLabel=fmIT(mon,false)+' - '+fmIT(sun,false);
    }else{
      weekLabel='Piano senza data';titleLabel='Piano';
    }
    if(conf.weekType)weekLabel+=' · '+esc(String(conf.weekType).toUpperCase());

    document.getElementById('vhWeek').innerHTML=weekLabel;
    document.getElementById('vhScope').textContent=data.scopeName||'';
    document.title='RS Coaching · '+titleLabel;

    var hasAny=false;
    for(var i=0;i<7;i++){if(sessionsOf(pd[String(i)]).length){hasAny=true;break;}}
    if(!hasAny){
      showState('📅','Settimana vuota','Per questa settimana non è ancora stata pianificata nessuna seduta.');
      return;
    }

    var html=renderStats(pd);
    for(var di=0;di<7;di++){html+=renderDay(di,pd[String(di)]||{},mon,gameDay);}
    var el=document.getElementById('content');
    el.innerHTML=html;
    // staggered entrance
    var blocks=el.querySelectorAll('.stats,.day');
    for(var b=0;b<blocks.length;b++){blocks[b].style.animationDelay=(b*45)+'ms';}
  }

  main();
})();
</script>
</body>
</html>
