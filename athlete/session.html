<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RS Coaching — Sessione</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23FF6830'/><text x='16' y='23' font-family='Arial Black,sans-serif' font-size='18' font-weight='900' fill='white' text-anchor='middle'>RS</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F1117;
  --card:#1E2433;
  --card2:#242B3A;
  --card3:#2C3347;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.10);
  --orange:#FF6830;
  --orange2:#FF8B5A;--violet:#6366F1;--violet2:#818CF8;--shadow-v:0 4px 14px rgba(99,102,241,.3);
  --amber:#F59E0B;
  --red:#EF4444;
  --green:#22C55E;
  --teal:#06D6A0;
  --purple:#818CF8;
  --white:#E2E8F0;
  --muted:#64748B;
  --text:#94A3B8;
  --blur:blur(6px);
  --grad-o:linear-gradient(135deg,#FF6830,#FF3800);
  --shadow-card:0 2px 12px rgba(0,0,0,.4);
  --shadow-btn:0 4px 18px rgba(255,104,48,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);min-height:100%;}
body{font-family:'Inter',sans-serif;color:var(--text);padding-bottom:100px;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(255,104,48,.1) 0%,transparent 70%);pointer-events:none;z-index:0;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── HEADER */
.hdr{
  background:rgba(7,7,15,.9);
  border-bottom:1px solid var(--border);
  padding:14px 18px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:20;
  box-shadow:0 2px 24px rgba(0,0,0,.4);
}
.back{
  background:#1E2433;border:1px solid var(--border2);
  color:var(--white);font-size:18px;cursor:pointer;line-height:1;
  padding:8px 12px;border-radius:9px;transition:all .18s;flex-shrink:0;
}
.back:active{background:rgba(255,104,48,.15);border-color:var(--orange);transform:scale(.93);}
.hdr-info{flex:1;min-width:0;}
.hdr-name{
  font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:1.5px;
  color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.hdr-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.live-pill{
  background:rgba(255,104,48,.12);border:1px solid rgba(255,104,48,.3);
  color:var(--orange);font-size:10px;font-weight:800;
  padding:5px 12px;border-radius:20px;
  animation:blink 2s ease-in-out infinite;
  flex-shrink:0;letter-spacing:.8px;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ── PROGRESS */
.prog-bar{height:3px;background:var(--border);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--orange2));transition:width .5s ease;}

/* ── EX NAV DOTS */
.ex-nav{display:flex;gap:7px;padding:14px 16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.ex-nav::-webkit-scrollbar{display:none;}
.ex-dot{
  width:34px;height:34px;border-radius:50%;
  border:2px solid var(--border2);background:var(--card2);
  color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;flex-shrink:0;
}
.ex-dot.active{
  background:var(--orange);border-color:var(--orange);color:#fff;
  box-shadow:0 0 14px rgba(255,104,48,.45);
}
.ex-dot.done{
  background:rgba(74,222,128,.15);border-color:var(--green);
  color:var(--green);
}

/* ── CONTENT */
.content{padding:14px 16px;}

/* ── EX CARD */
.ex-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;overflow:hidden;margin-bottom:14px;
  animation:fadeUp .3s ease both;position:relative;z-index:1;
}

/* ── TYPE PILLS */
.ex-type-pill{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;
  padding:3px 10px;border-radius:12px;display:inline-block;margin-bottom:6px;
}
.tp-pesi{background:rgba(99,102,241,.10);color:var(--purple);border:1px solid rgba(99,102,241,.25);}
.tp-campo{background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.22);}
.tp-sprint{background:rgba(255,82,82,.12);color:var(--red);border:1px solid rgba(255,82,82,.22);}
.tp-complex{background:rgba(255,104,48,.1);color:var(--orange);border:1px solid rgba(255,104,48,.22);}
.tp-cond{background:rgba(255,209,102,.1);color:var(--amber);border:1px solid rgba(255,209,102,.22);}

/* ── EX CARD HEAD */
.ex-card-head{
  padding:18px 18px 13px;
  background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,rgba(255,255,255,.02) 100%);
  border-bottom:1px solid var(--border);
}
.ex-card-name{
  font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;
  color:var(--white);line-height:1.1;
}
.ex-video-link{display:inline-flex;align-items:center;gap:4px;margin-top:5px;padding:4px 10px;background:rgba(255,104,48,.1);border:1px solid rgba(255,104,48,.22);border-radius:20px;color:var(--orange);font-size:10px;font-weight:700;text-decoration:none;letter-spacing:.5px;}
.ex-video-link:active{background:rgba(255,104,48,.22);}
.ex-card-params{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.6;}

/* ── CUE */
.cue-chip{
  background:rgba(255,209,102,.07);border:1px solid rgba(255,209,102,.18);
  border-radius:10px;padding:8px 12px;font-size:11px;color:var(--amber);
  margin-top:10px;display:flex;gap:8px;align-items:flex-start;line-height:1.5;
}

/* ── SUGGESTED KG */
.sug-kg-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  background:linear-gradient(135deg,rgba(99,102,241,.08) 0%,rgba(255,104,48,.05) 100%);
  border-bottom:1px solid rgba(99,102,241,.10);
}
.sug-kg-lbl{font-size:11px;color:var(--text);}
.sug-kg-pct{font-size:10px;color:var(--muted);margin-top:1px;}
.sug-kg-val{
  font-family:'Bebas Neue',sans-serif;font-size:36px;
  color:var(--purple);letter-spacing:1px;line-height:1;
}
.sug-kg-unit{font-size:14px;color:var(--muted);font-family:'Inter',sans-serif;}

/* ── SETS TABLE */
.sets-wrap{padding:0 12px 12px;}
.sets-head{
  display:grid;grid-template-columns:30px 40px 44px 1fr 78px 36px;
  gap:5px;padding:8px 10px;
  background:rgba(255,255,255,.02);border-radius:10px;
  margin:10px 0 6px;
}
.sets-head span{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}

.set-row{
  display:grid;grid-template-columns:30px 40px 44px 1fr 78px 36px;
  gap:5px;padding:8px 10px;border-radius:13px;
  align-items:center;margin-bottom:5px;
  background:#1E2433;border:1.5px solid var(--border);
  transition:all .22s cubic-bezier(.4,0,.2,1);
}
.set-row.cur{
  background:rgba(255,104,48,.07);border-color:rgba(255,104,48,.38);
  box-shadow:0 0 0 3px rgba(255,104,48,.07),0 2px 12px rgba(255,104,48,.1);
}
.set-row.done{
  background:rgba(74,222,128,.05);border-color:rgba(74,222,128,.28);
}

.sn{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted);text-align:center;}
.sn.d{color:var(--green);}
.reps-lbl{font-size:14px;font-weight:600;color:var(--white);text-align:center;}

/* ── KG INPUT */
.kg-inp{
  width:100%;background:var(--card3);border:2px solid var(--border2);
  border-radius:12px;font-family:'Bebas Neue',sans-serif;
  font-size:26px;color:#E2E8F0;text-align:center;padding:10px 4px;
  -webkit-appearance:none;transition:all .2s;
}
.kg-inp:focus{
  outline:none;border-color:var(--orange);
  background:rgba(255,104,48,.08);
  box-shadow:0 0 0 3px rgba(255,104,48,.15);color:#fff;
}
.kg-inp.d{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.06);}
.kg-inp::placeholder{color:#4A4A5A;font-size:18px;}
.kg-inp.suggested{color:rgba(255,255,255,.25);border-color:rgba(255,255,255,.1);}
.kg-inp.suggested:focus{color:var(--white);border-color:var(--orange);}
.prev-reps-hint{font-size:9px;color:rgba(255,255,255,.2);text-align:center;margin-top:1px;letter-spacing:.3px;}

/* ── REPS INPUT */
.reps-inp{
  width:100%;background:var(--card3);border:1.5px solid var(--border2);
  border-radius:8px;font-size:14px;font-weight:700;color:#E2E8F0;
  text-align:center;padding:8px 2px;font-family:'Inter',sans-serif;transition:all .2s;
}
.reps-inp:focus{outline:none;border-color:var(--orange);background:rgba(255,104,48,.06);}
.reps-inp::placeholder{color:#4A4A5A;}

/* ── RPE */
.rpe-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.rpe-row{display:flex;gap:3px;}
.rpe-d{
  width:16px;height:16px;border-radius:50%;
  border:2px solid var(--border2);cursor:pointer;transition:all .2s;
  background:var(--card3);
}
.rpe-d:active{transform:scale(1.3);}
.rpe-d.r6,.rpe-d.r7{background:var(--green);border-color:var(--green);box-shadow:0 0 6px rgba(74,222,128,.4);}
.rpe-d.r8{background:var(--amber);border-color:var(--amber);box-shadow:0 0 6px rgba(255,209,102,.4);}
.rpe-d.r9,.rpe-d.r10{background:var(--red);border-color:var(--red);box-shadow:0 0 6px rgba(255,82,82,.4);}
.rpe-val{font-size:9px;font-weight:700;color:var(--muted);}
.rpe-val.v6,.rpe-val.v7{color:var(--green);}
.rpe-val.v8{color:var(--amber);}
.rpe-val.v9,.rpe-val.v10{color:var(--red);}

/* ── DONE BUTTON */
.done-btn{
  width:36px;height:36px;border-radius:50%;border:2px solid var(--border2);
  background:var(--card3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:all .2s;color:var(--muted);
}
.done-btn.d{
  background:var(--green);border-color:var(--green);color:#0E0E13;font-weight:900;
  box-shadow:0 0 12px rgba(74,222,128,.35);
}
.done-btn:active{transform:scale(.85);}

/* ── E1RM */
.e1rm-wrap{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;border-top:1px solid var(--border);
  background:rgba(255,255,255,.01);flex-wrap:wrap;
}
.e1rm-chip{
  background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.22);
  border-radius:10px;padding:6px 12px;display:flex;align-items:center;gap:8px;
}
.e1rm-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--purple);}
.e1rm-lbl{font-size:10px;color:var(--muted);}
.pr-chip{
  background:linear-gradient(135deg,rgba(255,104,48,.18),rgba(255,209,102,.12));
  border:1px solid rgba(255,104,48,.35);border-radius:10px;
  padding:6px 12px;font-size:12px;font-weight:700;color:var(--orange);
  animation:poppr .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes poppr{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

/* ── REST OVERLAY */
.rest-ov{
  position:fixed;inset:0;
  background:rgba(5,5,12,.96);
  z-index:100;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
}
.rest-ov.h{display:none;}
.rest-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;}
.rest-big{
  font-family:'Bebas Neue',sans-serif;font-size:100px;
  color:var(--white);letter-spacing:-4px;line-height:1;
  transition:color .3s;text-shadow:0 0 40px rgba(255,104,48,.2);
}
.rest-big.warn{color:var(--amber);text-shadow:0 0 40px rgba(255,209,102,.3);}
.rest-prog{width:220px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.rest-pf{height:100%;background:linear-gradient(90deg,var(--orange),var(--orange2));transition:width 1s linear;border-radius:3px;}
.rest-hint{font-size:13px;color:var(--muted);text-align:center;max-width:240px;line-height:1.5;}
.rest-hint strong{color:var(--white);}
.rest-skip{
  padding:13px 36px;background:linear-gradient(135deg,var(--orange),var(--orange2));
  color:#fff;border:none;border-radius:14px;
  font-family:'Inter',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;margin-top:6px;box-shadow:0 4px 20px rgba(255,104,48,.3);
}
.rest-skip:active{transform:scale(.97);}

/* ── COMPLEX / SUPERSET */
.cx-hdr{
  background:rgba(255,104,48,.07);border:1px solid rgba(255,104,48,.18);
  border-radius:12px;padding:10px 14px;
  font-size:11px;font-weight:700;color:var(--orange);
  text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.cx-sep{
  background:rgba(255,104,48,.05);border-top:1px solid rgba(255,104,48,.12);
  padding:8px 16px;font-size:10px;font-weight:700;color:var(--orange);
  text-transform:uppercase;letter-spacing:1.2px;
  display:flex;align-items:center;gap:6px;
}
/* ── SET TYPE BADGES */
.st-badge{display:inline-flex;align-items:center;justify-content:center;min-width:28px;font-size:9px;font-weight:800;padding:2px 6px;border-radius:5px;letter-spacing:.6px;flex-shrink:0;}
.st-work{background:rgba(6,214,160,.12);color:#06d6a0;}
.st-W{background:rgba(148,163,184,.12);color:#94a3b8;}
.st-BO{background:rgba(251,191,36,.12);color:#fbbf24;}
.st-D{background:rgba(251,113,74,.15);color:#fb7240;}
.st-F{background:rgba(239,68,68,.15);color:#ef4444;}
.st-section{border-top:1px solid var(--border);padding:6px 16px 2px;display:flex;align-items:center;gap:8px;}
.st-section-lbl{font-size:10px;font-weight:700;letter-spacing:.5px;}
.set-row.st-alt{background:rgba(255,255,255,.012);}
.set-row.st-alt .sn{opacity:.5;}
.set-row.st-alt .reps-inp,.set-row.st-alt .kg-inp{opacity:.8;}

/* ── CAMPO */
.campo-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border-bottom:1px solid var(--border);
  transition:background .15s;
}
.campo-item:last-child{border-bottom:none;}
.campo-item.ck{background:rgba(74,222,128,.04);opacity:.65;}
.int-box{
  width:46px;height:46px;border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex-shrink:0;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
}
.ib-b{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);color:var(--green);}
.ib-m{background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.25);color:var(--amber);}
.ib-a{background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.25);color:var(--red);}
.ib-x{background:rgba(255,82,82,.2);border:2px solid rgba(255,82,82,.4);color:var(--red);}
.campo-name{flex:1;font-weight:600;font-size:14px;color:var(--white);}
.campo-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.campo-ck{
  width:38px;height:38px;border-radius:50%;
  border:2px solid var(--border2);background:var(--card3);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:all .2s;flex-shrink:0;
}
.campo-ck.ck{background:var(--green);border-color:var(--green);box-shadow:0 0 12px rgba(74,222,128,.3);}

/* ── CONDITIONING */
.cond-wrap{padding:18px 16px;}
.cond-badge{
  font-size:11px;font-weight:700;padding:4px 11px;border-radius:12px;
  background:rgba(255,209,102,.1);color:var(--amber);
  border:1px solid rgba(255,209,102,.25);
  text-transform:uppercase;letter-spacing:.8px;
  display:inline-block;margin-bottom:6px;
}
.cond-type-tabs{
  display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;
}
.cond-type-tab{
  padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;
  border:1px solid var(--border2);background:var(--card3);color:var(--muted);
  cursor:pointer;transition:all .15s;
}
.cond-type-tab.active{
  background:rgba(255,104,48,.12);border-color:rgba(255,104,48,.4);
  color:var(--orange);
}

/* ── EMOM/AMRAP timer */
.cond-timer{
  font-family:'Bebas Neue',sans-serif;font-size:80px;
  color:var(--white);text-align:center;letter-spacing:-3px;margin:8px 0;
  text-shadow:0 0 30px rgba(255,104,48,.15);
}
.cond-btns{display:flex;gap:10px;justify-content:center;margin-bottom:14px;}
.cond-btn{
  padding:11px 28px;border-radius:12px;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;border:none;transition:all .15s;
}
.cb-start{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;box-shadow:0 4px 15px rgba(255,104,48,.25);}
.cb-start:active{transform:scale(.97);}
.cb-reset{background:var(--card3);color:var(--text);border:1px solid var(--border2);}
.cond-content{
  font-size:13px;color:var(--text);white-space:pre-line;line-height:1.8;
  background:var(--card3);border:1px solid var(--border);
  border-radius:12px;padding:14px;
}
.rounds-ctrl{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:12px;}
.rnd-btn{
  width:40px;height:40px;border-radius:50%;
  background:var(--card3);border:1.5px solid var(--border2);
  color:var(--white);font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.rnd-btn:active{transform:scale(.88);background:var(--card2);}
.rnd-val{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--white);}

/* ── TABATA */
.tabata-wrap{text-align:center;}
.tabata-phase{
  font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;
  text-transform:uppercase;margin-bottom:6px;
}
.tabata-phase.work{color:var(--orange);}
.tabata-phase.rest{color:var(--green);}
.tabata-phase.prep{color:var(--amber);}
.tabata-time{
  font-family:'Bebas Neue',sans-serif;font-size:100px;
  letter-spacing:-4px;line-height:1;margin:4px 0 10px;
  transition:color .3s;
}
.tabata-time.work{color:var(--orange);text-shadow:0 0 30px rgba(255,104,48,.3);}
.tabata-time.rest{color:var(--green);text-shadow:0 0 30px rgba(74,222,128,.25);}
.tabata-time.prep{color:var(--amber);text-shadow:0 0 30px rgba(255,209,102,.2);}
.tabata-info{
  display:flex;justify-content:center;gap:16px;margin-bottom:12px;
}
.tabata-stat{
  background:var(--card3);border:1px solid var(--border2);border-radius:12px;
  padding:10px 16px;min-width:70px;
}
.tabata-stat-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--white);}
.tabata-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;}
.tabata-prog-bar{
  width:100%;height:8px;background:var(--border);border-radius:4px;overflow:hidden;
  margin:10px 0;
}
.tabata-prog-fill{
  height:100%;transition:width .1s linear;border-radius:4px;
}
.tabata-prog-fill.work{background:linear-gradient(90deg,var(--orange),var(--orange2));}
.tabata-prog-fill.rest{background:linear-gradient(90deg,var(--green),#6EE7B7);}
.tabata-prog-fill.prep{background:linear-gradient(90deg,var(--amber),#FDE68A);}
.tabata-settings{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0;
}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, push, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg={apiKey:"AIzaSyAayWDWvUQqtAfIlm7qA8kMKxJu2-_y7k4",authDomain:"rscoaching-a6c61.firebaseapp.com",databaseURL:"https://rscoaching-a6c61-default-rtdb.europe-west1.firebasedatabase.app",projectId:"rscoaching-a6c61",storageBucket:"rscoaching-a6c61.firebasestorage.app",messagingSenderId:"499942544251",appId:"1:499942544251:web:bd246cc6846b0fad89e3de"};
const app=initializeApp(cfg);
const db=getDatabase(app);

const p=new URLSearchParams(window.location.search);
const AID=p.get('id'), PROG=p.get('prog'), WEEK=parseInt(p.get('week')||'0'), SESS=p.get('sess');
const isQuick=p.get('quick')==='1';

let athlete={}, session={};
let exs=[], setData={}, best1rm={}, newPRs=[], campoChecked={};
let cur=0, startTs=Date.now();
// History: {exName: [{kg, reps}, ...]} from last session containing each exercise
let _prevKg={};
let restIv=null, restTotal=0, restLeft=0;
let condIv=null, condSecs=0, condRunning=false, condRounds=0;
// Tabata state
let tabWork=20, tabRest=10, tabRounds=8;
let tabSecs=0, tabPhase='prep', tabCurRound=1, tabRunning=false, tabIv=null;
let tabPrepSecs=3;

async function init(){
  if(!AID){err('ID atleta mancante');return;}
  try{
    const [aS,rmS,logsS]=await Promise.all([
      get(ref(db,`athletes/${AID}`)),
      get(ref(db,`rm_records/${AID}`)),
      get(ref(db,`session_logs/${AID}`))
    ]);
    if(!aS.exists()){err('Atleta non trovato');return;}
    athlete=aS.val();
    Object.values(rmS.val()||{}).forEach(er=>{
      Object.values(er).forEach(r=>{
        if(r.exName&&(!best1rm[r.exName]||r.value>best1rm[r.exName]))best1rm[r.exName]=r.value;
      });
    });
    // Build _prevKg: most recent kg/reps per exercise from past sessions
    _prevKg={};
    const logs=Object.values(logsS.val()||{}).sort((a,b)=>(b.ts||0)-(a.ts||0));
    for(const log of logs){
      if(!log.exerciseData)continue;
      for(const [exName,setsArr] of Object.entries(log.exerciseData)){
        if(!_prevKg[exName]&&Array.isArray(setsArr)&&setsArr.length){
          _prevKg[exName]=setsArr; // [{kg, reps}, ...]
        }
      }
    }

    if(isQuick){
      const stored=sessionStorage.getItem(`rsc_quick_${AID}`);
      if(!stored){err('Dati sessione non trovati. Torna all\'app e riprova.');return;}
      const {day,exs:qExs}=JSON.parse(stored);
      session={name:day.note||'Sessione rapida',type:day.type};
      buildFromArray(day.type,qExs||[]);
      setup();return;
    }
    if(!PROG||!SESS){err('Parametri sessione mancanti');return;}
    const pS=await get(ref(db,`programs/${PROG}`));
    if(!pS.exists()){err('Programma non trovato');return;}
    const prog=pS.val();
    const weeks=Object.entries(prog.weeks||{}).sort((a,b)=>a[1].order-b[1].order);
    if(WEEK>=weeks.length){err(`Settimana ${WEEK+1} non trovata`);return;}
    const [,wkData]=weeks[WEEK];
    const s=wkData.sessions?.[SESS];
    if(!s){err('Sessione non trovata');return;}
    session=s;
    buildFromSession(s);
    setup();
  }catch(e){console.error(e);err('Errore: '+e.message);}
}
init();

function setup(){
  document.getElementById('loading').style.display='none';
  document.getElementById('sapp').style.display='block';
  document.getElementById('hdr-name').textContent=session.name||'Sessione';
  document.getElementById('hdr-meta').textContent=`${athlete.name}${PROG?' · Sett.'+(WEEK+1):' · Piano rapido'}`;
  document.getElementById('home-btn').onclick=()=>{location.href=`../athlete/?id=${AID}`;};
  renderExNav();render();
}

function buildFromSession(s){
  exs=[];
  if(s.type==='conditioning'){
    exs=[{_type:'cond',name:s.name||s.condType||'Conditioning',condType:s.condType,duration:s.duration,condContent:s.condContent}];
    return;
  }
  const raw=Object.entries(s.exercises||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0)).map(([,e])=>e);
  if(!raw.length){exs=[{_type:'nota',name:s.name||'Seduta',note:s.notes||''}];return;}
  buildFromArray(s.type,raw);
}

function buildFromArray(type,arr){
  if(!arr||!arr.length){exs=[{_type:'nota',name:'Seduta',note:''}];return;}
  if(type==='conditioning'){exs=[{_type:'cond',...arr[0]}];return;}
  if(type==='campo'){exs=arr.map(e=>({...e,_type:'campo'}));initSets();return;}
  const cgroups={};
  arr.forEach(e=>{if(e.complexGroup){if(!cgroups[e.complexGroup])cgroups[e.complexGroup]=[];cgroups[e.complexGroup].push(e);}});
  const seen=new Set();exs=[];
  arr.forEach(e=>{
    if(!e.complexGroup){exs.push({...e,_type:'pesi'});}
    else if(!seen.has(e.complexGroup)){
      seen.add(e.complexGroup);
      const items=cgroups[e.complexGroup];
      exs.push({_type:'complex',items,rest:items.slice(-1)[0]?.rest});
    }
  });
  initSets();
}

function initSets(){
  exs.forEach((ex,i)=>{
    if(ex._type==='pesi'){
      setData[i]={};
      // Support setRows: count total sets across all row groups
      const totalS=ex.setRows&&ex.setRows.length
        ? ex.setRows.reduce((a,r)=>a+(parseInt(r.sets)||1),0)
        : (parseInt(ex.sets)||3);
      const hist=_prevKg[ex.name]||[];
      for(let s=0;s<totalS;s++){
        const h=hist[s]||{};
        const prevK=h.kg!=null&&h.kg!==''?String(h.kg):'';
        const prevR=h.reps!=null?String(h.reps):''; // actual reps from last session
        setData[i][s]={kg:prevK,suggested:!!prevK,prevReps:prevR,reps:null,rpe:null,done:false};
      }
    } else if(ex._type==='complex'){
      setData[i]={};
      ex.items.forEach((item,ci)=>{
        setData[i][ci]={};
        for(let s=0;s<(parseInt(item.sets)||4);s++)setData[i][ci][s]={kg:'',rpe:null,done:false};
      });
    }
  });
}

function renderExNav(){
  const el=document.getElementById('ex-nav');
  el.innerHTML=exs.map((ex,i)=>{
    const allDone=checkAllDone(i);
    return `<div class="ex-dot${i===cur?' active':''}${allDone?' done':''}" onclick="jumpTo(${i})">${allDone?'✓':i+1}</div>`;
  }).join('');
  const dot=el.children[cur];
  if(dot)dot.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function checkAllDone(i){
  const ex=exs[i];if(!ex)return false;
  if(ex._type==='campo')return !!(campoChecked[i]);
  if(ex._type==='cond'||ex._type==='nota')return false;
  const sd=setData[i]||{};
  if(ex._type==='complex')return ex.items.every((_,ci)=>Object.values(sd[ci]||{}).every(s=>s.done));
  return Object.values(sd).length>0&&Object.values(sd).every(s=>s.done);
}
window.jumpTo=i=>{cur=i;render();};

function render(){
  // Preserve input values and focus across re-render
  const savedVals={};
  document.querySelectorAll('#content input[id]').forEach(inp=>{savedVals[inp.id]=inp.value;});
  const focusedId=document.activeElement&&document.activeElement.id||null;

  const ex=exs[cur];
  const isLast=cur===exs.length-1;
  const nb=document.getElementById('next-btn');
  nb.textContent=isLast?'COMPLETA ✓':'PROSSIMO →';
  nb.className='next-btn'+(isLast?' fin':'');
  document.getElementById('pfill').style.width=`${(cur/Math.max(exs.length,1))*100}%`;
  renderExNav();
  if(!ex){document.getElementById('content').innerHTML='<div style="padding:24px;text-align:center;color:var(--muted);">Nessun esercizio.</div>';return;}
  let html='';
  if(ex._type==='nota')html=renderNota(ex);
  else if(ex._type==='cond')html=renderCond(ex);
  else if(ex._type==='campo')html=renderCampo(ex,cur);
  else if(ex._type==='complex')html=renderComplex(ex,cur);
  else html=renderPesi(ex,cur);
  document.getElementById('content').innerHTML=html;

  // Restore values and focus
  Object.entries(savedVals).forEach(([id,v])=>{const el=document.getElementById(id);if(el&&v!==undefined)el.value=v;});
  if(focusedId){const el=document.getElementById(focusedId);if(el){el.focus();const len=el.value.length;try{el.setSelectionRange(len,len);}catch(e){}}}

  if(ex._type==='cond')setupCondUI();
  window.scrollTo(0,0);
}

function kgSugFor(ex){
  const rm=best1rm[ex.name]||0;
  const pct=parseFloat(ex.pct)||0;
  const kgD=parseFloat(ex.kg)||0;
  return kgD>0?kgD:(rm>0&&pct>0?Math.round(rm*pct/100/2.5)*2.5:0);
}

function renderPesi(ex,ei){
  const sets=parseInt(ex.sets)||3;
  const rm=best1rm[ex.name]||0;
  const pct=parseFloat(ex.pct)||0;
  const kgSug=kgSugFor(ex);
  // Build set rows — supports new setRows format + old flat sets/reps
  const ST_META={
    '': {label:'Working',cls:'st-work'},
    'W': {label:'W · Warm Up',cls:'st-W'},
    'BO':{label:'BO · Back Off',cls:'st-BO'},
    'D': {label:'D · Drop Set',cls:'st-D'},
    'F': {label:'F · Failure',cls:'st-F'}
  };
  const rows=ex.setRows&&ex.setRows.length
    ? ex.setRows
    : [{type:'',sets,reps:ex.reps||''}];

  // Compute flat set index across all row groups
  const sd=setData[ei]||{};
  const totalSets=rows.reduce((a,r)=>a+(parseInt(r.sets)||1),0);
  const doneN=Object.values(sd).filter(s=>s.done).length;

  // e1RM across all sets
  let e1rm=0;
  for(let s=0;s<totalSets;s++){
    if(sd[s]?.done&&sd[s]?.kg){
      const repsForRow=ex.reps||1; // use primary reps for estimation
      const e=Math.round(parseFloat(sd[s].kg)*(1+parseFloat(repsForRow)/30));
      if(e>e1rm)e1rm=e;
    }
  }
  const isPR=e1rm>0&&e1rm>(best1rm[ex.name]||0);
  const _vidUrl=typeof getExUrl==='function'?getExUrl(ex.name||''):null;

  // Build set rows HTML
  let setIdx=0;
  const setsBodyHtml=rows.map(row=>{
    const nSets=parseInt(row.sets)||1;
    const st=ST_META[row.type||'']||ST_META[''];
    const isWorking=!row.type;
    // Section header for named types
    const secHdr=`<div class="st-section">
      <span class="st-badge ${st.cls}">${row.type||'W'}</span>
      <span class="st-section-lbl" style="color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:1px;">${st.label}</span>
      ${row.reps?`<span style="margin-left:auto;font-size:11px;color:var(--muted);">Target: <strong style="color:var(--white);">${row.reps}</strong></span>`:''}
    </div>`;
    const rowHtml=Array.from({length:nSets},(_,i)=>{
      const s=setIdx++;
      const d=sd[s]||{kg:'',rpe:null,done:false};
      const isCur=s===doneN&&!d.done;
      const isSug=!d.done&&d.suggested&&d.kg;
      const targetReps=row.reps||ex.reps||'';
      const actualReps=d.reps!=null?String(d.reps):'';
      const prevRepHint=d.prevReps&&!d.done&&!actualReps?d.prevReps:'';
      return `<div class="set-row${d.done?' done':isCur?' cur':''}${isWorking?'':' st-alt'}">
        <span class="sn${d.done?' d':''}">${s+1}</span>
        <span class="reps-lbl" style="font-size:13px;color:rgba(255,255,255,.32);text-align:center;align-self:center;">${targetReps||'—'}</span>
        <input class="reps-inp" type="text" inputmode="numeric"
          value="${actualReps}" placeholder="${prevRepHint||'—'}" id="reps-${ei}-${s}"
          oninput="setRepsActual(${ei},${s},this.value)">
        <div style="display:flex;flex-direction:column;align-items:center;">
          <input class="kg-inp${d.done?' d':''}${isSug?' suggested':''}" type="number" inputmode="decimal"
            value="${d.kg}" placeholder="${kgSug||'—'}" id="kg-${ei}-${s}"
            oninput="setKg(${ei},${s},this.value,this)">
          ${isSug?`<div class="prev-reps-hint">↑ scorsa</div>`:''}
        </div>
        <div class="rpe-col">
          <div class="rpe-row">${[6,7,8].map(r=>`<div class="rpe-d${d.rpe===r?' r'+r:''}" onclick="setRpe(${ei},${s},${r})" title="RPE ${r}"></div>`).join('')}</div>
          <div class="rpe-row">${[9,10].map(r=>`<div class="rpe-d${d.rpe===r?' r'+r:''}" onclick="setRpe(${ei},${s},${r})" title="RPE ${r}"></div>`).join('')}</div>
          <div class="rpe-val${d.rpe?' v'+d.rpe:''}">${d.rpe?'RPE '+d.rpe:'—'}</div>
        </div>
        <button class="done-btn${d.done?' d':''}" onclick="toggleDone(${ei},${s})">${d.done?'✓':''}</button>
      </div>`;
    }).join('');
    return (rows.length>1?secHdr:'')+rowHtml;
  }).join('');

  const hasSetRows=rows.length>1;
  const paramsSummary=hasSetRows
    ? rows.map(r=>`${r.sets}×${r.reps||'—'}${r.type?' ['+r.type+']':''}`).join(' + ')
    : `${sets} serie · ${ex.reps||'—'} reps`;

  return `<div class="ex-card">
    <div class="ex-card-head">
      <span class="ex-type-pill tp-pesi">🏋️ Pesi</span>
      <div class="ex-card-name">${ex.name}</div>
      <div class="ex-card-params">${paramsSummary}${pct>0?` · @${pct}% 1RM`:ex.carico?` · ${ex.carico}`:''}${ex.rpe?` · RPE target ${ex.rpe}`:''}</div>
      ${ex.cue?`<div class="cue-chip">💡 ${ex.cue}</div>`:''}
      ${_vidUrl?`<a href="${_vidUrl}" target="_blank" class="ex-video-link">▶ VIDEO</a>`:''}
    </div>
    ${kgSug>0?`<div class="sug-kg-bar">
      <div><div class="sug-kg-lbl">Carico suggerito</div><div class="sug-kg-pct">${pct>0?`${pct}% di ${rm}kg`:'Diretto'}</div></div>
      <div><span class="sug-kg-val">${kgSug}</span><span class="sug-kg-unit"> kg</span></div>
    </div>`:''}
    ${pct>0&&rm===0?`<div style="padding:10px 16px;background:rgba(255,209,102,.06);border-bottom:1px solid var(--border);font-size:11px;color:var(--amber);">⚠ Imposta 1RM nel profilo per vedere il carico</div>`:''}
    <div class="sets-wrap">
      <div class="sets-head"><span>Set</span><span style="text-align:center;">Target</span><span style="text-align:center;">Fatte</span><span>Kg usati</span><span style="text-align:center;">RPE</span><span></span></div>
      ${setsBodyHtml}
    </div>
    ${e1rm>0?`<div class="e1rm-wrap">
      <div class="e1rm-chip"><div class="e1rm-lbl">e1RM stimato</div><div class="e1rm-val">${e1rm}kg</div></div>
      ${isPR?'<div class="pr-chip">🏆 NEW PR!</div>':''}
    </div>`:''}
    ${ex.rest?`<div style="padding:8px 16px 12px;font-size:11px;color:var(--muted);">⏱ Recupero: <strong style="color:var(--text);">${ex.rest}</strong></div>`:''}
  </div>`;
}

function renderComplex(ex,ei){
  const sets=parseInt(ex.items[0]?.sets)||4;
  let html=`<div class="ex-card"><div class="ex-card-head">
    <span class="ex-type-pill tp-complex">🔁 Superset / Complex</span>
    <div class="ex-card-name">${ex.items.map(it=>it.name).join(' + ')}</div>
    <div class="ex-card-params">${sets} round · Rec ${ex.rest||"3'"} dopo ogni round</div>
  </div>`;
  ex.items.forEach((item,ci)=>{
    const kgSug=kgSugFor(item);
    const csd=setData[ei]?.[ci]||{};
    html+=`<div class="cx-sep">${item.complexLabel||`A${ci+1}`} · ${item.name}</div>
    ${item.cue?`<div style="padding:8px 16px;"><div class="cue-chip">💡 ${item.cue}</div></div>`:''}
    ${kgSug>0?`<div class="sug-kg-bar"><div><div class="sug-kg-lbl">${item.name}</div><div class="sug-kg-pct">Sugg.</div></div><div><span class="sug-kg-val">${kgSug}</span><span class="sug-kg-unit"> kg</span></div></div>`:''}
    <div class="sets-wrap" style="padding-top:8px;">
      <div class="sets-head"><span>Rd</span><span style="text-align:center;">Target</span><span style="text-align:center;">Fatte</span><span>Kg</span><span style="text-align:center;">RPE</span><span></span></div>
      ${Array.from({length:sets},(_,s)=>{
        const d=csd[s]||{kg:'',rpe:null,done:false};
        return `<div class="set-row${d.done?' done':''}">
          <span class="sn${d.done?' d':''}">${s+1}</span>
          <span class="reps-lbl" style="color:rgba(255,255,255,.32);text-align:center;align-self:center;">${item.reps||'—'}</span>
          <input class="reps-inp" type="text" inputmode="numeric" value="${d.reps||''}" placeholder="—" id="reps-cx-${ei}-${ci}-${s}" oninput="setCxReps(${ei},${ci},${s},this.value)">
          <input class="kg-inp${d.done?' d':''}" type="number" inputmode="decimal" value="${d.kg}" placeholder="${kgSug||'—'}" oninput="setCxKg(${ei},${ci},${s},this.value)">
          <div class="rpe-col">
            <div class="rpe-row">${[6,7,8].map(r=>`<div class="rpe-d${d.rpe===r?' r'+r:''}" onclick="setCxRpe(${ei},${ci},${s},${r})"></div>`).join('')}</div>
            <div class="rpe-row">${[9,10].map(r=>`<div class="rpe-d${d.rpe===r?' r'+r:''}" onclick="setCxRpe(${ei},${ci},${s},${r})"></div>`).join('')}</div>
            <div class="rpe-val${d.rpe?' v'+d.rpe:''}">${d.rpe?'RPE '+d.rpe:'—'}</div>
          </div>
          <button class="done-btn${d.done?' d':''}" onclick="toggleCxDone(${ei},${ci},${s})">${d.done?'✓':''}</button>
        </div>`;
      }).join('')}
    </div>`;
  });
  return html+'</div>';
}

function setupCondUI(){
  condSecs=0;condRunning=false;
  tabRunning=false;tabPhase='prep';tabCurRound=1;tabSecs=tabPrepSecs;
}

let _condMode='emom';
window.switchCondMode=mode=>{
  _condMode=mode;
  clearInterval(condIv);clearInterval(tabIv);
  condRunning=false;tabRunning=false;
  const ex=exs[cur];
  const wrap=document.getElementById('cond-mode-wrap');
  if(!wrap)return;
  if(mode==='tabata'){
    tabPhase='prep';tabCurRound=1;tabSecs=tabPrepSecs;
    wrap.innerHTML=renderTabataUI();
  } else {
    condSecs=0;condRounds=0;
    wrap.innerHTML=renderTimerUI(ex,mode.toUpperCase());
  }
};

window.toggleCond=()=>{
  condRunning=!condRunning;
  const btn=document.getElementById('cond-toggle');
  if(btn)btn.textContent=condRunning?'⏸ Pausa':'▶ Continua';
  if(condRunning){
    condIv=setInterval(()=>{
      condSecs++;
      const el=document.getElementById('cond-t');
      if(el)el.textContent=`${String(Math.floor(condSecs/60)).padStart(2,'0')}:${String(condSecs%60).padStart(2,'0')}`;
    },1000);
  } else clearInterval(condIv);
};
window.resetCond=()=>{
  clearInterval(condIv);condRunning=false;condSecs=0;condRounds=0;
  const el=document.getElementById('cond-t');if(el)el.textContent='00:00';
  const b=document.getElementById('cond-toggle');if(b)b.textContent='▶ Start';
  const rv=document.getElementById('rnd-v');if(rv)rv.textContent='0';
};
window.adjR=d=>{condRounds=Math.max(0,condRounds+d);const el=document.getElementById('rnd-v');if(el)el.textContent=condRounds;};

// ── TABATA ENGINE
window.adjTab=(field,delta)=>{
  if(tabRunning)return;
  if(field==='work')tabWork=Math.max(5,Math.min(60,tabWork+delta));
  else if(field==='rest')tabRest=Math.max(5,Math.min(60,tabRest+delta));
  else if(field==='rounds')tabRounds=Math.max(1,Math.min(20,tabRounds+delta));
  const tw=document.getElementById('ts-work');const tr=document.getElementById('ts-rest');
  const trn=document.getElementById('ts-rounds');const tt=document.getElementById('tab-total');
  if(tw)tw.textContent=tabWork;if(tr)tr.textContent=tabRest;
  if(trn)trn.textContent=tabRounds;if(tt)tt.textContent=tabRounds;
  if(tabPhase==='prep'){const el=document.getElementById('tab-time');if(el)el.textContent=String(tabPrepSecs).padStart(2,'0');}
};

window.toggleTabata=()=>{
  tabRunning=!tabRunning;
  const btn=document.getElementById('tab-toggle');
  if(btn)btn.textContent=tabRunning?'⏸ Pausa':'▶ Continua';
  const settings=document.getElementById('tab-settings');
  if(settings)settings.style.display=tabRunning?'none':'grid';
  if(tabRunning){
    tabIv=setInterval(tabTick,1000);
  } else clearInterval(tabIv);
};

window.resetTabata=()=>{
  clearInterval(tabIv);tabRunning=false;tabPhase='prep';tabCurRound=1;tabSecs=tabPrepSecs;
  updateTabataUI();
  const btn=document.getElementById('tab-toggle');if(btn)btn.textContent='▶ Start';
  const settings=document.getElementById('tab-settings');if(settings)settings.style.display='grid';
};

function tabTick(){
  tabSecs--;
  if(tabSecs<0){
    // transition
    if(tabPhase==='prep'){tabPhase='work';tabSecs=tabWork;}
    else if(tabPhase==='work'){tabPhase='rest';tabSecs=tabRest;}
    else if(tabPhase==='rest'){
      tabCurRound++;
      if(tabCurRound>tabRounds){
        clearInterval(tabIv);tabRunning=false;
        toast('🔥 Tabata completata!');
        updateTabataUI();
        const btn=document.getElementById('tab-toggle');if(btn)btn.textContent='▶ Start';
        return;
      }
      tabPhase='work';tabSecs=tabWork;
    }
  }
  updateTabataUI();
}

function updateTabataUI(){
  const phaseEl=document.getElementById('tab-phase');
  const timeEl=document.getElementById('tab-time');
  const pfEl=document.getElementById('tab-pf');
  const roundEl=document.getElementById('tab-round');

  const phaseLabel={prep:'PREPARATI',work:'LAVORO',rest:'RIPOSO'};
  const total=tabPhase==='prep'?tabPrepSecs:tabPhase==='work'?tabWork:tabRest;
  const pct=total>0?Math.max(0,tabSecs/total*100):0;

  if(phaseEl){phaseEl.className='tabata-phase '+tabPhase;phaseEl.textContent=phaseLabel[tabPhase]||tabPhase;}
  if(timeEl){timeEl.className='tabata-time '+tabPhase;timeEl.textContent=String(Math.max(0,tabSecs)).padStart(2,'0');}
  if(pfEl){pfEl.className='tabata-prog-fill '+tabPhase;pfEl.style.width=pct+'%';}
  if(roundEl)roundEl.textContent=Math.min(tabCurRound,tabRounds);

  // Visual alert on transition
  if(tabSecs<=3&&tabSecs>0&&tabRunning){
    if(timeEl){timeEl.style.transform='scale(1.08)';setTimeout(()=>{if(timeEl)timeEl.style.transform='';},200);}
  }
}

// ── SET ACTIONS
window.setKg=(ei,s,v,el)=>{
  if(!setData[ei])setData[ei]={};if(!setData[ei][s])setData[ei][s]={};
  setData[ei][s].kg=v;
  setData[ei][s].suggested=false;
  // Remove visual suggestion class immediately without full re-render
  if(el)el.classList.remove('suggested');
};
// Per-set actual reps (replaces global setReps)
window.setRepsActual=(ei,s,v)=>{
  if(!setData[ei])setData[ei]={};if(!setData[ei][s])setData[ei][s]={};
  setData[ei][s].reps=v;
};
window.setRpe=(ei,s,r)=>{if(!setData[ei][s])setData[ei][s]={};setData[ei][s].rpe=r;render();};
window.toggleDone=function(ei,s){
  const inp=document.getElementById(`kg-${ei}-${s}`);
  const kg=inp?.value||setData[ei]?.[s]?.kg||'';
  if(!setData[ei])setData[ei]={};if(!setData[ei][s])setData[ei][s]={};
  if(kg){setData[ei][s].kg=kg;setData[ei][s].suggested=false;}
  setData[ei][s].done=!setData[ei][s].done;
  if(setData[ei][s].done){
    checkPR(exs[ei],ei,s);
    const ex=exs[ei];
    const allDone=Object.values(setData[ei]).every(sd=>sd.done);
    // ── Auto-fill next set in this session with same kg (overrides historical)
    const usedKg=setData[ei][s].kg;
    if(usedKg){
      const nxtS=s+1;
      if(setData[ei][nxtS]!==undefined&&!setData[ei][nxtS].done){
        // Only suggest if user hasn't already typed something different
        if(!setData[ei][nxtS].kg||setData[ei][nxtS].suggested){
          setData[ei][nxtS].kg=usedKg;
          setData[ei][nxtS].suggested=true;
        }
      }
    }
    const restSecs=parseRest(ex.rest);
    if(restSecs>0&&!allDone){
      const tot=parseInt(ex.sets)||3;
      const nxt=s<tot-1?`Serie ${s+2} di ${tot} — ${ex.name}`:ei<exs.length-1?`Prossimo: ${exs[ei+1]?.name||exs[ei+1]?.items?.[0]?.name||'—'}`:'';
      startRest(restSecs,nxt);
    }
  }
  render();
};
window.setCxKg=(ei,ci,s,v)=>{if(!setData[ei][ci])setData[ei][ci]={};if(!setData[ei][ci][s])setData[ei][ci][s]={};setData[ei][ci][s].kg=v;};
window.setCxReps=(ei,ci,s,v)=>{if(!setData[ei][ci])setData[ei][ci]={};if(!setData[ei][ci][s])setData[ei][ci][s]={};setData[ei][ci][s].reps=v;};
window.setCxRpe=(ei,ci,s,r)=>{if(!setData[ei][ci][s])setData[ei][ci][s]={};setData[ei][ci][s].rpe=r;render();};
window.toggleCxDone=function(ei,ci,s){
  if(!setData[ei][ci][s])setData[ei][ci][s]={};
  setData[ei][ci][s].done=!setData[ei][ci][s].done;
  if(setData[ei][ci][s].done){
    const ex=exs[ei];
    if(ci===ex.items.length-1){const r=parseRest(ex.rest||"3'");if(r>0)startRest(r,`Round ${s+2} del complex`);}
  }
  render();
};
window.toggleCampo=ei=>{campoChecked[ei]=!campoChecked[ei];render();};

function checkPR(ex,ei,s){
  const d=setData[ei][s];
  if(!d?.kg||!d?.done)return;
  const kg=parseFloat(d.kg);const reps=parseFloat(ex.reps||1);
  const e1rm=Math.round(kg*(1+reps/30));
  if(e1rm>(best1rm[ex.name]||0)){
    best1rm[ex.name]=e1rm;
    if(!newPRs.find(pr=>pr.name===ex.name))newPRs.push({name:ex.name,value:e1rm});
    toast(`🏆 PR! ${ex.name}: ${e1rm}kg e1RM`);
  }
}

function parseRest(str){
  if(!str)return 0;
  const m=str.match(/(\d+)[''m]/);if(m)return parseInt(m[1])*60;
  const s=str.match(/(\d+)[""s]/);if(s)return parseInt(s[1]);
  const n=str.match(/^(\d+)$/);if(n)return parseInt(n[1])>10?parseInt(n[1]):parseInt(n[1])*60;
  return 0;
}

function startRest(secs,hint){
  restTotal=secs;restLeft=secs;
  document.getElementById('rest-hint').innerHTML=hint?`Prossimo: <strong>${hint}</strong>`:'';
  document.getElementById('rest-ov').classList.remove('h');
  updateRest();
  clearInterval(restIv);
  restIv=setInterval(()=>{restLeft--;updateRest();if(restLeft<=0){clearInterval(restIv);skipRest();}},1000);
}
function updateRest(){
  const m=String(Math.floor(restLeft/60)).padStart(2,'0');
  const s=String(restLeft%60).padStart(2,'0');
  const el=document.getElementById('rest-big');
  const pf=document.getElementById('rest-pf');
  if(el){el.textContent=`${m}:${s}`;el.className='rest-big'+(restLeft<=10?' warn':'');}
  if(pf)pf.style.width=`${Math.max(0,restLeft/restTotal*100)}%`;
}
window.skipRest=()=>{clearInterval(restIv);document.getElementById('rest-ov').classList.add('h');};

function renderNota(ex){
  return `<div class="ex-card"><div class="nota-card">
    <div class="nota-title">${ex.name}</div>
    ${ex.note?`<div class="nota-text">${ex.note}</div>`:''}
    <div style="margin-top:14px;font-size:12px;color:var(--muted);">Completa la seduta e premi il pulsante verde in basso.</div>
  </div></div>`;
}

window.nav=async dir=>{
  if(dir===1){if(cur<exs.length-1){cur++;render();}else await finish();}
  else{if(cur>0){cur--;render();}}
};

let _sessionStats=null;
async function finish(){
  clearInterval(condIv);clearInterval(tabIv);
  const dur=Math.round((Date.now()-startTs)/60000);
  let totalSets=0,rpeVals=[];
  Object.entries(setData).forEach(([ei,sd])=>{
    const ex=exs[parseInt(ei)];if(!ex)return;
    if(ex._type==='complex'){
      Object.values(sd).forEach(csd=>Object.values(csd||{}).forEach(s=>{if(s&&s.done){totalSets++;if(s.rpe)rpeVals.push(s.rpe);}}));
    } else {
      Object.values(sd).forEach(s=>{if(s.done){totalSets++;if(s.rpe)rpeVals.push(s.rpe);}});
    }
  });
  totalSets+=Object.values(campoChecked).filter(Boolean).length;
  const avgRpe=rpeVals.length?Math.round(rpeVals.reduce((a,b)=>a+b,0)/rpeVals.length*10)/10:null;
  const now=new Date();
  _sessionStats={dur,totalSets,avgRpe,newPRs,sessName:session.name||'Sessione'};

  // Build exerciseData for history (kg + rpe per set per exercise)
  const exerciseData={};
  exs.forEach((ex,i)=>{
    if(ex._type==='pesi'&&ex.name){
      const sd2=setData[i]||{};
      exerciseData[ex.name]=Object.entries(sd2)
        .sort((a,b)=>+a[0]-+b[0])
        .map(([,s])=>({
          kg:s.kg?parseFloat(s.kg):null,
          reps:s.reps||null,
          rpe:s.rpe||null
        }))
        .filter(s=>s.kg!=null); // only save sets with actual kg
    }
  });
  await push(ref(db,`session_logs/${AID}`),{
    ts:Date.now(),progId:PROG,weekIdx:WEEK,sessId:SESS,
    sessName:session.name||'Sessione',duration:dur,totalSets,newPRs,
    condSecs,condRounds,isQuick,avgRpe,exerciseData,
    date:now.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'})
  });

  if(newPRs.length){
    const exSnap=await get(ref(db,`rm_exercises/${AID}`));
    const exObj=exSnap.val()||{};
    for(const pr of newPRs){
      const exKey=Object.entries(exObj).find(([,e])=>e.name===pr.name)?.[0];
      if(exKey)await push(ref(db,`rm_records/${AID}/${exKey}`),{
        ts:Date.now(),
        date:now.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'}),
        value:pr.value,type:'sessione',exName:pr.name
      });
    }
  }

  showDoneScreen(dur,totalSets,avgRpe);
}

function showDoneScreen(dur,totalSets,avgRpe){
  document.getElementById('sapp').style.display='none';
  const ds=document.getElementById('done-screen');ds.classList.add('show');

  // Sub message based on performance
  const msgs=['Ottimo lavoro! 💪','Sessione completata! 🔥','Sei una macchina! 🏆','Bel lavoro, continua così! ⚡'];
  document.getElementById('done-sub').textContent=msgs[Math.floor(Math.random()*msgs.length)];

  const rpeColor=avgRpe?avgRpe>=9?'var(--red)':avgRpe>=7?'var(--amber)':'var(--green)':'var(--muted)';
  document.getElementById('done-stats').innerHTML=`
    <div class="ds-item">
      <div class="ds-val">${dur}'</div>
      <div class="ds-lbl">Durata</div>
    </div>
    <div class="ds-item">
      <div class="ds-val">${totalSets}</div>
      <div class="ds-lbl">Serie</div>
    </div>
    <div class="ds-item">
      <div class="ds-val" style="color:${rpeColor};">${avgRpe||'—'}</div>
      <div class="ds-lbl">RPE medio</div>
    </div>`;

  if(newPRs.length){
    document.getElementById('pr-sec').style.display='block';
    document.getElementById('pr-list').innerHTML=newPRs.map(pr=>`
      <div class="pr-item-done">
        <span class="pr-nm">🏆 ${pr.name}</span>
        <span class="pr-vl">${pr.value}kg</span>
      </div>`).join('');
  }

  // Init check-in card
  const now=new Date();
  const ciDate=document.getElementById('ci-date');
  if(ciDate)ciDate.textContent=now.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
  // Pre-fill RPE from session average
  if(avgRpe){
    const rpeRound=Math.max(1,Math.min(10,Math.round(avgRpe)));
    const el=document.getElementById('ci-rpe-inp');
    if(el){el.value=rpeRound;ciSlide('rpe',rpeRound,'var(--orange)');}
  }
}

// ── CHECK-IN SLIDER
window.ciSlide=function(id,val,color){
  const pct=((val-1)/9)*100;
  document.getElementById('ci-'+id+'-val').textContent=val;
  document.getElementById('ci-'+id+'-fill').style.width=pct+'%';
  document.getElementById('ci-'+id+'-thumb').style.left=pct+'%';
};

// ── SAVE CHECK-IN
window.saveSessionCheckin=async function(){
  const btn=document.getElementById('ci-submit-btn');
  btn.textContent='SALVANDO...';btn.disabled=true;
  const now=new Date();
  const rpe=parseInt(document.getElementById('ci-rpe-inp').value);
  const doms=parseInt(document.getElementById('ci-doms-inp').value);
  const sonno=parseInt(document.getElementById('ci-sleep-inp').value);
  const pains=[...document.querySelectorAll('.ci-pb.sel')].map(b=>b.textContent);
  const note=(document.getElementById('ci-note').value||'').trim()||null;
  try{
    const _ts=now.getTime();
    const _date=now.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
    const _day=session.name||session.type||'Sessione';
    // Use date key (YYYY-MM-DD) so same-day re-save overwrites instead of duplicating
    const _dateKey=now.toISOString().slice(0,10);
    await Promise.all([
      set(ref(db,`checkins/${AID}/${_dateKey}`),{
        ts:_ts,date:_date,
        fatica:rpe,doms,sonno,pains:pains.length?pains:null,note,
        fromSession:_day,sessType:session.type||null
      }),
      set(ref(db,`sessions/${AID}/${_dateKey}`),{
        ts:_ts,date:_date,
        rpe,doms,sleep:sonno,note,day:_day
      })
    ]);
    document.getElementById('ci-card').innerHTML='<div class="ci-ok"><span style="font-size:30px;">✅</span><span class="ci-ok-txt">Check-in salvato!</span></div>';
    document.getElementById('done-actions').style.display='flex';
  }catch(e){
    btn.textContent='INVIA CHECK-IN ✓';btn.disabled=false;
    toast('⚠ Errore. Riprova.');
  }
};

// ── SKIP CHECK-IN
window.skipCheckin=function(){
  const c=document.getElementById('ci-card');
  if(c)c.style.display='none';
  document.getElementById('done-actions').style.display='flex';
};

window.shareSession=()=>{
  if(!_sessionStats)return;
  const {dur,totalSets,avgRpe,newPRs:prs,sessName}=_sessionStats;
  const txt=`🔥 RS Coaching — ${sessName}\n⏱ ${dur} min · 💪 ${totalSets} serie${avgRpe?` · RPE ${avgRpe}`:''}${prs.length?'\n🏆 PR: '+prs.map(p=>`${p.name} ${p.value}kg`).join(', '):''}`;
  if(navigator.share){navigator.share({text:txt}).catch(()=>{});}
  else{navigator.clipboard?.writeText(txt).then(()=>toast('📋 Copiato!'));}
};

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}
function err(msg){
  document.getElementById('loading').style.display='none';
  document.body.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:14px;font-family:'Inter',sans-serif;color:var(--white);text-align:center;padding:24px;background:#0E0E13;">
    <div style="font-size:52px">⚠️</div>
    <div style="font-size:16px;color:#9898B0;">${msg}</div>
    <a href="javascript:history.back()" style="color:#FF6830;font-weight:600;margin-top:6px;">← Indietro</a>
  </div>`;
}
</script>
</body>
