<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RS Coaching — Sessione</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0E17;--card:#131928;--card2:#1A2235;--border:#1E2A40;--blue:#3B82F6;--teal:#06D6A0;--amber:#FBBF24;--red:#F87171;--green:#34D399;--purple:#A78BFA;--orange:#FB923C;--white:#EEF2FF;--muted:#4A5568;--text:#B8C4D8;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);min-height:100%;}
body{font-family:'Outfit',sans-serif;color:var(--text);padding-bottom:90px;}

/* HEADER */
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20;}
.back{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:2px 6px;}
.hdr-info{flex:1;min-width:0;}
.hdr-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-meta{font-size:11px;color:var(--muted);}
.live-pill{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.28);color:var(--red);font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;animation:blink 2s ease-in-out infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

/* PROGRESS */
.prog-bar{height:3px;background:var(--border);}
.prog-fill{height:100%;background:var(--teal);transition:width .4s;}

/* EX NAV — top tabs */
.ex-nav{display:flex;gap:6px;padding:12px 16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;}
.ex-nav::-webkit-scrollbar{display:none;}
.ex-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:var(--card2);color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;}
.ex-dot.active{background:var(--blue);border-color:var(--blue);color:var(--white);}
.ex-dot.done{background:var(--teal);border-color:var(--teal);color:#070B12;}

/* CONTENT */
.content{padding:14px 16px;}

/* EX CARD */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:12px;}
.ex-card-head{padding:14px 16px;border-bottom:1px solid var(--border);}
.ex-type-pill{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:5px;}
.tp-pesi{background:rgba(167,139,250,.12);color:var(--purple);}
.tp-campo{background:rgba(6,214,160,.1);color:var(--teal);}
.tp-sprint{background:rgba(248,113,113,.1);color:var(--red);}
.tp-complex{background:rgba(251,113,74,.12);color:var(--orange);}
.ex-card-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--white);line-height:1.1;}
.ex-card-params{font-size:12px;color:var(--muted);margin-top:3px;}
.cue-chip{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.16);border-radius:8px;padding:7px 11px;font-size:11px;color:var(--amber);margin-top:8px;display:flex;gap:6px;}

/* SUGGESTED KG BAR */
.sug-kg-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(167,139,250,.06);border-bottom:1px solid var(--border);}
.sug-kg-lbl{font-size:11px;color:var(--muted);}
.sug-kg-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--purple);letter-spacing:1px;}
.sug-kg-sub{font-size:10px;color:var(--muted);}

/* SETS TABLE */
.sets-table{width:100%;}
.set-head{display:grid;grid-template-columns:36px 60px 1fr 72px 36px;gap:4px;padding:8px 14px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02);}
.set-head span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.set-row{display:grid;grid-template-columns:36px 60px 1fr 72px 36px;gap:4px;padding:10px 14px;border-bottom:1px solid var(--border);align-items:center;transition:background .15s;}
.set-row:last-child{border-bottom:none;}
.set-row.done{background:rgba(6,214,160,.04);}
.set-row.cur{background:rgba(59,130,246,.05);border-left:2px solid var(--blue);}
.sn{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--muted);}
.sn.d{color:var(--teal);}
.reps-lbl{font-size:13px;color:var(--text);text-align:center;}
.kg-inp{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--white);text-align:center;padding:8px 4px;-webkit-appearance:none;transition:border-color .2s;}
.kg-inp:focus{outline:none;border-color:var(--blue);}
.kg-inp.d{border-color:rgba(6,214,160,.3);color:var(--teal);}
.rpe-col{display:flex;flex-direction:column;gap:3px;align-items:center;}
.rpe-row{display:flex;gap:2px;}
.rpe-d{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border);cursor:pointer;transition:all .15s;}
.rpe-d:hover{transform:scale(1.2);}
.rpe-d.r6,.rpe-d.r7{background:var(--green);border-color:var(--green);}
.rpe-d.r8{background:var(--amber);border-color:var(--amber);}
.rpe-d.r9,.rpe-d.r10{background:var(--red);border-color:var(--red);}
.rpe-lbl{font-size:9px;color:var(--muted);}
.done-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;}
.done-btn.d{background:var(--teal);border-color:var(--teal);color:#070B12;}
.done-btn:active{transform:scale(.85);}

/* E1RM */
.e1rm-bar{padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border);}
.e1rm-chip{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);border-radius:8px;padding:5px 11px;display:flex;align-items:center;gap:6px;}
.e1rm-val{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--purple);}
.e1rm-lbl{font-size:10px;color:var(--muted);}
.pr-chip{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.28);border-radius:8px;padding:4px 9px;font-size:11px;font-weight:700;color:var(--amber);animation:poppr .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes poppr{from{transform:scale(0)opacity:0}to{transform:scale(1)opacity:1}}

/* REST OVERLAY */
.rest-ov{position:fixed;inset:0;background:rgba(10,14,23,.96);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.rest-ov.h{display:none;}
.rest-lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;}
.rest-big{font-family:'Bebas Neue',sans-serif;font-size:96px;color:var(--white);letter-spacing:-3px;line-height:1;transition:color .3s;}
.rest-big.warn{color:var(--amber);}
.rest-prog{width:200px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.rest-pf{height:100%;background:var(--teal);transition:width 1s linear;}
.rest-hint{font-size:13px;color:var(--muted);text-align:center;max-width:240px;}
.rest-hint strong{color:var(--white);}
.rest-skip{padding:12px 32px;background:var(--teal);color:#070B12;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;}

/* COMPLEX */
.cx-hdr{background:rgba(251,113,74,.07);border:1px solid rgba(251,113,74,.18);border-radius:10px;padding:9px 13px;font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.cx-sep{background:rgba(251,113,74,.08);border-top:1px solid rgba(251,113,74,.18);padding:6px 14px;font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:1px;}

/* CAMPO */
.campo-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);transition:background .15s;}
.campo-item:last-child{border-bottom:none;}
.campo-item.ck{background:rgba(6,214,160,.03);opacity:.6;}
.int-badge{font-size:9px;font-weight:700;padding:3px 7px;border-radius:5px;text-transform:uppercase;flex-shrink:0;}
.ib-b{background:rgba(52,211,153,.1);color:var(--green);}
.ib-m{background:rgba(251,191,36,.1);color:var(--amber);}
.ib-a{background:rgba(248,113,113,.1);color:var(--red);}
.ib-x{background:rgba(248,113,113,.2);color:var(--red);border:1px solid rgba(248,113,113,.3);}
.campo-name{flex:1;font-weight:600;font-size:13px;color:var(--white);}
.campo-meta{font-size:11px;color:var(--muted);margin-top:1px;}
.campo-ck{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0;}
.campo-ck.ck{background:var(--teal);border-color:var(--teal);}

/* CONDITIONING */
.cond-wrap{padding:16px;}
.cond-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;background:rgba(251,113,74,.12);color:var(--orange);text-transform:uppercase;letter-spacing:.8px;display:inline-block;margin-bottom:10px;}
.cond-timer{font-family:'Bebas Neue',sans-serif;font-size:80px;color:var(--white);text-align:center;letter-spacing:-2px;margin:8px 0;}
.cond-btns{display:flex;gap:8px;justify-content:center;margin-bottom:12px;}
.cond-btn{padding:10px 24px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;}
.cb-start{background:var(--teal);color:#070B12;}
.cb-reset{background:var(--card2);color:var(--text);border:1px solid var(--border);}
.cond-content{font-size:13px;color:var(--text);white-space:pre-line;line-height:1.7;background:var(--card2);border-radius:10px;padding:12px;}
.rounds-ctrl{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:10px;}
.rnd-btn{width:36px;height:36px;border-radius:50%;background:var(--card2);border:1px solid var(--border);color:var(--white);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.rnd-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--white);}

/* BOTTOM BAR */
.bot-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:10px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;align-items:center;z-index:19;}
.prev-btn{width:42px;height:42px;border-radius:10px;background:var(--card2);border:1px solid var(--border);color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.next-btn{flex:1;padding:14px;background:var(--blue);color:var(--white);border:none;border-radius:13px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1.5px;cursor:pointer;transition:all .15s;}
.next-btn:active{transform:scale(.97);}
.next-btn.fin{background:var(--teal);color:#070B12;}

/* COMPLETE */
.done-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:28px;text-align:center;}
.done-screen.show{display:flex;}
.done-icon{font-size:64px;animation:bncin .6s cubic-bezier(.34,1.56,.64,1);}
@keyframes bncin{from{transform:scale(0)}to{transform:scale(1)}}
.done-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;color:var(--white);}
.done-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:360px;}
.ds-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 8px;}
.ds-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--white);}
.ds-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.pr-list{width:100%;max-width:360px;}
.pr-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.18);border-radius:10px;margin-bottom:6px;}
.pr-nm{font-size:13px;font-weight:600;color:var(--white);flex:1;}
.pr-vl{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--amber);}
.home-btn{width:100%;max-width:360px;padding:15px;background:var(--teal);color:#070B12;border:none;border-radius:14px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;cursor:pointer;}

#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:999;}
.logo-big{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:3px;color:var(--white);}
.logo-big span{color:var(--teal);}
.dots{display:flex;gap:8px;}
.dots i{width:8px;height:8px;border-radius:50%;background:var(--teal);opacity:.25;animation:dp 1.2s ease-in-out infinite;}
.dots i:nth-child(2){animation-delay:.2s;}.dots i:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,100%{opacity:.25;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(251,191,36,.95);color:#0A0E17;padding:9px 18px;border-radius:50px;font-size:13px;font-weight:700;box-shadow:0 6px 24px rgba(0,0,0,.4);transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:9999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="loading"><div class="logo-big">RS<span>.</span></div><div class="dots"><i></i><i></i><i></i></div></div>

<div class="rest-ov h" id="rest-ov">
  <div class="rest-lbl">Recupero</div>
  <div class="rest-big" id="rest-big">2:00</div>
  <div class="rest-prog"><div class="rest-pf" id="rest-pf" style="width:100%"></div></div>
  <div class="rest-hint" id="rest-hint"></div>
  <button class="rest-skip" onclick="skipRest()">Continua →</button>
</div>

<div id="sapp" style="display:none">
  <div class="hdr">
    <button class="back" onclick="if(confirm('Uscire dalla sessione?'))history.back()">←</button>
    <div class="hdr-info">
      <div class="hdr-name" id="hdr-name">—</div>
      <div class="hdr-meta" id="hdr-meta">—</div>
    </div>
    <div class="live-pill">LIVE</div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
  <div class="ex-nav" id="ex-nav"></div>
  <div class="content" id="content"></div>
  <div class="bot-bar">
    <button class="prev-btn" onclick="nav(-1)">←</button>
    <button class="next-btn" id="next-btn" onclick="nav(1)">PROSSIMO →</button>
  </div>
</div>

<div class="done-screen" id="done-screen">
  <div class="done-icon">🏆</div>
  <div class="done-title">Completata!</div>
  <div class="done-stats" id="done-stats"></div>
  <div id="pr-sec" style="display:none;width:100%;max-width:360px;">
    <div style="font-size:12px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:1px;margin:10px 0 8px;">🏆 Nuovi PR</div>
    <div class="pr-list" id="pr-list"></div>
  </div>
  <button class="home-btn" id="home-btn">TORNA ALL'APP →</button>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, push, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg={apiKey:"AIzaSyAayWDWvUQqtAfIlm7qA8kMKxJu2-_y7k4",authDomain:"rscoaching-a6c61.firebaseapp.com",databaseURL:"https://rscoaching-a6c61-default-rtdb.europe-west1.firebasedatabase.app",projectId:"rscoaching-a6c61",storageBucket:"rscoaching-a6c61.firebasestorage.app",messagingSenderId:"499942544251",appId:"1:499942544251:web:bd246cc6846b0fad89e3de"};
const app=initializeApp(cfg);
const db=getDatabase(app);

const p=new URLSearchParams(window.location.search);
const AID=p.get('id'), PROG=p.get('prog'), WEEK=parseInt(p.get('week')||'0'), SESS=p.get('sess');
const isQuick=p.get('quick')==='1';

let athlete={}, session={};
let exs=[], setData={}, best1rm={}, newPRs=[], campoChecked={};
let cur=0, startTs=Date.now();
let restIv=null, restTotal=0, restLeft=0;
let condIv=null, condSecs=0, condRunning=false, condRounds=0;

// ── INIT
async function init(){
  if(!AID){err('ID atleta mancante');return;}
  try{
    // Load athlete + 1RM
    const [aS,rmS]=await Promise.all([
      get(ref(db,`athletes/${AID}`)),
      get(ref(db,`rm_records/${AID}`))
    ]);
    if(!aS.exists()){err('Atleta non trovato');return;}
    athlete=aS.val();
    // Build best 1rm
    Object.values(rmS.val()||{}).forEach(er=>{
      Object.values(er).forEach(r=>{
        if(r.exName&&(!best1rm[r.exName]||r.value>best1rm[r.exName]))best1rm[r.exName]=r.value;
      });
    });

    // QUICK SESSION
    if(isQuick){
      const stored=sessionStorage.getItem(`rsc_quick_${AID}`);
      if(!stored){err('Dati sessione non trovati. Torna all\'app e riprova.');return;}
      const {day,exs:qExs}=JSON.parse(stored);
      session={name:day.note||'Sessione rapida',type:day.type};
      buildFromArray(day.type,qExs||[]);
      setup();return;
    }

    // PROGRAM SESSION
    if(!PROG||!SESS){err('Parametri sessione mancanti');return;}
    const pS=await get(ref(db,`programs/${PROG}`));
    if(!pS.exists()){err('Programma non trovato');return;}
    const prog=pS.val();
    const weeks=Object.entries(prog.weeks||{}).sort((a,b)=>a[1].order-b[1].order);
    if(WEEK>=weeks.length){err(`Settimana ${WEEK+1} non trovata nel programma`);return;}
    const [,wkData]=weeks[WEEK];
    const s=wkData.sessions?.[SESS];
    if(!s){err('Sessione non trovata');return;}
    session=s;
    buildFromSession(s);
    setup();
  }catch(e){console.error(e);err('Errore: '+e.message);}
}
init();

function setup(){
  document.getElementById('loading').style.display='none';
  document.getElementById('sapp').style.display='block';
  document.getElementById('hdr-name').textContent=session.name||'Sessione';
  document.getElementById('hdr-meta').textContent=`${athlete.name}${PROG?' · Sett.'+(WEEK+1):' · Piano rapido'}`;
  document.getElementById('home-btn').onclick=()=>{location.href=`/athlete/?id=${AID}`;};
  renderExNav();render();
}

// ── BUILD EXERCISES
function buildFromSession(s){
  exs=[];
  if(s.type==='conditioning'){
    exs=[{_type:'cond',name:s.name||s.condType||'Conditioning',condType:s.condType,duration:s.duration,condContent:s.condContent}];
    return;
  }
  const raw=Object.entries(s.exercises||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0)).map(([,e])=>e);
  if(!raw.length){exs=[{_type:'nota',name:s.name||'Seduta',note:s.notes||''}];return;}
  buildFromArray(s.type,raw);
}

function buildFromArray(type,arr){
  if(!arr||!arr.length){exs=[{_type:'nota',name:'Seduta',note:''}];return;}
  if(type==='conditioning'){exs=[{_type:'cond',...arr[0]}];return;}
  if(type==='campo'){exs=arr.map(e=>({...e,_type:'campo'}));initSets();return;}
  // Pesi / sprint — handle complexes
  const cgroups={};
  arr.forEach(e=>{if(e.complexGroup){if(!cgroups[e.complexGroup])cgroups[e.complexGroup]=[];cgroups[e.complexGroup].push(e);}});
  const seen=new Set();
  exs=[];
  arr.forEach(e=>{
    if(!e.complexGroup){exs.push({...e,_type:'pesi'});}
    else if(!seen.has(e.complexGroup)){
      seen.add(e.complexGroup);
      const items=cgroups[e.complexGroup];
      exs.push({_type:'complex',items,rest:items.slice(-1)[0]?.rest});
    }
  });
  initSets();
}

function initSets(){
  exs.forEach((ex,i)=>{
    if(ex._type==='pesi'){
      setData[i]={};
      for(let s=0;s<(parseInt(ex.sets)||3);s++)setData[i][s]={kg:'',rpe:null,done:false};
    }else if(ex._type==='complex'){
      setData[i]={};
      ex.items.forEach((item,ci)=>{
        setData[i][ci]={};
        for(let s=0;s<(parseInt(item.sets)||4);s++)setData[i][ci][s]={kg:'',rpe:null,done:false};
      });
    }
  });
}

// ── EX NAV DOTS
function renderExNav(){
  const el=document.getElementById('ex-nav');
  el.innerHTML=exs.map((ex,i)=>{
    const allDone=checkAllDone(i);
    const hasDone=hasSomeDone(i);
    return `<div class="ex-dot${i===cur?' active':''}${allDone?' done':''}" onclick="jumpTo(${i})">${allDone?'✓':i+1}</div>`;
  }).join('');
  // Scroll active into view
  const activeDot=el.children[cur];
  if(activeDot)activeDot.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function checkAllDone(i){
  const ex=exs[i];
  if(!ex||ex._type==='campo')return !!(campoChecked[i]);
  if(ex._type==='cond'||ex._type==='nota')return false;
  const sd=setData[i]||{};
  if(ex._type==='complex'){return ex.items.every((_,ci)=>Object.values(sd[ci]||{}).every(s=>s.done));}
  return Object.values(sd).every(s=>s.done);
}
function hasSomeDone(i){
  const sd=setData[i]||{};
  if(exs[i]?._type==='complex')return Object.values(sd).some(csd=>Object.values(csd||{}).some(s=>s.done));
  return Object.values(sd).some(s=>s.done);
}

window.jumpTo=function(i){cur=i;render();};

// ── RENDER
function render(){
  const ex=exs[cur];
  const isLast=cur===exs.length-1;
  const nb=document.getElementById('next-btn');
  nb.textContent=isLast?'COMPLETA ✓':'PROSSIMO →';
  nb.className='next-btn'+(isLast?' fin':'');
  document.getElementById('pfill').style.width=`${(cur/Math.max(exs.length,1))*100}%`;
  renderExNav();
  if(!ex){document.getElementById('content').innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);">Nessun esercizio.</div>';return;}
  let html='';
  if(ex._type==='nota')html=renderNota(ex);
  else if(ex._type==='cond')html=renderCond(ex);
  else if(ex._type==='campo')html=renderCampo(ex,cur);
  else if(ex._type==='complex')html=renderComplex(ex,cur);
  else html=renderPesi(ex,cur);
  document.getElementById('content').innerHTML=html;
  if(ex._type==='cond')setupCond();
  window.scrollTo(0,0);
}

// ── PESI
function renderPesi(ex,ei){
  const sets=parseInt(ex.sets)||3;
  const rm=best1rm[ex.name]||0;
  const pct=parseFloat(ex.pct)||0;
  const kgDirect=parseFloat(ex.kg)||0;
  const kgSug=kgDirect>0?kgDirect:(rm>0&&pct>0?Math.round(rm*pct/100/2.5)*2.5:0);
  const sd=setData[ei]||{};
  const doneN=Object.values(sd).filter(s=>s.done).length;

  // Best e1rm
  let e1rm=0;
  for(let s=0;s<sets;s++){
    if(sd[s]?.done&&sd[s]?.kg){
      const e=Math.round(parseFloat(sd[s].kg)*(1+parseFloat(ex.reps||1)/30));
      if(e>e1rm)e1rm=e;
    }
  }
  const isPR=e1rm>0&&e1rm>(best1rm[ex.name]||0);
  const noRmWarn=pct>0&&rm===0?`<div style="background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.18);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--amber);margin-bottom:0;">⚠ Nessun 1RM salvato per questo esercizio. Vai in 💪 1RM per impostarlo.</div>`:'';

  return `<div class="ex-card">
    <div class="ex-card-head">
      <span class="ex-type-pill tp-pesi">🏋️ Pesi</span>
      <div class="ex-card-name">${ex.name}</div>
      <div class="ex-card-params">${sets} serie × ${ex.reps||'—'}${pct>0?` · @${pct}% 1RM`:''}${ex.rpe?` · RPE ${ex.rpe}`:''}</div>
      ${ex.cue?`<div class="cue-chip"><span>💡</span><span>${ex.cue}</span></div>`:''}
    </div>
    ${kgSug>0?`<div class="sug-kg-bar"><div><div class="sug-kg-lbl">Carico suggerito${pct>0?` (${pct}% di ${rm}kg)`:(kgDirect>0?' (diretto)':'')}</div></div><div style="text-align:right;"><div class="sug-kg-val">${kgSug}kg</div></div></div>`:''}
    ${noRmWarn&&!kgSug?`<div style="padding:8px 16px;">${noRmWarn}</div>`:''}
    <div class="sets-table">
      <div class="set-head"><span>Set</span><span style="text-align:center;">Reps</span><span>Kg usati</span><span style="text-align:center;">RPE</span><span></span></div>
      ${Array.from({length:sets},(_,s)=>{
        const d=sd[s]||{kg:'',rpe:null,done:false};
        const isCur=s===doneN&&!d.done;
        return `<div class="set-row${d.done?' done':isCur?' cur':''}">
          <span class="sn${d.done?' d':''}">${s+1}</span>
          <span class="reps-lbl">${ex.reps||'—'}</span>
          <input class="kg-inp${d.done?' d':''}" type="number" inputmode="decimal" value="${d.kg}" placeholder="${kgSug||'—'}" id="kg-${ei}-${s}" oninput="setKg(${ei},${s},this.value)">
          <div class="rpe-col">
            <div class="rpe-row">${[6,7,8].map(r=>`<div class="rpe-d${d.rpe===r?' r'+r:''}" onclick="setRpe(${ei},${s},${r})" title="${r}"></div>`).join('')}</div>
            <div class="rpe-row">${[9,10].map(r=>`<div class="rpe-d${d.rpe===r?' r'+r:''}" onclick="setRpe(${ei},${s},${r})" title="${r}"></div>`).join('')}</div>
            ${d.rpe?`<div class="rpe-lbl">RPE ${d.rpe}</div>`:'<div class="rpe-lbl">—</div>'}
          </div>
          <button class="done-btn${d.done?' d':''}" onclick="toggleDone(${ei},${s})">${d.done?'✓':''}</button>
        </div>`;
      }).join('')}
    </div>
    ${e1rm>0?`<div class="e1rm-bar"><div class="e1rm-chip"><div class="e1rm-lbl">e1RM</div><div class="e1rm-val">${e1rm}kg</div></div>${isPR?'<div class="pr-chip">🏆 NEW PR!</div>':''}</div>`:''}
    ${ex.rest?`<div style="padding:8px 16px;font-size:11px;color:var(--muted);">⏱ Recupero: ${ex.rest}</div>`:''}
  </div>`;
}

// ── COMPLEX
function renderComplex(ex,ei){
  const sets=parseInt(ex.items[0]?.sets)||4;
  let html=`<div class="cx-hdr">🔁 Complex · ${sets} round · rec ${ex.rest||"3'"} dopo ogni round</div>`;
  ex.items.forEach((item,ci)=>{
    const rm=best1rm[item.name]||0;
    const pct=parseFloat(item.pct)||0;
    const kgDirect=parseFloat(item.kg)||0;
    const kgSug=kgDirect>0?kgDirect:(rm>0&&pct>0?Math.round(rm*pct/100/2.5)*2.5:0);
    const csd=setData[ei]?.[ci]||{};
    html+=`<div class="cx-sep">${item.complexLabel||`A${ci+1}`} — ${item.name}</div>
    <div class="ex-card" style="border-radius:0;border:none;border-bottom:1px solid var(--border);margin-bottom:0;">
      ${item.cue?`<div style="padding:8px 14px;"><div class="cue-chip"><span>💡</span><span>${item.cue}</span></div></div>`:''}
      ${kgSug>0?`<div class="sug-kg-bar" style="border-top:1px solid var(--border);"><div class="sug-kg-lbl">Sugg.${pct>0?` ${pct}%`:''}</div><div class="sug-kg-val">${kgSug}kg</div></div>`:''}
      <div class="sets-table">
        <div class="set-head"><span>Rd</span><span style="text-align:center;">Reps</span><span>Kg</span><span style="text-align:center;">RPE</span><span></span></div>
        ${Array.from({length:sets},(_,s)=>{
          const d=csd[s]||{kg:'',rpe:null,done:false};
          return `<div class="set-row${d.done?' done':''}">
            <span class="sn${d.done?' d':''}">${s+1}</span>
            <span class="reps-lbl">${item.reps||'—'}</span>
            <input class="kg-inp${d.done?' d':''}" type="number" inputmode="decimal" value="${d.kg}" placeholder="${kgSug||'—'}" oninput="setCxKg(${ei},${ci},${s},this.value)">
            <div class="rpe-col">
              <div class="rpe-row">${[6,7,8].map(r=>`<div class="rpe-d${d.rpe===r?' r'+r:''}" onclick="setCxRpe(${ei},${ci},${s},${r})"></div>`).join('')}</div>
              <div class="rpe-row">${[9,10].map(r=>`<div class="rpe-d${d.rpe===r?' r'+r:''}" onclick="setCxRpe(${ei},${ci},${s},${r})"></div>`).join('')}</div>
            </div>
            <button class="done-btn${d.done?' d':''}" onclick="toggleCxDone(${ei},${ci},${s})">${d.done?'✓':''}</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  return `<div class="ex-card">${html}</div>`;
}

// ── CAMPO
function renderCampo(ex,ei){
  const ck=campoChecked[ei]||false;
  const intCls={BASSA:'ib-b',MEDIA:'ib-m',ALTA:'ib-a',MAX:'ib-x'};
  return `<div class="ex-card">
    <div class="ex-card-head">
      <span class="ex-type-pill tp-campo">⚽ Campo</span>
      <div class="ex-card-name">${ex.name}</div>
      <div class="ex-card-params">${[ex.sets&&ex.sets+'×',ex.reps,ex.rest&&'rec '+ex.rest].filter(Boolean).join(' · ')}</div>
      ${ex.cue?`<div class="cue-chip"><span>💡</span><span>${ex.cue}</span></div>`:''}
    </div>
    <div class="campo-item${ck?' ck':''}">
      ${ex.intensity?`<span class="int-badge ${intCls[ex.intensity]||'ib-m'}">${ex.intensity}</span>`:''}
      <div style="flex:1;"><div class="campo-name">Eseguito?</div></div>
      <button class="campo-ck${ck?' ck':''}" onclick="toggleCampo(${ei})">${ck?'✓':''}</button>
    </div>
  </div>`;
}

// ── CONDITIONING
function renderCond(ex){
  return `<div class="ex-card">
    <div class="ex-card-head">
      <span class="cond-badge">${ex.condType||'Conditioning'}</span>
      ${ex.duration?`<div style="font-size:12px;color:var(--muted);">${ex.duration}</div>`:''}
    </div>
    <div class="cond-wrap">
      <div class="cond-timer" id="cond-t">00:00</div>
      <div class="cond-btns">
        <button class="cond-btn cb-start" id="cond-toggle" onclick="toggleCond()">▶ Start</button>
        <button class="cond-btn cb-reset" onclick="resetCond()">Reset</button>
      </div>
      ${ex.condContent?`<div class="cond-content">${ex.condContent}</div>`:''}
      ${ex.condType==='AMRAP'?`<div class="rounds-ctrl"><button class="rnd-btn" onclick="adjR(-1)">−</button><div class="rnd-val" id="rnd-v">0</div><button class="rnd-btn" onclick="adjR(1)">+</button></div>`:''}
    </div>
  </div>`;
}

// ── NOTA
function renderNota(ex){
  return `<div class="ex-card">
    <div class="ex-card-head">
      <div class="ex-card-name">${ex.name}</div>
      ${ex.note?`<div style="font-size:13px;color:var(--text);margin-top:6px;line-height:1.6;white-space:pre-line;">${ex.note}</div>`:''}
    </div>
    <div style="padding:16px;text-align:center;color:var(--muted);font-size:13px;">Completa la seduta e usa il pulsante qui sotto.</div>
  </div>`;
}

// ── ACTIONS
window.setKg=(ei,s,v)=>{if(!setData[ei])setData[ei]={};if(!setData[ei][s])setData[ei][s]={};setData[ei][s].kg=v;};
window.setRpe=(ei,s,r)=>{if(!setData[ei][s])setData[ei][s]={};setData[ei][s].rpe=r;render();};
window.toggleDone=(ei,s)=>{
  const kgEl=document.getElementById(`kg-${ei}-${s}`);
  const kg=kgEl?.value||'';
  if(!setData[ei])setData[ei]={};
  if(!setData[ei][s])setData[ei][s]={};
  if(kg)setData[ei][s].kg=kg;
  setData[ei][s].done=!setData[ei][s].done;
  if(setData[ei][s].done){
    checkPR(exs[ei],ei,s);
    // Auto rest
    const ex=exs[ei];
    const allDone=Object.values(setData[ei]).every(sd=>sd.done);
    const restSecs=parseRest(ex.rest);
    if(restSecs>0&&!allDone){
      const nxt=s<(parseInt(ex.sets)||3)-1?`Serie ${s+2} — ${ex.name}`:ei<exs.length-1?`Prossimo: ${exs[ei+1]?.name||exs[ei+1]?.items?.[0]?.name||'—'}`:'';
      startRest(restSecs,nxt);
    }
  }
  render();
};
window.setCxKg=(ei,ci,s,v)=>{if(!setData[ei][ci])setData[ei][ci]={};if(!setData[ei][ci][s])setData[ei][ci][s]={};setData[ei][ci][s].kg=v;};
window.setCxRpe=(ei,ci,s,r)=>{if(!setData[ei][ci][s])setData[ei][ci][s]={};setData[ei][ci][s].rpe=r;render();};
window.toggleCxDone=(ei,ci,s)=>{
  if(!setData[ei][ci][s])setData[ei][ci][s]={};
  setData[ei][ci][s].done=!setData[ei][ci][s].done;
  const ex=exs[ei];
  const isLastItem=ci===ex.items.length-1;
  if(isLastItem&&setData[ei][ci][s].done){
    const r=parseRest(ex.rest||"3'");
    if(r>0)startRest(r,`Round ${s+2} del complex`);
  }
  render();
};
window.toggleCampo=(ei)=>{campoChecked[ei]=!campoChecked[ei];render();};

function checkPR(ex,ei,s){
  const d=setData[ei][s];
  if(!d?.kg||!d?.done)return;
  const kg=parseFloat(d.kg);
  const reps=parseFloat(ex.reps||1);
  const e1rm=Math.round(kg*(1+reps/30));
  if(e1rm>(best1rm[ex.name]||0)){
    best1rm[ex.name]=e1rm;
    if(!newPRs.find(pr=>pr.name===ex.name))newPRs.push({name:ex.name,value:e1rm});
    toast(`🏆 PR! ${ex.name}: ${e1rm}kg`);
  }
}

// ── REST TIMER
function parseRest(str){
  if(!str)return 0;
  const m=str.match(/(\d+)[''m]/);if(m)return parseInt(m[1])*60;
  const s=str.match(/(\d+)[""s]/);if(s)return parseInt(s[1]);
  const n=str.match(/^(\d+)$/);if(n)return parseInt(n[1])>10?parseInt(n[1]):parseInt(n[1])*60;
  return 0;
}
function startRest(secs,hint){
  restTotal=secs;restLeft=secs;
  document.getElementById('rest-hint').innerHTML=hint?`<strong>${hint}</strong>`:'';
  document.getElementById('rest-ov').classList.remove('h');
  updateRest();
  clearInterval(restIv);
  restIv=setInterval(()=>{restLeft--;updateRest();if(restLeft<=0){clearInterval(restIv);skipRest();}},1000);
}
function updateRest(){
  const m=String(Math.floor(restLeft/60)).padStart(2,'0');
  const s=String(restLeft%60).padStart(2,'0');
  const el=document.getElementById('rest-big');
  const pf=document.getElementById('rest-pf');
  if(el){el.textContent=`${m}:${s}`;el.className='rest-big'+(restLeft<=10?' warn':'');}
  if(pf)pf.style.width=`${Math.max(0,restLeft/restTotal*100)}%`;
}
window.skipRest=()=>{clearInterval(restIv);document.getElementById('rest-ov').classList.add('h');};

// ── CONDITIONING TIMER
function setupCond(){condSecs=0;condRunning=false;}
window.toggleCond=()=>{
  condRunning=!condRunning;
  const btn=document.getElementById('cond-toggle');
  if(btn)btn.textContent=condRunning?'⏸ Pausa':'▶ Start';
  if(condRunning){
    condIv=setInterval(()=>{
      condSecs++;
      const el=document.getElementById('cond-t');
      if(el)el.textContent=`${String(Math.floor(condSecs/60)).padStart(2,'0')}:${String(condSecs%60).padStart(2,'0')}`;
    },1000);
  }else clearInterval(condIv);
};
window.resetCond=()=>{clearInterval(condIv);condRunning=false;condSecs=0;const el=document.getElementById('cond-t');if(el)el.textContent='00:00';const b=document.getElementById('cond-toggle');if(b)b.textContent='▶ Start';};
window.adjR=(d)=>{condRounds=Math.max(0,condRounds+d);const el=document.getElementById('rnd-v');if(el)el.textContent=condRounds;};

// ── NAVIGATION
window.nav=async(dir)=>{
  if(dir===1){
    if(cur<exs.length-1){cur++;render();}
    else await finish();
  }else{
    if(cur>0){cur--;render();}
  }
};

// ── FINISH
async function finish(){
  clearInterval(condIv);
  const dur=Math.round((Date.now()-startTs)/60000);
  let totalSets=0;
  Object.entries(setData).forEach(([ei,sd])=>{
    const ex=exs[parseInt(ei)];
    if(!ex)return;
    if(ex._type==='complex'){Object.values(sd).forEach(csd=>Object.values(csd).forEach(s=>{if(s.done)totalSets++;}));}
    else{Object.values(sd).forEach(s=>{if(s.done)totalSets++;});}
  });
  totalSets+=Object.values(campoChecked).filter(Boolean).length;

  await push(ref(db,`session_logs/${AID}`),{
    ts:Date.now(),progId:PROG,weekIdx:WEEK,sessId:SESS,
    sessName:session.name||'Sessione',duration:dur,totalSets,newPRs,condSecs,condRounds,isQuick
  });

  // Save new PRs
  if(newPRs.length){
    const exSnap=await get(ref(db,`rm_exercises/${AID}`));
    const exObj=exSnap.val()||{};
    for(const pr of newPRs){
      const exKey=Object.entries(exObj).find(([,e])=>e.name===pr.name)?.[0];
      if(exKey){
        await push(ref(db,`rm_records/${AID}/${exKey}`),{ts:Date.now(),date:new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'}),value:pr.value,type:'sessione',exName:pr.name});
      }
    }
  }

  document.getElementById('sapp').style.display='none';
  const ds=document.getElementById('done-screen');
  ds.classList.add('show');
  document.getElementById('done-stats').innerHTML=`
    <div class="ds-item"><div class="ds-val">${dur}'</div><div class="ds-lbl">Durata</div></div>
    <div class="ds-item"><div class="ds-val">${totalSets}</div><div class="ds-lbl">Serie</div></div>
    <div class="ds-item"><div class="ds-val">${newPRs.length}</div><div class="ds-lbl">PR</div></div>`;
  if(newPRs.length){
    document.getElementById('pr-sec').style.display='block';
    document.getElementById('pr-list').innerHTML=newPRs.map(pr=>`<div class="pr-item"><span class="pr-nm">🏆 ${pr.name}</span><span class="pr-vl">${pr.value}kg</span></div>`).join('');
  }
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
function err(msg){
  document.getElementById('loading').style.display='none';
  document.body.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:14px;font-family:'Outfit',sans-serif;color:#EEF2FF;text-align:center;padding:24px;background:#0A0E17;"><div style="font-size:48px">⚠️</div><div style="font-size:16px;color:#B8C4D8;">${msg}</div><a href="javascript:history.back()" style="color:#06D6A0;font-weight:600;margin-top:4px;">← Torna indietro</a></div>`;
}
</script>
</body>
</html>
