<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RS Coaching — Sessione</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0E17;--card:#131928;--card2:#1A2235;--border:#1E2A40;
  --blue:#3B82F6;--teal:#06D6A0;--amber:#FBBF24;--red:#F87171;
  --green:#34D399;--purple:#A78BFA;--orange:#FB923C;
  --white:#EEF2FF;--muted:#4A5568;--text:#B8C4D8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);height:100%;}
body{font-family:'Outfit',sans-serif;color:var(--text);overflow-x:hidden;}

/* HEADER */
.sess-header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20;}
.back-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:6px;}
.back-btn:hover{color:var(--white);}
.sess-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--white);flex:1;}
.sess-meta{font-size:11px;color:var(--muted);}
.live-badge{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);color:var(--red);font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;animation:pulse-badge 2s ease-in-out infinite;}
@keyframes pulse-badge{0%,100%{opacity:1}50%{opacity:.6}}

/* PROGRESS BAR */
.progress-bar{height:3px;background:var(--border);}
.progress-fill{height:100%;background:var(--teal);transition:width .4s ease;}

/* CONTENT */
.sess-content{padding:16px;padding-bottom:100px;}

/* EXERCISE SECTION */
.ex-section{margin-bottom:20px;}
.ex-section-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.ex-num{width:28px;height:28px;border-radius:50%;background:var(--card2);border:1px solid var(--border);font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ex-num.active{background:var(--blue);border-color:var(--blue);color:var(--white);}
.ex-num.done{background:var(--teal);border-color:var(--teal);color:#070B12;}
.ex-section-name{font-weight:700;font-size:15px;color:var(--white);flex:1;}
.ex-section-params{font-size:12px;color:var(--muted);}
.ex-cue-box{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.18);border-radius:10px;padding:9px 12px;font-size:12px;color:var(--amber);margin-bottom:10px;display:flex;gap:7px;align-items:flex-start;}
.ex-cue-box::before{content:"💡";flex-shrink:0;}

/* COMPLEX BADGE */
.complex-header{background:rgba(251,113,74,.06);border:1px solid rgba(251,113,74,.2);border-radius:10px;padding:8px 12px;margin-bottom:10px;font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.8px;}

/* SETS TABLE */
.sets-table{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:8px;}
.sets-header{display:grid;padding:9px 14px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);background:rgba(255,255,255,.02);}
.sets-header.pesi{grid-template-columns:40px 1fr 1fr 80px 50px;}
.sets-header.campo{grid-template-columns:40px 1fr 80px 50px;}

.set-row{display:grid;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);transition:background .15s;}
.set-row:last-child{border-bottom:none;}
.set-row.pesi{grid-template-columns:40px 1fr 1fr 80px 50px;}
.set-row.campo{grid-template-columns:40px 1fr 80px 50px;}
.set-row.completed{background:rgba(6,214,160,.04);}
.set-row.active-row{background:rgba(59,130,246,.05);border-left:2px solid var(--blue);}

.set-num{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--muted);}
.set-num.done{color:var(--teal);}

/* SUGGESTED KG */
.kg-suggested{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--white);letter-spacing:.5px;}
.kg-suggested small{font-family:'Outfit',sans-serif;font-size:10px;color:var(--muted);display:block;margin-top:-2px;}

/* KG INPUT */
.kg-input-wrap{position:relative;}
.kg-input{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:9px;font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--white);text-align:center;padding:8px 4px;-webkit-appearance:none;transition:border-color .2s;}
.kg-input:focus{outline:none;border-color:var(--blue);}
.kg-input.done{border-color:rgba(6,214,160,.3);color:var(--teal);}

/* RPE INPUT */
.rpe-dots{display:flex;gap:3px;justify-content:center;}
.rpe-dot{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);cursor:pointer;transition:all .15s;flex-shrink:0;}
.rpe-dot:hover{border-color:var(--amber);}
.rpe-dot.sel-6,.rpe-dot.sel-7{background:var(--green);border-color:var(--green);}
.rpe-dot.sel-8{background:var(--amber);border-color:var(--amber);}
.rpe-dot.sel-9,.rpe-dot.sel-10{background:var(--red);border-color:var(--red);}

/* DONE TOGGLE */
.done-toggle{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;flex-shrink:0;}
.done-toggle.completed{background:var(--teal);border-color:var(--teal);}
.done-toggle:active{transform:scale(.9);}

/* E1RM BADGE */
.e1rm-badge{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);border-radius:8px;padding:6px 12px;display:inline-flex;align-items:center;gap:8px;margin-top:8px;}
.e1rm-val{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--purple);letter-spacing:.5px;}
.e1rm-lbl{font-size:11px;color:var(--muted);}
.pr-badge{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--amber);display:inline-flex;align-items:center;gap:5px;margin-left:6px;animation:pr-pulse .6s ease-in-out 3;}
@keyframes pr-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* REST TIMER */
.rest-overlay{position:fixed;inset:0;background:rgba(10,14,23,.95);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.rest-overlay.hidden{display:none;}
.rest-label{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;}
.rest-timer{font-family:'Bebas Neue',sans-serif;font-size:96px;color:var(--white);letter-spacing:-2px;line-height:1;}
.rest-timer.warning{color:var(--amber);}
.rest-timer.done-time{color:var(--teal);}
.rest-next{font-size:14px;color:var(--muted);text-align:center;max-width:260px;}
.rest-next strong{color:var(--white);}
.rest-actions{display:flex;gap:10px;margin-top:8px;}
.rest-btn{padding:12px 24px;border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.rest-skip{background:var(--card2);color:var(--text);border:1px solid var(--border);}
.rest-continue{background:var(--teal);color:#070B12;}
.rest-progress{width:200px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.rest-progress-fill{height:100%;background:var(--teal);transition:width 1s linear;}

/* CONDITIONING */
.cond-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.cond-type-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;background:rgba(251,113,74,.12);color:var(--orange);text-transform:uppercase;letter-spacing:.8px;display:inline-block;margin-bottom:10px;}
.cond-timer{font-family:'Bebas Neue',sans-serif;font-size:64px;color:var(--white);letter-spacing:-1px;text-align:center;margin:12px 0;}
.cond-content{font-size:13px;color:var(--text);white-space:pre-line;line-height:1.7;background:var(--card2);border-radius:10px;padding:12px;margin-bottom:12px;}
.cond-rounds{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--white);text-align:center;margin-bottom:8px;}

/* CAMPO */
.campo-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.campo-item.done-campo{opacity:.55;background:rgba(6,214,160,.03);}
.campo-intensity{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.7px;flex-shrink:0;}
.int-bassa{background:rgba(52,211,153,.1);color:var(--green);}
.int-media{background:rgba(251,191,36,.1);color:var(--amber);}
.int-alta{background:rgba(248,113,113,.1);color:var(--red);}
.int-max{background:rgba(248,113,113,.2);color:var(--red);border:1px solid rgba(248,113,113,.3);}
.campo-name{flex:1;font-weight:600;font-size:13px;color:var(--white);}
.campo-params{font-size:11px;color:var(--muted);margin-top:1px;}
.campo-check{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0;}
.campo-check.done-cb{background:var(--teal);border-color:var(--teal);}

/* BOTTOM ACTION */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:12px 18px;padding-bottom:calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px;align-items:center;}
.next-btn{flex:1;padding:15px;background:var(--blue);color:var(--white);border:none;border-radius:14px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;cursor:pointer;transition:all .15s;}
.next-btn:active{transform:scale(.97);}
.next-btn.finish{background:var(--teal);color:#070B12;}
.next-btn:disabled{background:var(--border);color:var(--muted);}
.prev-btn{width:44px;height:44px;border-radius:12px;background:var(--card2);border:1px solid var(--border);color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* COMPLETE SCREEN */
.complete-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;text-align:center;}
.complete-screen.show{display:flex;}
.complete-icon{font-size:64px;animation:bounce-in .6s cubic-bezier(.34,1.56,.64,1);}
@keyframes bounce-in{0%{transform:scale(0)}100%{transform:scale(1)}}
.complete-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;color:var(--white);}
.complete-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:360px;}
.cs-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;}
.cs-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--white);}
.cs-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.pr-list{width:100%;max-width:360px;}
.pr-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.18);border-radius:10px;margin-bottom:6px;}
.pr-item-name{font-size:13px;font-weight:600;color:var(--white);flex:1;}
.pr-item-val{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--amber);}

#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:999;}
.logo-big{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:3px;color:var(--white);}
.logo-big span{color:var(--teal);}
.dots{display:flex;gap:8px;}
.dots i{width:8px;height:8px;border-radius:50%;background:var(--teal);opacity:.25;animation:dp 1.2s ease-in-out infinite;}
.dots i:nth-child(2){animation-delay:.2s;}.dots i:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,100%{opacity:.25;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--card);border:1px solid var(--amber);color:var(--amber);padding:10px 18px;border-radius:50px;font-size:13px;font-weight:700;box-shadow:0 8px 30px rgba(0,0,0,.5);transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:9999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="loading"><div class="logo-big">RS<span>.</span></div><div class="dots"><i></i><i></i><i></i></div></div>

<!-- REST TIMER OVERLAY -->
<div class="rest-overlay hidden" id="rest-overlay">
  <div class="rest-label">Recupero</div>
  <div class="rest-timer" id="rest-display">2:00</div>
  <div class="rest-progress"><div class="rest-progress-fill" id="rest-progress-fill" style="width:100%"></div></div>
  <div class="rest-next" id="rest-next">—</div>
  <div class="rest-actions">
    <button class="rest-btn rest-skip" onclick="skipRest()">Salta →</button>
    <button class="rest-btn rest-continue" onclick="skipRest()">Continua</button>
  </div>
</div>

<!-- MAIN SESSION -->
<div id="session-app" style="display:none">
  <div class="sess-header">
    <button class="back-btn" onclick="confirmExit()">←</button>
    <div style="flex:1">
      <div class="sess-title" id="sh-name">—</div>
      <div class="sess-meta" id="sh-meta">—</div>
    </div>
    <div class="live-badge">IN CORSO</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="sess-content" id="sess-content"></div>
  <div class="bottom-bar">
    <button class="prev-btn" onclick="prevEx()" id="prev-btn">←</button>
    <button class="next-btn" id="next-btn" onclick="nextEx()">PROSSIMO ESERCIZIO →</button>
  </div>
</div>

<!-- COMPLETE SCREEN -->
<div class="complete-screen" id="complete-screen">
  <div class="complete-icon">🏆</div>
  <div class="complete-title">Sessione completata!</div>
  <div class="complete-stats" id="complete-stats"></div>
  <div id="pr-section" style="display:none;width:100%;max-width:360px;">
    <div style="font-size:13px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px;">🏆 Nuovi Personal Record</div>
    <div class="pr-list" id="pr-list"></div>
  </div>
  <button onclick="window.location.href='/athlete/?id='+athleteId" style="width:100%;max-width:360px;padding:15px;background:var(--teal);color:#070B12;border:none;border-radius:14px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;cursor:pointer;margin-top:8px;">TORNA ALL'APP →</button>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg={apiKey:"AIzaSyAayWDWvUQqtAfIlm7qA8kMKxJu2-_y7k4",authDomain:"rscoaching-a6c61.firebaseapp.com",databaseURL:"https://rscoaching-a6c61-default-rtdb.europe-west1.firebasedatabase.app",projectId:"rscoaching-a6c61",storageBucket:"rscoaching-a6c61.firebasestorage.app",messagingSenderId:"499942544251",appId:"1:499942544251:web:bd246cc6846b0fad89e3de"};
const app=initializeApp(cfg);
const db=getDatabase(app);

const params=new URLSearchParams(window.location.search);
const athleteId=params.get('id');
const progId=params.get('prog');
const weekIdx=parseInt(params.get('week')||'0');
const sessId=params.get('sess');

window.athleteId=athleteId;

// STATE
let athlete={}, program={}, session={}, exercises=[];
let currentExIdx=0;
let setData={}; // setData[exIdx][setIdx] = {kg, rpe, done}
let best1rm={};
let newPRs=[];
let startTime=Date.now();
let restInterval=null;
let condTimerInterval=null;
let campoChecked={};

// INIT
async function init(){
  if(!athleteId||!progId||!sessId){showError('Parametri mancanti');return;}
  const [aSnap,pSnap,rmSnap]=await Promise.all([
    get(ref(db,`athletes/${athleteId}`)),
    get(ref(db,`programs/${progId}`)),
    get(ref(db,`rm_records/${athleteId}`))
  ]);
  if(!aSnap.exists()||!pSnap.exists()){showError('Programma non trovato');return;}
  athlete=aSnap.val();
  program=pSnap.val();

  // Build best 1rm map
  const recs=rmSnap.val()||{};
  Object.values(recs).forEach(exRecs=>{
    Object.values(exRecs).forEach(r=>{
      if(!best1rm[r.exName]||r.value>best1rm[r.exName])best1rm[r.exName]=r.value;
    });
  });

  // Get session
  const weeks=Object.entries(program.weeks||{}).sort((a,b)=>a[1].order-b[1].order);
  const [wid,week]=weeks[weekIdx]||[];
  if(!week){showError('Settimana non trovata');return;}
  const s=week.sessions?.[sessId];
  if(!s){showError('Sessione non trovata');return;}
  session=s;

  // Build exercises array
  if(s.type==='conditioning'){
    exercises=[{name:s.condType||'Conditioning',type:'conditioning',condType:s.condType,duration:s.duration,condContent:s.condContent}];
  } else if(s.type==='campo'){
    exercises=Object.entries(s.exercises||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0)).map(([eid,e])=>({...e,_eid:eid}));
  } else {
    // Pesi / Sprint — group complex
    const rawExs=Object.entries(s.exercises||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0)).map(([eid,e])=>({...e,_eid:eid}));
    // Group by complexGroup
    const groups={}, standalone=[];
    rawExs.forEach(e=>{if(e.complexGroup){if(!groups[e.complexGroup])groups[e.complexGroup]=[];groups[e.complexGroup].push(e);}else standalone.push(e);});
    exercises=[];
    // Interleave: add standalone before their order, complexes as single unit
    rawExs.forEach(e=>{
      if(!e.complexGroup){exercises.push(e);}
      else if(groups[e.complexGroup]&&groups[e.complexGroup][0]._eid===e._eid){
        exercises.push({_isComplex:true,_ckey:e.complexGroup,items:groups[e.complexGroup],rest:groups[e.complexGroup][groups[e.complexGroup].length-1].rest});
        delete groups[e.complexGroup];
      }
    });
  }

  // Init set data
  exercises.forEach((ex,i)=>{
    if(ex._isComplex){
      setData[i]={};
      ex.items.forEach((item,ci)=>{
        setData[i][ci]={};
        for(let s=0;s<(item.sets||3);s++) setData[i][ci][s]={kg:'',rpe:null,done:false};
      });
    } else if(ex.type!=='conditioning'){
      setData[i]={};
      for(let s=0;s<(ex.sets||3);s++) setData[i][s]={kg:'',rpe:null,done:false};
    }
  });

  document.getElementById('loading').style.display='none';
  document.getElementById('session-app').style.display='block';
  document.getElementById('sh-name').textContent=s.name||session.type;
  document.getElementById('sh-meta').textContent=`${athlete.name} · Settimana ${weekIdx+1} · ${exercises.length} esercizi`;

  renderCurrent();
}
init();

function showError(msg){
  document.getElementById('loading').style.display='none';
  document.body.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;font-family:sans-serif;color:#4A5568;text-align:center;padding:20px;"><div style="font-size:40px;">⚠️</div><div style="font-size:18px;color:#EEF2FF;">${msg}</div><a href="javascript:history.back()" style="color:#06D6A0;">← Torna indietro</a></div>`;
}

// ── RENDER CURRENT EXERCISE
function renderCurrent(){
  const ex=exercises[currentExIdx];
  if(!ex)return;
  updateProgress();

  const isLast=currentExIdx===exercises.length-1;
  const nextBtn=document.getElementById('next-btn');
  nextBtn.textContent=isLast?'COMPLETA SESSIONE ✓':'PROSSIMO →';
  nextBtn.className='next-btn'+(isLast?' finish':'');
  document.getElementById('prev-btn').style.opacity=currentExIdx===0?'.3':'1';

  let html='';
  if(ex.type==='conditioning') html=renderConditioning(ex);
  else if(session.type==='campo') html=renderCampoExercise(ex,currentExIdx);
  else if(ex._isComplex) html=renderComplex(ex,currentExIdx);
  else html=renderWeightsExercise(ex,currentExIdx);
  document.getElementById('sess-content').innerHTML=html;

  // Init conditioning timer if needed
  if(ex.type==='conditioning')initCondTimer();
}

// ── WEIGHTS EXERCISE
function renderWeightsExercise(ex,exIdx){
  const rm=best1rm[ex.name]||0;
  const pct=parseFloat(ex.pct)||0;
  const kgSug=rm>0&&pct>0?Math.round(rm*pct/100/2.5)*2.5:0;
  const sets=parseInt(ex.sets)||3;
  const sd=setData[exIdx]||{};

  // e1RM from completed sets
  let e1rm=0, bestSet=null;
  for(let s=0;s<sets;s++){
    if(sd[s]?.done&&sd[s]?.kg){
      const kg=parseFloat(sd[s].kg);
      const reps=parseFloat(ex.reps)||1;
      const est=Math.round(kg*(1+reps/30));
      if(est>e1rm){e1rm=est;bestSet={kg,reps,est};}
    }
  }

  const doneCount=Object.values(sd).filter(s=>s.done).length;
  const e1rmHtml=e1rm>0?`<div style="margin-top:8px;display:flex;align-items:center;gap:6px;">
    <div class="e1rm-badge"><div class="e1rm-lbl">e1RM stimato</div><div class="e1rm-val">${e1rm}kg</div></div>
    ${e1rm>(best1rm[ex.name]||0)?`<div class="pr-badge">🏆 PR</div>`:''}
  </div>`:'';

  return `<div class="ex-section">
    <div class="ex-section-head">
      <div class="ex-num${doneCount===sets?' done':doneCount>0?' active':''}">${doneCount===sets?'✓':currentExIdx+1}</div>
      <div style="flex:1">
        <div class="ex-section-name">${ex.name}</div>
        <div class="ex-section-params">${ex.sets} serie × ${ex.reps||'—'} reps${pct>0?` · @${pct}% 1RM`:''}${ex.rpe?` · RPE target ${ex.rpe}`:''}</div>
      </div>
    </div>
    ${ex.cue?`<div class="ex-cue-box">${ex.cue}</div>`:''}
    ${rm>0&&kgSug>0?`<div style="background:rgba(167,139,250,.06);border:1px solid rgba(167,139,250,.15);border-radius:10px;padding:9px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;"><span style="font-size:12px;color:var(--muted);">Carico suggerito (${pct}% di ${rm}kg)</span><span style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--purple);">${kgSug}kg</span></div>`:''}
    <div class="sets-table">
      <div class="sets-header pesi"><span>Set</span><span>Reps</span><span>Kg usati</span><span>RPE</span><span>✓</span></div>
      ${Array.from({length:sets},(_,s)=>{
        const sd_s=sd[s]||{kg:'',rpe:null,done:false};
        const rpeHtml=`<div class="rpe-dots">${[6,7,8,9,10].map(r=>`<div class="rpe-dot${sd_s.rpe===r?' sel-'+r:''}" onclick="setRpe(${exIdx},${s},${r})" title="RPE ${r}"></div>`).join('')}</div>`;
        return `<div class="set-row pesi${sd_s.done?' completed':s===doneCount?' active-row':''}">
          <span class="set-num${sd_s.done?' done':''}">${s+1}</span>
          <span style="font-size:13px;color:var(--muted);">${ex.reps||'—'}</span>
          <div class="kg-input-wrap"><input class="kg-input${sd_s.done?' done':''}" type="number" inputmode="decimal" value="${sd_s.kg}" placeholder="${kgSug||'—'}" id="kg-${exIdx}-${s}" onchange="setKg(${exIdx},${s},this.value)"></div>
          ${rpeHtml}
          <button class="done-toggle${sd_s.done?' completed':''}" onclick="toggleDone(${exIdx},${s})">${sd_s.done?'✓':''}</button>
        </div>`;
      }).join('')}
    </div>
    ${e1rmHtml}
    ${ex.rest?`<div style="font-size:11px;color:var(--muted);margin-top:8px;">⏱ Recupero: ${ex.rest}</div>`:''}
  </div>`;
}

// ── COMPLEX
function renderComplex(ex,exIdx){
  const sd=setData[exIdx]||{};
  const sets=parseInt(ex.items[0]?.sets)||4;
  let html=`<div class="complex-header">🔁 Complex · ${sets} round · rec ${ex.rest||'3'} dopo ogni round</div>`;
  ex.items.forEach((item,ci)=>{
    const rm=best1rm[item.name]||0;
    const pct=parseFloat(item.pct)||0;
    const kgSug=rm>0&&pct>0?Math.round(rm*pct/100/2.5)*2.5:0;
    const csd=sd[ci]||{};
    html+=`<div class="ex-section" style="margin-bottom:12px;">
      <div class="ex-section-head">
        <div class="ex-num" style="background:rgba(251,113,74,.15);color:var(--orange);border-color:rgba(251,113,74,.25);">${item.complexLabel||`A${ci+1}`}</div>
        <div style="flex:1"><div class="ex-section-name">${item.name}</div>
        <div class="ex-section-params">${item.sets} serie × ${item.reps||'—'}${pct>0?` @${pct}%`:''}</div></div>
      </div>
      ${item.cue?`<div class="ex-cue-box">${item.cue}</div>`:''}
      ${kgSug>0?`<div style="background:rgba(167,139,250,.05);border:1px solid rgba(167,139,250,.12);border-radius:8px;padding:7px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:11px;color:var(--muted);">Sugg. ${pct}%</span><span style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--purple);">${kgSug}kg</span></div>`:''}
      <div class="sets-table">
        <div class="sets-header pesi"><span>Round</span><span>Reps</span><span>Kg</span><span>RPE</span><span>✓</span></div>
        ${Array.from({length:sets},(_,s)=>{
          const sd_s=csd[s]||{kg:'',rpe:null,done:false};
          const rpeHtml=`<div class="rpe-dots">${[6,7,8,9,10].map(r=>`<div class="rpe-dot${sd_s.rpe===r?' sel-'+r:''}" onclick="setRpeCx(${exIdx},${ci},${s},${r})"></div>`).join('')}</div>`;
          return `<div class="set-row pesi${sd_s.done?' completed':''}">
            <span class="set-num${sd_s.done?' done':''}">${s+1}</span>
            <span style="font-size:13px;color:var(--muted);">${item.reps||'—'}</span>
            <input class="kg-input${sd_s.done?' done':''}" style="max-width:80px;" type="number" inputmode="decimal" value="${sd_s.kg}" placeholder="${kgSug||'—'}" onchange="setKgCx(${exIdx},${ci},${s},this.value)">
            ${rpeHtml}
            <button class="done-toggle${sd_s.done?' completed':''}" onclick="toggleDoneCx(${exIdx},${ci},${s})">${sd_s.done?'✓':''}</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  return html;
}

// ── CAMPO EXERCISE
function renderCampoExercise(ex,exIdx){
  const intCls={BASSA:'int-bassa',MEDIA:'int-media',ALTA:'int-alta',MAX:'int-max'};
  const checked=campoChecked[exIdx]||false;
  return `<div class="campo-item${checked?' done-campo':''}">
    ${ex.intensity?`<span class="campo-intensity ${intCls[ex.intensity]||'int-media'}">${ex.intensity}</span>`:''}
    <div style="flex:1">
      <div class="campo-name">${ex.name}</div>
      <div class="campo-params">${[ex.sets&&ex.sets+'×',ex.reps,ex.rest&&'rec '+ex.rest].filter(Boolean).join(' · ')}</div>
      ${ex.cue?`<div class="ex-cue-box" style="margin-top:6px;">${ex.cue}</div>`:''}
    </div>
    <button class="campo-check${checked?' done-cb':''}" onclick="toggleCampo(${exIdx})">${checked?'✓':''}</button>
  </div>`;
}

// ── CONDITIONING
function renderConditioning(ex){
  return `<div class="cond-card">
    <span class="cond-type-badge">${ex.condType||'Conditioning'}</span>
    ${ex.duration?`<div style="font-size:13px;color:var(--muted);margin-bottom:8px;">${ex.duration}</div>`:''}
    <div class="cond-timer" id="cond-timer">00:00</div>
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:12px;">
      <button onclick="toggleCondTimer()" id="cond-toggle" style="padding:10px 22px;background:var(--teal);color:#070B12;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">▶ Start</button>
      <button onclick="resetCondTimer()" style="padding:10px 16px;background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:10px;font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;">Reset</button>
    </div>
    <div class="cond-content">${ex.condContent||'Nessun contenuto'}</div>
    <div id="cond-rounds-wrap" style="text-align:center;display:${ex.condType==='AMRAP'?'block':'none'};">
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">Round completati</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:16px;">
        <button onclick="adjRounds(-1)" style="width:36px;height:36px;border-radius:50%;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:20px;cursor:pointer;">−</button>
        <div class="cond-rounds" id="cond-rounds">0</div>
        <button onclick="adjRounds(1)" style="width:36px;height:36px;border-radius:50%;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:20px;cursor:pointer;">+</button>
      </div>
    </div>
  </div>`;
}

let condRunning=false, condSeconds=0, condRounds=0;
function initCondTimer(){condSeconds=0;condRunning=false;}
window.toggleCondTimer=function(){
  condRunning=!condRunning;
  document.getElementById('cond-toggle').textContent=condRunning?'⏸ Pausa':'▶ Start';
  if(condRunning){
    condTimerInterval=setInterval(()=>{
      condSeconds++;
      const m=Math.floor(condSeconds/60).toString().padStart(2,'0');
      const s=(condSeconds%60).toString().padStart(2,'0');
      const el=document.getElementById('cond-timer');
      if(el)el.textContent=`${m}:${s}`;
    },1000);
  } else clearInterval(condTimerInterval);
};
window.resetCondTimer=function(){clearInterval(condTimerInterval);condRunning=false;condSeconds=0;const el=document.getElementById('cond-timer');if(el)el.textContent='00:00';const t=document.getElementById('cond-toggle');if(t)t.textContent='▶ Start';};
window.adjRounds=function(d){condRounds=Math.max(0,condRounds+d);const el=document.getElementById('cond-rounds');if(el)el.textContent=condRounds;};

// ── SET ACTIONS
window.setKg=function(exIdx,s,val){if(!setData[exIdx])setData[exIdx]={};if(!setData[exIdx][s])setData[exIdx][s]={};setData[exIdx][s].kg=val;};
window.setRpe=function(exIdx,s,rpe){if(!setData[exIdx][s])setData[exIdx][s]={};setData[exIdx][s].rpe=rpe;renderCurrent();};
window.toggleDone=function(exIdx,s){
  if(!setData[exIdx][s])setData[exIdx][s]={};
  const kg=document.getElementById(`kg-${exIdx}-${s}`)?.value;
  if(kg)setData[exIdx][s].kg=kg;
  setData[exIdx][s].done=!setData[exIdx][s].done;
  renderCurrent();
  // Auto rest timer
  if(setData[exIdx][s].done){
    const ex=exercises[exIdx];
    const rest=parseRestSeconds(ex.rest);
    const allDone=Object.values(setData[exIdx]).every(sd=>sd.done);
    if(rest>0&&!allDone)startRestTimer(rest, nextSetHint(exIdx,s));
    // Check e1RM and PR
    checkPR(ex,exIdx,s);
  }
};
window.setKgCx=function(exIdx,ci,s,val){if(!setData[exIdx][ci][s])setData[exIdx][ci][s]={};setData[exIdx][ci][s].kg=val;};
window.setRpeCx=function(exIdx,ci,s,rpe){if(!setData[exIdx][ci][s])setData[exIdx][ci][s]={};setData[exIdx][ci][s].rpe=rpe;renderCurrent();};
window.toggleDoneCx=function(exIdx,ci,s){
  if(!setData[exIdx][ci][s])setData[exIdx][ci][s]={};
  setData[exIdx][ci][s].done=!setData[exIdx][ci][s].done;
  renderCurrent();
  // Rest after last exercise in complex
  const ex=exercises[exIdx];
  const isLastItem=ci===ex.items.length-1;
  if(isLastItem&&setData[exIdx][ci][s].done){
    const rest=parseRestSeconds(ex.rest||'3\'');
    if(rest>0)startRestTimer(rest,`Round ${s+2} del complex`);
  }
};
window.toggleCampo=function(exIdx){campoChecked[exIdx]=!campoChecked[exIdx];renderCurrent();};

function checkPR(ex,exIdx,setIdx){
  const sd=setData[exIdx][setIdx];
  if(!sd?.kg||!sd?.done)return;
  const kg=parseFloat(sd.kg);
  const reps=parseFloat(ex.reps)||1;
  const e1rm=Math.round(kg*(1+reps/30));
  const prev=best1rm[ex.name]||0;
  if(e1rm>prev){
    best1rm[ex.name]=e1rm;
    if(!newPRs.find(p=>p.name===ex.name))newPRs.push({name:ex.name,value:e1rm});
    showToast(`🏆 PR! ${ex.name}: ${e1rm}kg e1RM`);
    renderCurrent();
  }
}

function nextSetHint(exIdx,doneSet){
  const ex=exercises[exIdx];
  const sets=parseInt(ex.sets)||3;
  if(doneSet<sets-1)return `Serie ${doneSet+2} di ${sets} — ${ex.name}`;
  if(exIdx<exercises.length-1)return `Prossimo: ${exercises[exIdx+1].name||exercises[exIdx+1].items?.[0]?.name||'—'}`;
  return 'Ultima serie!';
}

// ── REST TIMER
function parseRestSeconds(str){
  if(!str)return 0;
  const m=str.match(/(\d+)'(\d*)/);if(m)return parseInt(m[1])*60+(parseInt(m[2])||0);
  const s=str.match(/(\d+)"/);if(s)return parseInt(s[1]);
  const n=str.match(/(\d+)/);if(n)return parseInt(n[1]);
  return 0;
}

let restTotal=0, restLeft=0;
function startRestTimer(secs, nextHint=''){
  restTotal=secs; restLeft=secs;
  document.getElementById('rest-next').innerHTML=nextHint?`Prossimo: <strong>${nextHint}</strong>`:'';
  document.getElementById('rest-overlay').classList.remove('hidden');
  updateRestDisplay();
  clearInterval(restInterval);
  restInterval=setInterval(()=>{
    restLeft--;
    updateRestDisplay();
    if(restLeft<=0){clearInterval(restInterval);skipRest();}
  },1000);
}

function updateRestDisplay(){
  const m=Math.floor(restLeft/60).toString().padStart(2,'0');
  const s=(restLeft%60).toString().padStart(2,'0');
  const el=document.getElementById('rest-display');
  const pf=document.getElementById('rest-progress-fill');
  if(el){el.textContent=`${m}:${s}`;el.className='rest-timer'+(restLeft<=10?' warning':restLeft<=0?' done-time':'');}
  if(pf)pf.style.width=`${Math.max(0,restLeft/restTotal*100)}%`;
}

window.skipRest=function(){clearInterval(restInterval);document.getElementById('rest-overlay').classList.add('hidden');};

// ── NAVIGATION
function updateProgress(){
  const pct=((currentExIdx)/(exercises.length))*100;
  document.getElementById('prog-fill').style.width=pct+'%';
}

window.nextEx=async function(){
  if(currentExIdx<exercises.length-1){
    currentExIdx++;
    renderCurrent();
    document.getElementById('sess-content').scrollTo(0,0);
    window.scrollTo(0,0);
  } else {
    await completeSession();
  }
};

window.prevEx=function(){
  if(currentExIdx>0){currentExIdx--;renderCurrent();}
};

window.confirmExit=function(){
  if(confirm('Uscire dalla sessione? I dati non saranno salvati.'))history.back();
};

// ── COMPLETE SESSION
async function completeSession(){
  const duration=Math.round((Date.now()-startTime)/60000);
  const totalSets=Object.values(setData).reduce((tot,sd)=>{
    if(typeof Object.values(sd)[0]==='object'&&Object.values(sd)[0]!==null){
      return tot+Object.values(sd).reduce((t,csd)=>t+Object.values(csd).filter(s=>s.done).length,0);
    }
    return tot+Object.values(sd).filter(s=>s.done).length;
  },0);

  // Save to Firebase
  const sessionLog={
    ts:Date.now(),
    programId:progId,
    programName:program.name,
    weekIdx,
    sessId,
    sessName:session.name,
    duration,
    totalSets,
    exercises:exercises.map((ex,i)=>{
      if(ex._isComplex)return{name:`Complex`,sets:Object.entries(setData[i]||{}).flatMap(([ci,csd])=>Object.entries(csd).map(([s,sd])=>({...sd,complexItem:ex.items[ci]?.name})))};
      if(ex.type==='conditioning')return{name:ex.condType,duration:condSeconds,rounds:condRounds};
      return{name:ex.name,sets:Object.values(setData[i]||{})};
    }),
    newPRs
  };
  await push(ref(db,`session_logs/${athleteId}`),sessionLog);

  // Save new PRs to rm_records
  for(const pr of newPRs){
    const exKey=Object.entries(await get(ref(db,`rm_exercises/${athleteId}`)).then(s=>s.val()||{})).find(([,e])=>e.name===pr.name)?.[0];
    if(exKey){
      await push(ref(db,`rm_records/${athleteId}/${exKey}`),{ts:Date.now(),date:new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'}),value:pr.value,type:'sessione',exName:pr.name});
    }
  }

  // Show complete screen
  document.getElementById('session-app').style.display='none';
  const cs=document.getElementById('complete-screen');
  cs.classList.add('show');
  document.getElementById('complete-stats').innerHTML=`
    <div class="cs-item"><div class="cs-val">${duration}'</div><div class="cs-lbl">Durata</div></div>
    <div class="cs-item"><div class="cs-val">${totalSets}</div><div class="cs-lbl">Serie tot.</div></div>
    <div class="cs-item"><div class="cs-val">${newPRs.length}</div><div class="cs-lbl">Nuovi PR</div></div>`;

  if(newPRs.length){
    document.getElementById('pr-section').style.display='block';
    document.getElementById('pr-list').innerHTML=newPRs.map(p=>`<div class="pr-item"><span class="pr-item-name">🏆 ${p.name}</span><span class="pr-item-val">${p.value}kg</span></div>`).join('');
  }
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
</script>
