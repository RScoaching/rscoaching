<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RS Coaching — Sessione</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D1117;
  --card:#161B26;
  --card2:#1C2333;
  --card3:#222A3A;
  --border:#2A3548;
  --border2:#334060;
  --blue:#4F9EF8;
  --teal:#00E5A0;
  --amber:#FFD166;
  --red:#FF6B6B;
  --green:#51CF66;
  --purple:#CC77FF;
  --orange:#FF9F43;
  --white:#F0F4FF;
  --muted:#5A6A80;
  --text:#A8B8D0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);min-height:100%;}
body{font-family:'Outfit',sans-serif;color:var(--text);padding-bottom:100px;}

/* ── HEADER */
.hdr{
  background:linear-gradient(135deg,#1a2235 0%,#161b26 100%);
  border-bottom:1px solid var(--border);
  padding:14px 16px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:20;
  box-shadow:0 2px 20px rgba(0,0,0,.3);
}
.back{background:rgba(255,255,255,.08);border:1px solid var(--border2);color:var(--white);font-size:18px;cursor:pointer;line-height:1;padding:7px 10px;border-radius:9px;transition:all .15s;}
.back:active{background:rgba(255,255,255,.15);}
.hdr-info{flex:1;min-width:0;}
.hdr-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-meta{font-size:11px;color:var(--muted);margin-top:1px;}
.live-pill{background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.35);color:var(--red);font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;animation:blink 2s ease-in-out infinite;flex-shrink:0;letter-spacing:.5px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}

/* ── PROGRESS */
.prog-bar{height:4px;background:var(--border);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));transition:width .5s ease;border-radius:0 2px 2px 0;}

/* ── EX NAV DOTS */
.ex-nav{display:flex;gap:7px;padding:14px 16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.ex-nav::-webkit-scrollbar{display:none;}
.ex-dot{
  width:34px;height:34px;border-radius:50%;
  border:2px solid var(--border2);
  background:var(--card2);
  color:var(--muted);
  font-family:'Bebas Neue',sans-serif;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;flex-shrink:0;
}
.ex-dot.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 0 12px rgba(79,158,248,.4);}
.ex-dot.done{background:var(--teal);border-color:var(--teal);color:#0D1117;box-shadow:0 0 12px rgba(0,229,160,.3);}

/* ── CONTENT */
.content{padding:14px 16px;}

/* ── EX CARD */
.ex-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  margin-bottom:14px;
  box-shadow:0 4px 20px rgba(0,0,0,.2);
}

/* ── TYPE PILLS */
.ex-type-pill{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;
  padding:3px 10px;border-radius:12px;display:inline-block;margin-bottom:6px;
}
.tp-pesi{background:rgba(204,119,255,.15);color:var(--purple);border:1px solid rgba(204,119,255,.25);}
.tp-campo{background:rgba(0,229,160,.12);color:var(--teal);border:1px solid rgba(0,229,160,.22);}
.tp-sprint{background:rgba(255,107,107,.12);color:var(--red);border:1px solid rgba(255,107,107,.22);}
.tp-complex{background:rgba(255,159,67,.12);color:var(--orange);border:1px solid rgba(255,159,67,.22);}
.tp-cond{background:rgba(255,107,107,.12);color:var(--red);border:1px solid rgba(255,107,107,.22);}

/* ── EX CARD HEAD */
.ex-card-head{
  padding:16px 16px 12px;
  background:linear-gradient(135deg,var(--card2) 0%,var(--card) 100%);
  border-bottom:1px solid var(--border);
}
.ex-card-name{
  font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;
  color:var(--white);line-height:1.1;
}
.ex-card-params{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5;}

/* ── CUE */
.cue-chip{
  background:rgba(255,209,102,.08);
  border:1px solid rgba(255,209,102,.2);
  border-radius:10px;
  padding:8px 12px;
  font-size:11px;color:var(--amber);
  margin-top:10px;
  display:flex;gap:8px;align-items:flex-start;
  line-height:1.5;
}

/* ── SUGGESTED KG */
.sug-kg-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  background:linear-gradient(135deg,rgba(204,119,255,.1) 0%,rgba(79,158,248,.06) 100%);
  border-bottom:1px solid rgba(204,119,255,.15);
}
.sug-kg-lbl{font-size:11px;color:var(--text);}
.sug-kg-pct{font-size:10px;color:var(--muted);margin-top:1px;}
.sug-kg-val{
  font-family:'Bebas Neue',sans-serif;
  font-size:36px;color:var(--purple);
  letter-spacing:1px;line-height:1;
}
.sug-kg-unit{font-size:14px;color:var(--muted);font-family:'Outfit',sans-serif;}

/* ── SETS TABLE */
.sets-wrap{padding:0 12px 12px;}
.sets-head{
  display:grid;grid-template-columns:38px 54px 1fr 80px 40px;
  gap:6px;padding:8px 10px;
  background:rgba(255,255,255,.03);
  border-radius:10px;
  margin:10px 0 6px;
}
.sets-head span{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}

.set-row{
  display:grid;grid-template-columns:38px 54px 1fr 80px 40px;
  gap:6px;padding:8px 10px;
  border-radius:12px;
  align-items:center;
  margin-bottom:5px;
  background:#1E2840;
  border:1.5px solid #2E3F60;
  transition:all .2s;
}
.set-row.cur{
  background:rgba(79,158,248,.08);
  border-color:rgba(79,158,248,.4);
  box-shadow:0 0 0 3px rgba(79,158,248,.08);
}
.set-row.done{
  background:rgba(0,229,160,.06);
  border-color:rgba(0,229,160,.3);
}

.sn{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted);text-align:center;}
.sn.d{color:var(--teal);}
.reps-lbl{
  font-size:14px;font-weight:600;color:var(--white);
  text-align:center;
}

/* ── KG INPUT — big and clear */
.kg-inp{
  width:100%;
  background:#2A3550;
  border:2px solid #3D5080;
  border-radius:12px;
  font-family:'Bebas Neue',sans-serif;
  font-size:26px;color:#F0F4FF;
  text-align:center;
  padding:10px 4px;
  -webkit-appearance:none;
  transition:all .2s;
}
.kg-inp:focus{
  outline:none;
  border-color:#4F9EF8;
  background:#2E4070;
  box-shadow:0 0 0 3px rgba(79,158,248,.2);
  color:#fff;
}
.kg-inp.d{
  border-color:#00C87A;
  color:#00E5A0;
  background:#1A3530;
}
.kg-inp::placeholder{color:#6A7D98;font-size:18px;}

/* ── REPS INPUT */
.reps-inp:focus{outline:none;border-color:#4F9EF8;background:#2E4070;}
.reps-inp::placeholder{color:#6A7D98;}

/* ── RPE */
.rpe-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.rpe-row{display:flex;gap:3px;}
.rpe-d{
  width:16px;height:16px;border-radius:50%;
  border:2px solid var(--border2);
  cursor:pointer;transition:all .2s;
  background:var(--card3);
}
.rpe-d:active{transform:scale(1.3);}
.rpe-d.r6,.rpe-d.r7{background:var(--green);border-color:var(--green);box-shadow:0 0 6px rgba(81,207,102,.4);}
.rpe-d.r8{background:var(--amber);border-color:var(--amber);box-shadow:0 0 6px rgba(255,209,102,.4);}
.rpe-d.r9,.rpe-d.r10{background:var(--red);border-color:var(--red);box-shadow:0 0 6px rgba(255,107,107,.4);}
.rpe-val{font-size:9px;font-weight:700;color:var(--muted);}
.rpe-val.v6,.rpe-val.v7{color:var(--green);}
.rpe-val.v8{color:var(--amber);}
.rpe-val.v9,.rpe-val.v10{color:var(--red);}

/* ── DONE BUTTON */
.done-btn{
  width:36px;height:36px;border-radius:50%;
  border:2px solid var(--border2);
  background:var(--card3);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:all .2s;
  color:var(--muted);
}
.done-btn.d{
  background:var(--teal);border-color:var(--teal);
  color:#0D1117;font-weight:900;
  box-shadow:0 0 12px rgba(0,229,160,.35);
}
.done-btn:active{transform:scale(.85);}

/* ── E1RM */
.e1rm-wrap{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;border-top:1px solid var(--border);
  background:rgba(255,255,255,.01);
  flex-wrap:wrap;
}
.e1rm-chip{
  background:rgba(204,119,255,.08);
  border:1px solid rgba(204,119,255,.22);
  border-radius:10px;padding:6px 12px;
  display:flex;align-items:center;gap:8px;
}
.e1rm-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--purple);}
.e1rm-lbl{font-size:10px;color:var(--muted);}
.pr-chip{
  background:linear-gradient(135deg,rgba(255,209,102,.15),rgba(255,159,67,.1));
  border:1px solid rgba(255,209,102,.35);
  border-radius:10px;padding:6px 12px;
  font-size:12px;font-weight:700;color:var(--amber);
  animation:poppr .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes poppr{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

/* ── REST OVERLAY */
.rest-ov{
  position:fixed;inset:0;
  background:rgba(13,17,23,.97);
  z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
.rest-ov.h{display:none;}
.rest-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;}
.rest-big{
  font-family:'Bebas Neue',sans-serif;
  font-size:100px;color:var(--white);
  letter-spacing:-4px;line-height:1;
  transition:color .3s;
  text-shadow:0 0 40px rgba(0,229,160,.2);
}
.rest-big.warn{color:var(--amber);text-shadow:0 0 40px rgba(255,209,102,.3);}
.rest-prog{width:220px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.rest-pf{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));transition:width 1s linear;border-radius:3px;}
.rest-hint{font-size:13px;color:var(--muted);text-align:center;max-width:240px;line-height:1.5;}
.rest-hint strong{color:var(--white);}
.rest-skip{
  padding:13px 36px;
  background:linear-gradient(135deg,var(--teal),var(--blue));
  color:#0D1117;border:none;border-radius:14px;
  font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;margin-top:6px;
  box-shadow:0 4px 20px rgba(0,229,160,.25);
}

/* ── COMPLEX */
.cx-hdr{
  background:rgba(255,159,67,.08);
  border:1px solid rgba(255,159,67,.2);
  border-radius:12px;
  padding:10px 14px;
  font-size:11px;font-weight:700;color:var(--orange);
  text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.cx-sep{
  background:rgba(255,159,67,.06);
  border-top:1px solid rgba(255,159,67,.15);
  padding:8px 16px;
  font-size:10px;font-weight:700;color:var(--orange);
  text-transform:uppercase;letter-spacing:1.2px;
  display:flex;align-items:center;gap:6px;
}

/* ── CAMPO */
.campo-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  transition:background .15s;
}
.campo-item:last-child{border-bottom:none;}
.campo-item.ck{background:rgba(0,229,160,.04);opacity:.65;}
.int-box{
  width:46px;height:46px;border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex-shrink:0;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
}
.ib-b{background:rgba(81,207,102,.1);border:1px solid rgba(81,207,102,.25);color:var(--green);}
.ib-m{background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.25);color:var(--amber);}
.ib-a{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.25);color:var(--red);}
.ib-x{background:rgba(255,107,107,.2);border:2px solid rgba(255,107,107,.4);color:var(--red);}
.campo-name{flex:1;font-weight:600;font-size:14px;color:var(--white);}
.campo-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.campo-ck{
  width:38px;height:38px;border-radius:50%;
  border:2px solid var(--border2);
  background:var(--card3);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:all .2s;flex-shrink:0;
}
.campo-ck.ck{background:var(--teal);border-color:var(--teal);box-shadow:0 0 12px rgba(0,229,160,.3);}

/* ── CONDITIONING */
.cond-wrap{padding:18px 16px;}
.cond-badge{
  font-size:11px;font-weight:700;padding:4px 11px;border-radius:12px;
  background:rgba(255,107,107,.12);color:var(--red);
  border:1px solid rgba(255,107,107,.25);
  text-transform:uppercase;letter-spacing:.8px;
  display:inline-block;margin-bottom:12px;
}
.cond-timer{
  font-family:'Bebas Neue',sans-serif;font-size:80px;
  color:var(--white);text-align:center;
  letter-spacing:-3px;margin:8px 0;
  text-shadow:0 0 30px rgba(0,229,160,.15);
}
.cond-btns{display:flex;gap:10px;justify-content:center;margin-bottom:14px;}
.cond-btn{
  padding:11px 28px;border-radius:12px;
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;border:none;transition:all .15s;
}
.cb-start{background:linear-gradient(135deg,var(--teal),var(--blue));color:#0D1117;box-shadow:0 4px 15px rgba(0,229,160,.2);}
.cb-start:active{transform:scale(.97);}
.cb-reset{background:var(--card3);color:var(--text);border:1px solid var(--border2);}
.cond-content{
  font-size:13px;color:var(--text);white-space:pre-line;line-height:1.8;
  background:var(--card3);border:1px solid var(--border);
  border-radius:12px;padding:14px;
}
.rounds-ctrl{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:12px;}
.rnd-btn{
  width:40px;height:40px;border-radius:50%;
  background:var(--card3);border:1.5px solid var(--border2);
  color:var(--white);font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.rnd-btn:active{transform:scale(.88);background:var(--card2);}
.rnd-val{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--white);}

/* ── BOTTOM BAR */
.bot-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);
  border-top:1px solid var(--border);
  padding:12px 14px;
  padding-bottom:calc(12px + env(safe-area-inset-bottom));
  display:flex;gap:10px;align-items:center;z-index:19;
  box-shadow:0 -4px 20px rgba(0,0,0,.3);
}
.prev-btn{
  width:46px;height:46px;border-radius:12px;
  background:var(--card2);border:1.5px solid var(--border2);
  color:var(--text);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s;
}
.prev-btn:active{background:var(--card3);}
.next-btn{
  flex:1;padding:15px;
  background:linear-gradient(135deg,var(--blue),#3a7bd5);
  color:#fff;border:none;border-radius:14px;
  font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;
  cursor:pointer;transition:all .15s;
  box-shadow:0 4px 20px rgba(79,158,248,.25);
}
.next-btn:active{transform:scale(.97);}
.next-btn.fin{
  background:linear-gradient(135deg,var(--teal),#00b87a);
  color:#0D1117;
  box-shadow:0 4px 20px rgba(0,229,160,.3);
}

/* ── DONE SCREEN */
.done-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:28px;text-align:center;}
.done-screen.show{display:flex;}
.done-icon{font-size:68px;animation:bncin .6s cubic-bezier(.34,1.56,.64,1);}
@keyframes bncin{from{transform:scale(0)}to{transform:scale(1)}}
.done-title{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:1px;color:var(--white);}
.done-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:360px;}
.ds-item{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px 8px;text-align:center;
}
.ds-val{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--white);}
.ds-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.pr-list-done{width:100%;max-width:360px;}
.pr-item-done{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:linear-gradient(135deg,rgba(255,209,102,.08),rgba(255,159,67,.05));
  border:1px solid rgba(255,209,102,.22);
  border-radius:12px;margin-bottom:7px;
}
.pr-nm{font-size:13px;font-weight:600;color:var(--white);flex:1;}
.pr-vl{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--amber);}
.home-btn{
  width:100%;max-width:360px;padding:16px;
  background:linear-gradient(135deg,var(--teal),var(--blue));
  color:#0D1117;border:none;border-radius:16px;
  font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;
  cursor:pointer;box-shadow:0 6px 24px rgba(0,229,160,.2);
}

/* ── LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:999;}
.logo-big{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:4px;color:var(--white);}
.logo-big span{color:var(--teal);}
.dots{display:flex;gap:9px;}
.dots i{width:9px;height:9px;border-radius:50%;background:var(--teal);opacity:.2;animation:dp 1.2s ease-in-out infinite;}
.dots i:nth-child(2){animation-delay:.2s;}.dots i:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}

/* ── TOAST */
.toast{
  position:fixed;top:74px;left:50%;
  transform:translateX(-50%) translateY(-90px);
  background:linear-gradient(135deg,rgba(255,209,102,.95),rgba(255,159,67,.95));
  color:#0D1117;padding:10px 20px;
  border-radius:50px;font-size:13px;font-weight:700;
  box-shadow:0 8px 30px rgba(255,209,102,.3);
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  z-index:9999;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── NOTA */
.nota-card{padding:20px 16px;text-align:center;}
.nota-card .nota-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--white);margin-bottom:8px;}
.nota-card .nota-text{font-size:13px;color:var(--text);white-space:pre-line;line-height:1.7;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:left;}

@media(max-width:380px){
  .kg-inp{font-size:22px;}
  .sets-head,.set-row{grid-template-columns:32px 48px 1fr 70px 36px;gap:4px;padding:7px 8px;}
}
</style>
</head>
<body>
<div id="loading"><div class="logo-big">RS<span>.</span></div><div class="dots"><i></i><i></i><i></i></div></div>

<div class="rest-ov h" id="rest-ov">
  <div class="rest-lbl">⏱ Recupero</div>
  <div class="rest-big" id="rest-big">2:00</div>
  <div class="rest-prog"><div class="rest-pf" id="rest-pf" style="width:100%"></div></div>
  <div class="rest-hint" id="rest-hint"></div>
  <button class="rest-skip" onclick="skipRest()">Continua →</button>
</div>

<div id="sapp" style="display:none">
  <div class="hdr">
    <button class="back" onclick="if(confirm('Uscire? I progressi non saranno salvati.'))history.back()">←</button>
    <div class="hdr-info">
      <div class="hdr-name" id="hdr-name">—</div>
      <div class="hdr-meta" id="hdr-meta">—</div>
    </div>
    <div class="live-pill">● LIVE</div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
  <div class="ex-nav" id="ex-nav"></div>
  <div class="content" id="content"></div>
  <div class="bot-bar">
    <button class="prev-btn" onclick="nav(-1)">←</button>
    <button class="next-btn" id="next-btn" onclick="nav(1)">PROSSIMO →</button>
  </div>
</div>

<div class="done-screen" id="done-screen">
  <div class="done-icon">🏆</div>
  <div class="done-title">Completata!</div>
  <div class="done-stats" id="done-stats"></div>
  <div id="pr-sec" style="display:none;width:100%;max-width:360px;">
    <div style="font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px;">🏆 Nuovi Personal Record</div>
    <div class="pr-list-done" id="pr-list"></div>
  </div>
  <button class="home-btn" id="home-btn">TORNA ALL'APP →</button>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg={apiKey:"AIzaSyAayWDWvUQqtAfIlm7qA8kMKxJu2-_y7k4",authDomain:"rscoaching-a6c61.firebaseapp.com",databaseURL:"https://rscoaching-a6c61-default-rtdb.europe-west1.firebasedatabase.app",projectId:"rscoaching-a6c61",storageBucket:"rscoaching-a6c61.firebasestorage.app",messagingSenderId:"499942544251",appId:"1:499942544251:web:bd246cc6846b0fad89e3de"};
const app=initializeApp(cfg);
const db=getDatabase(app);

const p=new URLSearchParams(window.location.search);
const AID=p.get('id'), PROG=p.get('prog'), WEEK=parseInt(p.get('week')||'0'), SESS=p.get('sess');
const isQuick=p.get('quick')==='1';

let athlete={}, session={};
let exs=[], setData={}, best1rm={}, newPRs=[], campoChecked={};
let cur=0, startTs=Date.now();
let restIv=null, restTotal=0, restLeft=0;
let condIv=null, condSecs=0, condRunning=false, condRounds=0;

async function init(){
  if(!AID){err('ID atleta mancante');return;}
  try{
    const [aS,rmS]=await Promise.all([get(ref(db,`athletes/${AID}`)),get(ref(db,`rm_records/${AID}`))]);
    if(!aS.exists()){err('Atleta non trovato');return;}
    athlete=aS.val();
    Object.values(rmS.val()||{}).forEach(er=>{Object.values(er).forEach(r=>{if(r.exName&&(!best1rm[r.exName]||r.value>best1rm[r.exName]))best1rm[r.exName]=r.value;});});

    if(isQuick){
      const stored=sessionStorage.getItem(`rsc_quick_${AID}`);
      if(!stored){err('Dati sessione non trovati. Torna all\'app e riprova.');return;}
      const {day,exs:qExs}=JSON.parse(stored);
      session={name:day.note||'Sessione rapida',type:day.type};
      buildFromArray(day.type,qExs||[]);
      setup();return;
    }
    if(!PROG||!SESS){err('Parametri sessione mancanti');return;}
    const pS=await get(ref(db,`programs/${PROG}`));
    if(!pS.exists()){err('Programma non trovato');return;}
    const prog=pS.val();
    const weeks=Object.entries(prog.weeks||{}).sort((a,b)=>a[1].order-b[1].order);
    if(WEEK>=weeks.length){err(`Settimana ${WEEK+1} non trovata`);return;}
    const [,wkData]=weeks[WEEK];
    const s=wkData.sessions?.[SESS];
    if(!s){err('Sessione non trovata');return;}
    session=s;
    buildFromSession(s);
    setup();
  }catch(e){console.error(e);err('Errore: '+e.message);}
}
init();

function setup(){
  document.getElementById('loading').style.display='none';
  document.getElementById('sapp').style.display='block';
  document.getElementById('hdr-name').textContent=session.name||'Sessione';
  document.getElementById('hdr-meta').textContent=`${athlete.name}${PROG?' · Sett.'+(WEEK+1):' · Piano rapido'}`;
  document.getElementById('home-btn').onclick=()=>{location.href=`../athlete/?id=${AID}`;};
  renderExNav();render();
}

function buildFromSession(s){
  exs=[];
  if(s.type==='conditioning'){exs=[{_type:'cond',name:s.name||s.condType||'Conditioning',condType:s.condType,duration:s.duration,condContent:s.condContent}];return;}
  const raw=Object.entries(s.exercises||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0)).map(([,e])=>e);
  if(!raw.length){exs=[{_type:'nota',name:s.name||'Seduta',note:s.notes||''}];return;}
  buildFromArray(s.type,raw);
}

function buildFromArray(type,arr){
  if(!arr||!arr.length){exs=[{_type:'nota',name:'Seduta',note:''}];return;}
  if(type==='conditioning'){exs=[{_type:'cond',...arr[0]}];return;}
  if(type==='campo'){exs=arr.map(e=>({...e,_type:'campo'}));initSets();return;}
  const cgroups={};
  arr.forEach(e=>{if(e.complexGroup){if(!cgroups[e.complexGroup])cgroups[e.complexGroup]=[];cgroups[e.complexGroup].push(e);}});
  const seen=new Set();exs=[];
  arr.forEach(e=>{
    if(!e.complexGroup){exs.push({...e,_type:'pesi'});}
    else if(!seen.has(e.complexGroup)){seen.add(e.complexGroup);const items=cgroups[e.complexGroup];exs.push({_type:'complex',items,rest:items.slice(-1)[0]?.rest});}
  });
  initSets();
}

function initSets(){
  exs.forEach((ex,i)=>{
    if(ex._type==='pesi'){setData[i]={};for(let s=0;s<(parseInt(ex.sets)||3);s++)setData[i][s]={kg:'',rpe:null,done:false};}
    else if(ex._type==='complex'){setData[i]={};ex.items.forEach((item,ci)=>{setData[i][ci]={};for(let s=0;s<(parseInt(item.sets)||4);s++)setData[i][ci][s]={kg:'',rpe:null,done:false};});}
  });
}

function renderExNav(){
  const el=document.getElementById('ex-nav');
  el.innerHTML=exs.map((ex,i)=>{
    const allDone=checkAllDone(i);
    return `<div class="ex-dot${i===cur?' active':''}${allDone?' done':''}" onclick="jumpTo(${i})">${allDone?'✓':i+1}</div>`;
  }).join('');
  const dot=el.children[cur];
  if(dot)dot.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function checkAllDone(i){
  const ex=exs[i];if(!ex)return false;
  if(ex._type==='campo')return !!(campoChecked[i]);
  if(ex._type==='cond'||ex._type==='nota')return false;
  const sd=setData[i]||{};
  if(ex._type==='complex')return ex.items.every((_,ci)=>Object.values(sd[ci]||{}).every(s=>s.done));
  return Object.values(sd).length>0&&Object.values(sd).every(s=>s.done);
}
window.jumpTo=i=>{cur=i;render();};

function render(){
  const ex=exs[cur];
  const isLast=cur===exs.length-1;
  const nb=document.getElementById('next-btn');
  nb.textContent=isLast?'COMPLETA ✓':'PROSSIMO →';
  nb.className='next-btn'+(isLast?' fin':'');
  document.getElementById('pfill').style.width=`${(cur/Math.max(exs.length,1))*100}%`;
  renderExNav();
  if(!ex){document.getElementById('content').innerHTML='<div style="padding:24px;text-align:center;color:var(--muted);">Nessun esercizio.</div>';return;}
  let html='';
  if(ex._type==='nota')html=renderNota(ex);
  else if(ex._type==='cond')html=renderCond(ex);
  else if(ex._type==='campo')html=renderCampo(ex,cur);
  else if(ex._type==='complex')html=renderComplex(ex,cur);
  else html=renderPesi(ex,cur);
  document.getElementById('content').innerHTML=html;
  if(ex._type==='cond')setupCond();
  window.scrollTo(0,0);
}

function kgSugFor(ex){
  const rm=best1rm[ex.name]||0;
  const pct=parseFloat(ex.pct)||0;
  const kgD=parseFloat(ex.kg)||0;
  return kgD>0?kgD:(rm>0&&pct>0?Math.round(rm*pct/100/2.5)*2.5:0);
}

function renderPesi(ex,ei){
  const sets=parseInt(ex.sets)||3;
  const rm=best1rm[ex.name]||0;
  const pct=parseFloat(ex.pct)||0;
  const kgSug=kgSugFor(ex);
  const sd=setData[ei]||{};
  const doneN=Object.values(sd).filter(s=>s.done).length;
  let e1rm=0;
  for(let s=0;s<sets;s++){if(sd[s]?.done&&sd[s]?.kg){const e=Math.round(parseFloat(sd[s].kg)*(1+parseFloat(ex.reps||1)/30));if(e>e1rm)e1rm=e;}}
  const isPR=e1rm>0&&e1rm>(best1rm[ex.name]||0);

  return `<div class="ex-card">
    <div class="ex-card-head">
      <span class="ex-type-pill tp-pesi">🏋️ Pesi</span>
      <div class="ex-card-name">${ex.name}</div>
      <div class="ex-card-params">${sets} serie · ${ex.reps||'—'} reps${pct>0?` · @${pct}% 1RM`:''}${ex.rpe?` · RPE target ${ex.rpe}`:''}</div>
      ${ex.cue?`<div class="cue-chip">💡 ${ex.cue}</div>`:''}
    </div>
    ${kgSug>0?`<div class="sug-kg-bar">
      <div><div class="sug-kg-lbl">Carico suggerito</div><div class="sug-kg-pct">${pct>0?`${pct}% di ${rm}kg`:'Diretto'}</div></div>
      <div><span class="sug-kg-val">${kgSug}</span><span class="sug-kg-unit"> kg</span></div>
    </div>`:''}
    ${pct>0&&rm===0?`<div style="padding:10px 16px;background:rgba(255,209,102,.06);border-bottom:1px solid var(--border);font-size:11px;color:var(--amber);">⚠ Imposta 1RM nel tab 💪 per vedere il carico</div>`:''}
    <div class="sets-wrap">
      <div class="sets-head">
        <span>Set</span><span style="text-align:center;">Reps</span>
        <span>Kg usati</span><span style="text-align:center;">RPE</span><span></span>
      </div>
      ${Array.from({length:sets},(_,s)=>{
        const d=sd[s]||{kg:'',rpe:null,done:false};
        const isCur=s===doneN&&!d.done;
        const rpeColor=d.rpe?d.rpe<=7?'var(--green)':d.rpe===8?'var(--amber)':'var(--red)':'var(--muted)';
        return `<div class="set-row${d.done?' done':isCur?' cur':''}">
          <span class="sn${d.done?' d':''}">${s+1}</span>
          <input class="reps-inp" type="text" inputmode="numeric"
            value="${ex.reps||''}" placeholder="—" id="reps-${ei}-${s}"
            oninput="setReps(${ei},this.value)"
            style="width:100%;background:#2A3550;border:1.5px solid #3D5080;border-radius:8px;font-size:14px;font-weight:700;color:#F0F4FF;text-align:center;padding:8px 2px;font-family:'Outfit',sans-serif;">
          <input class="kg-inp${d.done?' d':''}" type="number" inputmode="decimal"
            value="${d.kg}" placeholder="${kgSug||'—'}" id="kg-${ei}-${s}"
            oninput="setKg(${ei},${s},this.value)">
          <div class="rpe-col">
            <div class="rpe-row">${[6,7,8].map(r=>`<div class="rpe-d${d.rpe===r?' r'+r:''}" onclick="setRpe(${ei},${s},${r})" title="RPE ${r}"></div>`).join('')}</div>
            <div class="rpe-row">${[9,10].map(r=>`<div class="rpe-d${d.rpe===r?' r'+r:''}" onclick="setRpe(${ei},${s},${r})" title="RPE ${r}"></div>`).join('')}</div>
            <div class="rpe-val${d.rpe?' v'+d.rpe:''}">${d.rpe?'RPE '+d.rpe:'—'}</div>
          </div>
          <button class="done-btn${d.done?' d':''}" onclick="toggleDone(${ei},${s})">${d.done?'✓':''}</button>
        </div>`;
      }).join('')}
    </div>
    ${e1rm>0?`<div class="e1rm-wrap">
      <div class="e1rm-chip"><div class="e1rm-lbl">e1RM stimato</div><div class="e1rm-val">${e1rm}kg</div></div>
      ${isPR?'<div class="pr-chip">🏆 NEW PR!</div>':''}
    </div>`:''}
    ${ex.rest?`<div style="padding:8px 16px 12px;font-size:11px;color:var(--muted);">⏱ Recupero programmato: <strong style="color:var(--text);">${ex.rest}</strong></div>`:''}
  </div>`;
}

function renderComplex(ex,ei){
  const sets=parseInt(ex.items[0]?.sets)||4;
  let html=`<div class="ex-card"><div class="ex-card-head">
    <span class="ex-type-pill tp-complex">🔁 Complex Method</span>
    <div class="ex-card-name">Complex · ${sets} round</div>
    <div class="ex-card-params">Rec ${ex.rest||"3'"} dopo ogni round completato</div>
  </div>`;
  ex.items.forEach((item,ci)=>{
    const kgSug=kgSugFor(item);
    const csd=setData[ei]?.[ci]||{};
    html+=`<div class="cx-sep">${item.complexLabel||`A${ci+1}`} · ${item.name}</div>
    ${item.cue?`<div style="padding:8px 16px;"><div class="cue-chip">💡 ${item.cue}</div></div>`:''}
    ${kgSug>0?`<div class="sug-kg-bar"><div><div class="sug-kg-lbl">${item.name}</div><div class="sug-kg-pct">Sugg.</div></div><div><span class="sug-kg-val">${kgSug}</span><span class="sug-kg-unit"> kg</span></div></div>`:''}
    <div class="sets-wrap" style="padding-top:8px;">
      <div class="sets-head"><span>Rd</span><span style="text-align:center;">Reps</span><span>Kg</span><span style="text-align:center;">RPE</span><span></span></div>
      ${Array.from({length:sets},(_,s)=>{
        const d=csd[s]||{kg:'',rpe:null,done:false};
        return `<div class="set-row${d.done?' done':''}">
          <span class="sn${d.done?' d':''}">${s+1}</span>
          <span class="reps-lbl">${item.reps||'—'}</span>
          <input class="kg-inp${d.done?' d':''}" type="number" inputmode="decimal" value="${d.kg}" placeholder="${kgSug||'—'}" oninput="setCxKg(${ei},${ci},${s},this.value)">
          <div class="rpe-col">
            <div class="rpe-row">${[6,7,8].map(r=>`<div class="rpe-d${d.rpe===r?' r'+r:''}" onclick="setCxRpe(${ei},${ci},${s},${r})"></div>`).join('')}</div>
            <div class="rpe-row">${[9,10].map(r=>`<div class="rpe-d${d.rpe===r?' r'+r:''}" onclick="setCxRpe(${ei},${ci},${s},${r})"></div>`).join('')}</div>
            <div class="rpe-val${d.rpe?' v'+d.rpe:''}">${d.rpe?'RPE '+d.rpe:'—'}</div>
          </div>
          <button class="done-btn${d.done?' d':''}" onclick="toggleCxDone(${ei},${ci},${s})">${d.done?'✓':''}</button>
        </div>`;
      }).join('')}
    </div>`;
  });
  return html+'</div>';
}

function renderCampo(ex,ei){
  const ck=campoChecked[ei]||false;
  const intCls={BASSA:'ib-b',MEDIA:'ib-m',ALTA:'ib-a',MAX:'ib-x'};
  const intIco={BASSA:'🟢',MEDIA:'🟡',ALTA:'🔴',MAX:'🔥'};
  return `<div class="ex-card">
    <div class="ex-card-head">
      <span class="ex-type-pill tp-campo">⚽ Campo</span>
      <div class="ex-card-name">${ex.name}</div>
      <div class="ex-card-params">${[ex.sets&&`${ex.sets}×`,ex.reps,ex.rest&&`rec ${ex.rest}`].filter(Boolean).join(' · ')}</div>
      ${ex.cue?`<div class="cue-chip">💡 ${ex.cue}</div>`:''}
    </div>
    <div class="campo-item${ck?' ck':''}">
      ${ex.intensity?`<div class="int-box ${intCls[ex.intensity]||'ib-m'}">
        <span style="font-size:16px;">${intIco[ex.intensity]||'▶'}</span>
        <span>${ex.intensity}</span>
      </div>`:''}
      <div style="flex:1;">
        <div class="campo-name">${ex.name}</div>
        <div class="campo-meta">${[ex.sets&&`${ex.sets} serie`,ex.reps,ex.rest&&`rec ${ex.rest}`].filter(Boolean).join(' · ')||'Esegui'}</div>
      </div>
      <button class="campo-ck${ck?' ck':''}" onclick="toggleCampo(${ei})">${ck?'✓':''}</button>
    </div>
  </div>`;
}

function renderCond(ex){
  return `<div class="ex-card">
    <div class="ex-card-head">
      <span class="cond-badge">${ex.condType||'Conditioning'}</span>
      ${ex.duration?`<div style="font-size:13px;color:var(--muted);">${ex.duration}</div>`:''}
    </div>
    <div class="cond-wrap">
      <div class="cond-timer" id="cond-t">00:00</div>
      <div class="cond-btns">
        <button class="cond-btn cb-start" id="cond-toggle" onclick="toggleCond()">▶ Start</button>
        <button class="cond-btn cb-reset" onclick="resetCond()">Reset</button>
      </div>
      ${ex.condContent?`<div class="cond-content">${ex.condContent}</div>`:''}
      ${ex.condType==='AMRAP'?`<div style="margin-top:12px;text-align:center;">
        <div style="font-size:11px;color:var(--muted);margin-bottom:8px;">Round completati</div>
        <div class="rounds-ctrl">
          <button class="rnd-btn" onclick="adjR(-1)">−</button>
          <div class="rnd-val" id="rnd-v">0</div>
          <button class="rnd-btn" onclick="adjR(1)">+</button>
        </div></div>`:''}
    </div>
  </div>`;
}

function renderNota(ex){
  return `<div class="ex-card"><div class="nota-card">
    <div class="nota-title">${ex.name}</div>
    ${ex.note?`<div class="nota-text">${ex.note}</div>`:''}
    <div style="margin-top:14px;font-size:12px;color:var(--muted);">Completa la seduta e premi il pulsante verde in basso.</div>
  </div></div>`;
}

// ── ACTIONS
window.setKg=(ei,s,v)=>{if(!setData[ei])setData[ei]={};if(!setData[ei][s])setData[ei][s]={};setData[ei][s].kg=v;};
window.setReps=(ei,v)=>{// Update reps for all sets of this exercise
  if(exs[ei])exs[ei].reps=v;
  // Update all visible reps inputs
  document.querySelectorAll(`[id^="reps-${ei}-"]`).forEach(inp=>{inp.value=v;});
};
window.setRpe=(ei,s,r)=>{if(!setData[ei][s])setData[ei][s]={};setData[ei][s].rpe=r;render();};
window.toggleDone=function(ei,s){
  const kg=document.getElementById(`kg-${ei}-${s}`)?.value||'';
  if(!setData[ei])setData[ei]={};if(!setData[ei][s])setData[ei][s]={};
  if(kg)setData[ei][s].kg=kg;
  setData[ei][s].done=!setData[ei][s].done;
  if(setData[ei][s].done){
    checkPR(exs[ei],ei,s);
    const ex=exs[ei];
    const allDone=Object.values(setData[ei]).every(sd=>sd.done);
    const restSecs=parseRest(ex.rest);
    if(restSecs>0&&!allDone){
      const tot=parseInt(ex.sets)||3;
      const nxt=s<tot-1?`Serie ${s+2} di ${tot} — ${ex.name}`:ei<exs.length-1?`Prossimo: ${exs[ei+1]?.name||exs[ei+1]?.items?.[0]?.name||'—'}`:'';
      startRest(restSecs,nxt);
    }
  }
  render();
};
window.setCxKg=(ei,ci,s,v)=>{if(!setData[ei][ci])setData[ei][ci]={};if(!setData[ei][ci][s])setData[ei][ci][s]={};setData[ei][ci][s].kg=v;};
window.setCxRpe=(ei,ci,s,r)=>{if(!setData[ei][ci][s])setData[ei][ci][s]={};setData[ei][ci][s].rpe=r;render();};
window.toggleCxDone=function(ei,ci,s){
  if(!setData[ei][ci][s])setData[ei][ci][s]={};
  setData[ei][ci][s].done=!setData[ei][ci][s].done;
  if(setData[ei][ci][s].done){
    const ex=exs[ei];
    if(ci===ex.items.length-1){const r=parseRest(ex.rest||"3'");if(r>0)startRest(r,`Round ${s+2} del complex`);}
  }
  render();
};
window.toggleCampo=ei=>{campoChecked[ei]=!campoChecked[ei];render();};

function checkPR(ex,ei,s){
  const d=setData[ei][s];
  if(!d?.kg||!d?.done)return;
  const kg=parseFloat(d.kg);const reps=parseFloat(ex.reps||1);
  const e1rm=Math.round(kg*(1+reps/30));
  if(e1rm>(best1rm[ex.name]||0)){
    best1rm[ex.name]=e1rm;
    if(!newPRs.find(pr=>pr.name===ex.name))newPRs.push({name:ex.name,value:e1rm});
    toast(`🏆 PR! ${ex.name}: ${e1rm}kg e1RM`);
  }
}

function parseRest(str){
  if(!str)return 0;
  const m=str.match(/(\d+)[''m]/);if(m)return parseInt(m[1])*60;
  const s=str.match(/(\d+)[""s]/);if(s)return parseInt(s[1]);
  const n=str.match(/^(\d+)$/);if(n)return parseInt(n[1])>10?parseInt(n[1]):parseInt(n[1])*60;
  return 0;
}

function startRest(secs,hint){
  restTotal=secs;restLeft=secs;
  document.getElementById('rest-hint').innerHTML=hint?`Prossimo: <strong>${hint}</strong>`:'';
  document.getElementById('rest-ov').classList.remove('h');
  updateRest();
  clearInterval(restIv);
  restIv=setInterval(()=>{restLeft--;updateRest();if(restLeft<=0){clearInterval(restIv);skipRest();}},1000);
}
function updateRest(){
  const m=String(Math.floor(restLeft/60)).padStart(2,'0');
  const s=String(restLeft%60).padStart(2,'0');
  const el=document.getElementById('rest-big');
  const pf=document.getElementById('rest-pf');
  if(el){el.textContent=`${m}:${s}`;el.className='rest-big'+(restLeft<=10?' warn':'');}
  if(pf)pf.style.width=`${Math.max(0,restLeft/restTotal*100)}%`;
}
window.skipRest=()=>{clearInterval(restIv);document.getElementById('rest-ov').classList.add('h');};

function setupCond(){condSecs=0;condRunning=false;}
window.toggleCond=()=>{
  condRunning=!condRunning;
  const btn=document.getElementById('cond-toggle');
  if(btn)btn.textContent=condRunning?'⏸ Pausa':'▶ Start';
  if(condRunning){condIv=setInterval(()=>{condSecs++;const el=document.getElementById('cond-t');if(el)el.textContent=`${String(Math.floor(condSecs/60)).padStart(2,'0')}:${String(condSecs%60).padStart(2,'0')}`;},1000);}
  else clearInterval(condIv);
};
window.resetCond=()=>{clearInterval(condIv);condRunning=false;condSecs=0;const el=document.getElementById('cond-t');if(el)el.textContent='00:00';const b=document.getElementById('cond-toggle');if(b)b.textContent='▶ Start';};
window.adjR=d=>{condRounds=Math.max(0,condRounds+d);const el=document.getElementById('rnd-v');if(el)el.textContent=condRounds;};

window.nav=async dir=>{
  if(dir===1){if(cur<exs.length-1){cur++;render();}else await finish();}
  else{if(cur>0){cur--;render();}}
};

async function finish(){
  clearInterval(condIv);
  const dur=Math.round((Date.now()-startTs)/60000);
  let totalSets=0;
  let rpeVals=[];
  Object.entries(setData).forEach(([ei,sd])=>{
    const ex=exs[parseInt(ei)];if(!ex)return;
    if(ex._type==='complex'){Object.values(sd).forEach(csd=>Object.values(csd||{}).forEach(s=>{if(s&&s.done){totalSets++;if(s.rpe)rpeVals.push(s.rpe);}}));}
    else{Object.values(sd).forEach(s=>{if(s.done){totalSets++;if(s.rpe)rpeVals.push(s.rpe);}});}
  });
  totalSets+=Object.values(campoChecked).filter(Boolean).length;
  const avgRpe=rpeVals.length?Math.round(rpeVals.reduce((a,b)=>a+b,0)/rpeVals.length*10)/10:null;
  const now=new Date();

  await push(ref(db,`session_logs/${AID}`),{
    ts:Date.now(),progId:PROG,weekIdx:WEEK,sessId:SESS,
    sessName:session.name||'Sessione',duration:dur,totalSets,newPRs,
    condSecs,condRounds,isQuick,avgRpe,
    date:now.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'})
  });

  if(newPRs.length){
    const exSnap=await get(ref(db,`rm_exercises/${AID}`));
    const exObj=exSnap.val()||{};
    for(const pr of newPRs){
      const exKey=Object.entries(exObj).find(([,e])=>e.name===pr.name)?.[0];
      if(exKey)await push(ref(db,`rm_records/${AID}/${exKey}`),{ts:Date.now(),date:now.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'}),value:pr.value,type:'sessione',exName:pr.name});
    }
  }

  document.getElementById('sapp').style.display='none';
  const ds=document.getElementById('done-screen');ds.classList.add('show');
  const rpeColor=avgRpe?avgRpe>=9?'var(--red)':avgRpe>=7?'var(--amber)':'var(--green)':'var(--muted)';
  document.getElementById('done-stats').innerHTML=`
    <div class="ds-item"><div class="ds-val">${dur}'</div><div class="ds-lbl">Durata</div></div>
    <div class="ds-item"><div class="ds-val">${totalSets}</div><div class="ds-lbl">Serie</div></div>
    <div class="ds-item"><div class="ds-val" style="color:${rpeColor};">${avgRpe||'—'}</div><div class="ds-lbl">RPE medio</div></div>`;
  if(newPRs.length){
    document.getElementById('pr-sec').style.display='block';
    document.getElementById('pr-list').innerHTML=newPRs.map(pr=>`<div class="pr-item-done"><span class="pr-nm">🏆 ${pr.name}</span><span class="pr-vl">${pr.value}kg</span></div>`).join('');
  }
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
function err(msg){document.getElementById('loading').style.display='none';document.body.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:14px;font-family:'Outfit',sans-serif;color:var(--white);text-align:center;padding:24px;background:#0D1117;"><div style="font-size:52px">⚠️</div><div style="font-size:16px;color:#A8B8D0;">${msg}</div><a href="javascript:history.back()" style="color:#00E5A0;font-weight:600;margin-top:6px;">← Indietro</a></div>`;}
</script>
</body>
