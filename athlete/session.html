<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RS Coaching — Sessione Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0E17;--card:#131928;--card2:#1A2235;--border:#1E2A40;--blue:#3B82F6;--teal:#06D6A0;--amber:#FBBF24;--red:#F87171;--green:#34D399;--purple:#A78BFA;--orange:#FB923C;--white:#EEF2FF;--muted:#4A5568;--text:#B8C4D8;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);min-height:100%;}
body{font-family:'Outfit',sans-serif;color:var(--text);padding-bottom:90px;}

.sess-header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20;}
.back-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:2px 6px;border-radius:6px;line-height:1;}
.sess-title{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1px;color:var(--white);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sess-meta{font-size:11px;color:var(--muted);}
.live-badge{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.28);color:var(--red);font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;animation:pblink 2s ease-in-out infinite;white-space:nowrap;}
@keyframes pblink{0%,100%{opacity:1}50%{opacity:.55}}

.progress-bar{height:3px;background:var(--border);}
.progress-fill{height:100%;background:var(--teal);transition:width .4s;}

.content{padding:16px;}

/* EX HEADER */
.ex-h{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.ex-num{width:30px;height:30px;border-radius:50%;background:var(--card2);border:1px solid var(--border);font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.ex-num.active{background:var(--blue);border-color:var(--blue);color:var(--white);}
.ex-num.done{background:var(--teal);border-color:var(--teal);color:#070B12;}
.ex-title{font-weight:700;font-size:16px;color:var(--white);}
.ex-params{font-size:12px;color:var(--muted);margin-top:2px;}

/* CUE */
.cue-box{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.18);border-radius:10px;padding:9px 13px;font-size:12px;color:var(--amber);margin-bottom:12px;display:flex;gap:7px;}

/* SUGGESTED */
.sug-bar{background:rgba(167,139,250,.07);border:1px solid rgba(167,139,250,.18);border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sug-bar-lbl{font-size:11px;color:var(--muted);}
.sug-bar-kg{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--purple);letter-spacing:.5px;}

/* SETS TABLE */
.sets-box{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px;}
.sets-head{display:grid;grid-template-columns:36px 1fr 90px 70px 38px;gap:6px;padding:9px 13px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02);}
.sets-head span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.set-row{display:grid;grid-template-columns:36px 1fr 90px 70px 38px;gap:6px;padding:10px 13px;border-bottom:1px solid var(--border);align-items:center;transition:background .15s;}
.set-row:last-child{border-bottom:none;}
.set-row.done-row{background:rgba(6,214,160,.04);}
.set-row.cur-row{background:rgba(59,130,246,.05);}
.sn{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--muted);}
.sn.dk{color:var(--teal);}
.reps-cell{font-size:13px;color:var(--text);}
.kg-inp{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:9px;font-family:'Bebas Neue',sans-serif;font-size:21px;color:var(--white);text-align:center;padding:7px 4px;-webkit-appearance:none;transition:border-color .2s;}
.kg-inp:focus{outline:none;border-color:var(--blue);}
.kg-inp.dk{border-color:rgba(6,214,160,.3);color:var(--teal);}
.rpe-wrap{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;}
.rpe-d{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);cursor:pointer;transition:all .15s;}
.rpe-d:hover{border-color:var(--amber);}
.rpe-d.r6,.rpe-d.r7{background:var(--green);border-color:var(--green);}
.rpe-d.r8{background:var(--amber);border-color:var(--amber);}
.rpe-d.r9,.rpe-d.r10{background:var(--red);border-color:var(--red);}
.done-btn{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0;}
.done-btn.dk{background:var(--teal);border-color:var(--teal);}
.done-btn:active{transform:scale(.88);}

/* E1RM */
.e1rm-row{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;}
.e1rm-chip{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);border-radius:8px;padding:5px 11px;display:flex;align-items:center;gap:7px;}
.e1rm-v{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--purple);}
.e1rm-l{font-size:11px;color:var(--muted);}
.pr-chip{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.28);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--amber);animation:prbounce .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes prbounce{from{transform:scale(0)}to{transform:scale(1)}}

/* REST OVERLAY */
.rest-ov{position:fixed;inset:0;background:rgba(10,14,23,.96);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.rest-ov.hidden{display:none;}
.rest-lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;}
.rest-num{font-family:'Bebas Neue',sans-serif;font-size:88px;color:var(--white);letter-spacing:-2px;line-height:1;transition:color .3s;}
.rest-num.warn{color:var(--amber);}
.rest-prog{width:180px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.rest-prog-f{height:100%;background:var(--teal);transition:width 1s linear;}
.rest-hint{font-size:13px;color:var(--muted);text-align:center;max-width:240px;}
.rest-hint strong{color:var(--white);}
.rest-skip{padding:12px 32px;background:var(--teal);color:#070B12;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;}

/* COMPLEX */
.complex-hdr{background:rgba(251,113,74,.07);border:1px solid rgba(251,113,74,.2);border-radius:10px;padding:9px 13px;font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.complex-item{margin-bottom:14px;}
.cx-lbl{font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;padding:3px 8px;background:rgba(251,113,74,.08);border-radius:5px;display:inline-block;}

/* CAMPO */
.campo-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all .2s;}
.campo-item.ck{opacity:.5;background:rgba(6,214,160,.02);}
.int-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;text-transform:uppercase;flex-shrink:0;}
.ib-bassa{background:rgba(52,211,153,.1);color:var(--green);}
.ib-media{background:rgba(251,191,36,.1);color:var(--amber);}
.ib-alta{background:rgba(248,113,113,.1);color:var(--red);}
.ib-max{background:rgba(248,113,113,.2);color:var(--red);}
.campo-name{flex:1;font-weight:600;font-size:14px;color:var(--white);}
.campo-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.campo-check{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;flex-shrink:0;}
.campo-check.ck{background:var(--teal);border-color:var(--teal);}

/* CONDITIONING */
.cond-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.cond-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;background:rgba(251,113,74,.12);color:var(--orange);text-transform:uppercase;letter-spacing:.8px;display:inline-block;margin-bottom:10px;}
.cond-timer-big{font-family:'Bebas Neue',sans-serif;font-size:72px;color:var(--white);text-align:center;letter-spacing:-2px;margin:8px 0;}
.cond-content{font-size:13px;color:var(--text);white-space:pre-line;line-height:1.7;background:var(--card2);border-radius:10px;padding:12px;margin:10px 0;}
.cond-btns{display:flex;gap:8px;justify-content:center;margin-bottom:8px;}
.cond-btn{padding:10px 22px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .15s;}
.cond-start{background:var(--teal);color:#070B12;}
.cond-reset{background:var(--card2);color:var(--text);border:1px solid var(--border);}
.rounds-ctrl{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:8px;}
.round-btn{width:36px;height:36px;border-radius:50%;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.rounds-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--white);}

/* BOTTOM */
.bot-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px;align-items:center;z-index:19;}
.prev-btn{width:44px;height:44px;border-radius:12px;background:var(--card2);border:1px solid var(--border);color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.prev-btn:hover{border-color:var(--border2);color:var(--text);}
.next-btn{flex:1;padding:14px;background:var(--blue);color:var(--white);border:none;border-radius:13px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;cursor:pointer;transition:all .15s;}
.next-btn:active{transform:scale(.97);}
.next-btn.fin{background:var(--teal);color:#070B12;}

/* COMPLETE */
.complete-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:28px;text-align:center;}
.complete-screen.show{display:flex;}
.c-icon{font-size:60px;animation:bncin .6s cubic-bezier(.34,1.56,.64,1);}
@keyframes bncin{from{transform:scale(0)}to{transform:scale(1)}}
.c-title{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:1px;color:var(--white);}
.c-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:360px;}
.c-stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;}
.c-stat-v{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--white);}
.c-stat-l{font-size:11px;color:var(--muted);margin-top:2px;}
.pr-section{width:100%;max-width:360px;}
.pr-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.18);border-radius:10px;margin-bottom:6px;}
.pr-item-name{font-size:13px;font-weight:600;color:var(--white);flex:1;}
.pr-item-val{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--amber);}
.home-btn{width:100%;max-width:360px;padding:15px;background:var(--teal);color:#070B12;border:none;border-radius:14px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;cursor:pointer;margin-top:4px;}

#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:999;}
.logo-big{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:3px;color:var(--white);}
.logo-big span{color:var(--teal);}
.dots{display:flex;gap:8px;}
.dots i{width:8px;height:8px;border-radius:50%;background:var(--teal);opacity:.25;animation:dp 1.2s ease-in-out infinite;}
.dots i:nth-child(2){animation-delay:.2s;}.dots i:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,100%{opacity:.25;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
.toast-live{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--amber);color:#070B12;padding:9px 18px;border-radius:50px;font-size:13px;font-weight:700;box-shadow:0 6px 24px rgba(0,0,0,.4);transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:9999;white-space:nowrap;}
.toast-live.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="loading"><div class="logo-big">RS<span>.</span></div><div class="dots"><i></i><i></i><i></i></div></div>

<div class="rest-ov hidden" id="rest-ov">
  <div class="rest-lbl">Recupero</div>
  <div class="rest-num" id="rest-num">2:00</div>
  <div class="rest-prog"><div class="rest-prog-f" id="rest-pf" style="width:100%"></div></div>
  <div class="rest-hint" id="rest-hint"></div>
  <button class="rest-skip" onclick="skipRest()">Continua →</button>
</div>

<div id="sapp" style="display:none">
  <div class="sess-header">
    <button class="back-btn" onclick="if(confirm('Uscire? I dati non saranno salvati.'))history.back()">←</button>
    <div style="flex:1;min-width:0">
      <div class="sess-title" id="sh-name">—</div>
      <div class="sess-meta" id="sh-meta">—</div>
    </div>
    <div class="live-badge">LIVE</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="pfill" style="width:0%"></div></div>
  <div class="content" id="content"></div>
  <div class="bot-bar">
    <button class="prev-btn" id="prev-btn" onclick="nav(-1)">←</button>
    <button class="next-btn" id="next-btn" onclick="nav(1)">PROSSIMO →</button>
  </div>
</div>

<div class="complete-screen" id="done-screen">
  <div class="c-icon">🏆</div>
  <div class="c-title">Sessione completata!</div>
  <div class="c-stats" id="c-stats"></div>
  <div class="pr-section" id="pr-sec" style="display:none">
    <div style="font-size:12px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px;">🏆 Nuovi PR</div>
    <div id="pr-list"></div>
  </div>
  <button class="home-btn" id="home-btn">TORNA ALL'APP →</button>
</div>

<div class="toast-live" id="tlive"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg={apiKey:"AIzaSyAayWDWvUQqtAfIlm7qA8kMKxJu2-_y7k4",authDomain:"rscoaching-a6c61.firebaseapp.com",databaseURL:"https://rscoaching-a6c61-default-rtdb.europe-west1.firebasedatabase.app",projectId:"rscoaching-a6c61",storageBucket:"rscoaching-a6c61.firebasestorage.app",messagingSenderId:"499942544251",appId:"1:499942544251:web:bd246cc6846b0fad89e3de"};
const app=initializeApp(cfg);
const db=getDatabase(app);

const p=new URLSearchParams(window.location.search);
const AID=p.get('id'), PROG=p.get('prog'), WEEK=parseInt(p.get('week')||'0'), SESS=p.get('sess');

let athlete={}, session={}, exs=[], setData={}, best1rm={}, newPRs=[], campoChecked={};
let cur=0, startTs=Date.now();
let restIv=null, restTotal=0, restLeft=0;
let condIv=null, condSecs=0, condRunning=false, condRounds=0;

const SINT={pesi:'🏋️',campo:'⚽',sprint:'⚡',conditioning:'🔥',recupero:'🔄'};
const SCOL={pesi:'rgba(167,139,250,.12)',campo:'rgba(6,214,160,.1)',sprint:'rgba(248,113,113,.1)',conditioning:'rgba(251,113,74,.1)',recupero:'rgba(52,211,153,.08)'};

async function init(){
  if(!AID){err('Parametri mancanti');return;}
  const isQuick=p.get('quick')==='1';

  // QUICK SESSION (piano rapido)
  if(isQuick){
    try{
      const stored=sessionStorage.getItem(`rsc_quick_${AID}`);
      if(!stored){err('Sessione non trovata');return;}
      const {day,exs,best1rm:savedRm}=JSON.parse(stored);
      const aS=await get(ref(db,`athletes/${AID}`));
      if(!aS.exists()){err('Atleta non trovato');return;}
      athlete=aS.val();
      // Build best1rm from saved + firebase
      const rmS=await get(ref(db,`rm_records/${AID}`));
      Object.values(rmS.val()||{}).forEach(er=>{Object.values(er).forEach(r=>{if(r.exName&&(!best1rm[r.exName]||r.value>best1rm[r.exName]))best1rm[r.exName]=r.value;});});
      // Merge saved
      Object.entries(savedRm||{}).forEach(([k,v])=>{if(!best1rm[k]||v>best1rm[k])best1rm[k]=v;});
      // Build session from day data
      session={name:day.note||'Sessione rapida',type:day.type};
      buildQuickSession(day,exs);
      document.getElementById('loading').style.display='none';
      document.getElementById('sapp').style.display='block';
      document.getElementById('sh-name').textContent=session.name;
      document.getElementById('sh-meta').textContent=`${athlete.name} · Piano rapido`;
      document.getElementById('home-btn').onclick=()=>{location.href=`/athlete/?id=${AID}`;};
      render();
    }catch(e){console.error(e);err('Errore: '+e.message);}
    return;
  }

  if(!PROG||!SESS){err('Parametri mancanti');return;}
  try{
    const [aS,pS,rmS]=await Promise.all([
      get(ref(db,`athletes/${AID}`)),
      get(ref(db,`programs/${PROG}`)),
      get(ref(db,`rm_records/${AID}`))
    ]);
    if(!aS.exists()){err('Atleta non trovato');return;}
    if(!pS.exists()){err('Programma non trovato');return;}
    athlete=aS.val();
    const prog=pS.val();

    // Build best 1rm
    Object.values(rmS.val()||{}).forEach(er=>{
      Object.values(er).forEach(r=>{if(r.exName&&(!best1rm[r.exName]||r.value>best1rm[r.exName]))best1rm[r.exName]=r.value;});
    });

    // Get week + session
    const weeks=Object.entries(prog.weeks||{}).sort((a,b)=>a[1].order-b[1].order);
    const [,wk]=weeks[WEEK]||[];
    if(!wk){err('Settimana non trovata');return;}
    const s=wk.sessions?.[SESS];
    if(!s){err('Sessione non trovata');return;}
    session=s;

    // Build exercises list
    buildExercises(s);

    // Setup UI
    document.getElementById('loading').style.display='none';
    document.getElementById('sapp').style.display='block';
    document.getElementById('sh-name').textContent=s.name||'Sessione';
    document.getElementById('sh-meta').textContent=`${athlete.name} · Sett. ${WEEK+1}`;
    document.getElementById('home-btn').onclick=()=>{location.href=`/athlete/?id=${AID}`;};
    render();
  }catch(e){
    console.error(e);
    err('Errore caricamento: '+e.message);
  }
}
init();

function buildQuickSession(day,exs){
  session.type=day.type||'pesi';
  if(day.type==='conditioning'){
    exs=[{_type:'conditioning',name:day.type||'Conditioning',condType:day.detail,condContent:day.detail}];
  } else if(!exs||!exs.length){
    // No exercises — just show note
    exs=[{_type:'nota',name:day.note||'Seduta',note:day.detail||''}];
  }
  // Build from array
  const fake={type:day.type,exercises:{}};
  exs.forEach((e,i)=>{fake.exercises[i]={...e,order:i};});
  buildExercises(fake);
}

function buildExercises(s){
  exs=[];
  if(s.type==='conditioning'){
    exs=[{_type:'conditioning',name:s.condType||'Conditioning',condType:s.condType,duration:s.duration,condContent:s.condContent}];
    return;
  }
  const raw=Object.entries(s.exercises||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0)).map(([id,e])=>({...e,_id:id}));
  if(!raw.length){exs=[];return;}

  if(s.type==='campo'){
    exs=raw.map(e=>({...e,_type:'campo'}));
    return;
  }

  // Pesi / Sprint — handle complex groups
  const cgroups={};
  raw.forEach(e=>{if(e.complexGroup){if(!cgroups[e.complexGroup])cgroups[e.complexGroup]=[];cgroups[e.complexGroup].push(e);}});
  const seen=new Set();
  raw.forEach(e=>{
    if(!e.complexGroup){exs.push({...e,_type:'pesi'});}
    else if(!seen.has(e.complexGroup)){
      seen.add(e.complexGroup);
      exs.push({_type:'complex',_ckey:e.complexGroup,items:cgroups[e.complexGroup],rest:cgroups[e.complexGroup].slice(-1)[0]?.rest});
    }
  });

  // Init setData
  exs.forEach((ex,i)=>{
    setData[i]={};
    if(ex._type==='pesi'){
      for(let s=0;s<(parseInt(ex.sets)||3);s++) setData[i][s]={kg:'',rpe:null,done:false};
    } else if(ex._type==='complex'){
      ex.items.forEach((item,ci)=>{
        setData[i][ci]={};
        for(let s=0;s<(parseInt(item.sets)||4);s++) setData[i][ci][s]={kg:'',rpe:null,done:false};
      });
    }
  });
}

function render(){
  const ex=exs[cur];
  const isLast=cur===exs.length-1;
  const nb=document.getElementById('next-btn');
  nb.textContent=isLast?'COMPLETA ✓':'PROSSIMO →';
  nb.className='next-btn'+(isLast?' fin':'');
  document.getElementById('prev-btn').style.opacity=cur===0?'.3':'1';
  document.getElementById('pfill').style.width=`${(cur/Math.max(exs.length,1))*100}%`;

  if(!ex){document.getElementById('content').innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);">Nessun esercizio in questa sessione.</div>';return;}

  let html='';
  if(ex._type==='nota') html=renderNota(ex);
  else if(ex._type==='conditioning') html=renderCond(ex);
  else if(ex._type==='campo') html=renderCampo(ex,cur);
  else if(ex._type==='complex') html=renderComplex(ex,cur);
  else html=renderPesi(ex,cur);
  document.getElementById('content').innerHTML=html;
  if(ex._type==='conditioning')setupCondTimer();
  window.scrollTo(0,0);
}

// ── PESI
function renderPesi(ex,ei){
  const rm=best1rm[ex.name]||0;
  const pct=parseFloat(ex.pct)||0;
  const kgSug=rm>0&&pct>0?Math.round(rm*pct/100/2.5)*2.5:0;
  const sets=parseInt(ex.sets)||3;
  const sd=setData[ei]||{};
  const doneN=Object.values(sd).filter(s=>s.done).length;

  // Compute best e1rm from done sets
  let e1rm=0;
  for(let s=0;s<sets;s++){
    const d=sd[s];
    if(d?.done&&d?.kg){
      const est=Math.round(parseFloat(d.kg)*(1+parseFloat(ex.reps||1)/30));
      if(est>e1rm)e1rm=est;
    }
  }
  const isPR=e1rm>0&&e1rm>(best1rm[ex.name]||0);

  return `<div>
    <div class="ex-h">
      <div class="ex-num${doneN===sets&&sets>0?' done':doneN>0?' active':''}">${doneN===sets&&sets>0?'✓':ei+1}</div>
      <div><div class="ex-title">${ex.name}</div><div class="ex-params">${ex.sets||3} serie × ${ex.reps||'—'}${pct>0?` · @${pct}% 1RM`:''}${ex.rpe?` · RPE ${ex.rpe}`:''}</div></div>
    </div>
    ${ex.cue?`<div class="cue-box">💡 ${ex.cue}</div>`:''}
    ${kgSug>0?`<div class="sug-bar"><span class="sug-bar-lbl">Carico suggerito (${pct}%)</span><span class="sug-bar-kg">${kgSug}kg</span></div>`:''}
    <div class="sets-box">
      <div class="sets-head"><span>Set</span><span>Reps</span><span>Kg usati</span><span>RPE</span><span>✓</span></div>
      ${Array.from({length:sets},(_,s)=>{
        const d=sd[s]||{kg:'',rpe:null,done:false};
        const isCur=s===doneN&&!d.done;
        return `<div class="set-row${d.done?' done-row':isCur?' cur-row':''}">
          <span class="sn${d.done?' dk':''}">${s+1}</span>
          <span class="reps-cell">${ex.reps||'—'}</span>
          <input class="kg-inp${d.done?' dk':''}" type="number" inputmode="decimal" value="${d.kg}" placeholder="${kgSug||'—'}" id="kg-${ei}-${s}" oninput="setKg(${ei},${s},this.value)">
          <div class="rpe-wrap">${[6,7,8,9,10].map(r=>`<div class="rpe-d${d.rpe===r?' r'+r:''}" onclick="setRpe(${ei},${s},${r})"></div>`).join('')}</div>
          <button class="done-btn${d.done?' dk':''}" onclick="toggleDone(${ei},${s})">${d.done?'✓':''}</button>
        </div>`;
      }).join('')}
    </div>
    ${e1rm>0?`<div class="e1rm-row"><div class="e1rm-chip"><div class="e1rm-l">e1RM stimato</div><div class="e1rm-v">${e1rm}kg</div></div>${isPR?`<div class="pr-chip">🏆 PR!</div>`:''}</div>`:''}
    ${ex.rest?`<div style="font-size:11px;color:var(--muted);margin-top:8px;">⏱ Recupero: ${ex.rest}</div>`:''}
  </div>`;
}

// ── COMPLEX
function renderComplex(ex,ei){
  const sets=parseInt(ex.items[0]?.sets)||4;
  let html=`<div class="complex-hdr">🔁 Complex / Superset · ${sets} round · rec ${ex.rest||"3'"} dopo ogni round</div>`;
  ex.items.forEach((item,ci)=>{
    const rm=best1rm[item.name]||0;
    const pct=parseFloat(item.pct)||0;
    const kgSug=rm>0&&pct>0?Math.round(rm*pct/100/2.5)*2.5:0;
    const csd=setData[ei]?.[ci]||{};
    html+=`<div class="complex-item">
      <div class="ex-h">
        <div class="ex-num" style="background:rgba(251,113,74,.15);border-color:rgba(251,113,74,.3);color:var(--orange);">${item.complexLabel||`A${ci+1}`}</div>
        <div><div class="ex-title">${item.name}</div><div class="ex-params">${item.sets||4}×${item.reps||'—'}${pct>0?` @${pct}%`:''}</div></div>
      </div>
      ${item.cue?`<div class="cue-box">💡 ${item.cue}</div>`:''}
      ${kgSug>0?`<div class="sug-bar"><span class="sug-bar-lbl">Sugg. ${pct}%</span><span class="sug-bar-kg">${kgSug}kg</span></div>`:''}
      <div class="sets-box">
        <div class="sets-head"><span>Round</span><span>Reps</span><span>Kg</span><span>RPE</span><span>✓</span></div>
        ${Array.from({length:sets},(_,s)=>{
          const d=csd[s]||{kg:'',rpe:null,done:false};
          return `<div class="set-row${d.done?' done-row':''}">
            <span class="sn${d.done?' dk':''}">${s+1}</span>
            <span class="reps-cell">${item.reps||'—'}</span>
            <input class="kg-inp${d.done?' dk':''}" type="number" inputmode="decimal" value="${d.kg}" placeholder="${kgSug||'—'}" oninput="setCxKg(${ei},${ci},${s},this.value)">
            <div class="rpe-wrap">${[6,7,8,9,10].map(r=>`<div class="rpe-d${d.rpe===r?' r'+r:''}" onclick="setCxRpe(${ei},${ci},${s},${r})"></div>`).join('')}</div>
            <button class="done-btn${d.done?' dk':''}" onclick="toggleCxDone(${ei},${ci},${s})">${d.done?'✓':''}</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  return html;
}

// ── CAMPO
function renderCampo(ex,ei){
  const ck=campoChecked[ei]||false;
  const intCls={BASSA:'ib-bassa',MEDIA:'ib-media',ALTA:'ib-alta',MAX:'ib-max'};
  return `<div class="campo-item${ck?' ck':''}">
    ${ex.intensity?`<span class="int-badge ${intCls[ex.intensity]||'ib-media'}">${ex.intensity}</span>`:''}
    <div style="flex:1">
      <div class="campo-name">${ex.name}</div>
      <div class="campo-meta">${[ex.sets&&ex.sets+'×',ex.reps,ex.rest&&'rec '+ex.rest].filter(Boolean).join(' · ')}</div>
      ${ex.cue?`<div style="font-size:11px;color:var(--amber);margin-top:5px;">💡 ${ex.cue}</div>`:''}
    </div>
    <button class="campo-check${ck?' ck':''}" onclick="toggleCampo(${ei})">${ck?'✓':''}</button>
  </div>`;
}

// ── NOTA (sessione senza esercizi strutturati)
function renderNota(ex){
  return `<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--white);margin-bottom:8px;">${ex.name}</div>
    ${ex.note?`<div style="font-size:14px;color:var(--text);white-space:pre-line;line-height:1.6;">${ex.note}</div>`:''}
    <div style="margin-top:16px;font-size:12px;color:var(--muted);">Completa la seduta e registra il check-in.</div>
  </div>`;
}

// ── CONDITIONING
function renderCond(ex){
  return `<div class="cond-card">
    <span class="cond-badge">${ex.condType||'Conditioning'}</span>
    ${ex.duration?`<div style="font-size:12px;color:var(--muted);margin-bottom:6px;">${ex.duration}</div>`:''}
    <div class="cond-timer-big" id="cond-t">00:00</div>
    <div class="cond-btns">
      <button class="cond-btn cond-start" id="cond-toggle" onclick="toggleCond()">▶ Start</button>
      <button class="cond-btn cond-reset" onclick="resetCond()">Reset</button>
    </div>
    <div class="cond-content">${ex.condContent||'Nessun contenuto'}</div>
    ${ex.condType==='AMRAP'?`<div style="margin-top:8px;"><div style="font-size:11px;color:var(--muted);text-align:center;margin-bottom:6px;">Round completati</div><div class="rounds-ctrl"><button class="round-btn" onclick="adjR(-1)">−</button><div class="rounds-val" id="rounds-v">0</div><button class="round-btn" onclick="adjR(1)">+</button></div></div>`:''}
  </div>`;
}

function setupCondTimer(){condSecs=0;condRunning=false;condRounds=0;}
window.toggleCond=function(){
  condRunning=!condRunning;
  const el=document.getElementById('cond-toggle');
  if(el)el.textContent=condRunning?'⏸ Pausa':'▶ Start';
  if(condRunning){
    condIv=setInterval(()=>{
      condSecs++;
      const el=document.getElementById('cond-t');
      if(el)el.textContent=`${String(Math.floor(condSecs/60)).padStart(2,'0')}:${String(condSecs%60).padStart(2,'0')}`;
    },1000);
  } else clearInterval(condIv);
};
window.resetCond=function(){
  clearInterval(condIv);condRunning=false;condSecs=0;
  const el=document.getElementById('cond-t');if(el)el.textContent='00:00';
  const t=document.getElementById('cond-toggle');if(t)t.textContent='▶ Start';
};
window.adjR=function(d){condRounds=Math.max(0,condRounds+d);const el=document.getElementById('rounds-v');if(el)el.textContent=condRounds;};

// ── SET ACTIONS
window.setKg=function(ei,s,v){if(!setData[ei])setData[ei]={};if(!setData[ei][s])setData[ei][s]={};setData[ei][s].kg=v;};
window.setRpe=function(ei,s,r){if(!setData[ei][s])setData[ei][s]={};setData[ei][s].rpe=r;render();};
window.toggleDone=function(ei,s){
  const kg=document.getElementById(`kg-${ei}-${s}`)?.value;
  if(!setData[ei][s])setData[ei][s]={};
  if(kg)setData[ei][s].kg=kg;
  setData[ei][s].done=!setData[ei][s].done;
  // PR check
  if(setData[ei][s].done){
    const ex=exs[ei];
    const kg2=parseFloat(setData[ei][s].kg);
    if(kg2>0){
      const reps=parseFloat(ex.reps||1);
      const e1rm=Math.round(kg2*(1+reps/30));
      if(e1rm>(best1rm[ex.name]||0)){
        best1rm[ex.name]=e1rm;
        if(!newPRs.find(p=>p.name===ex.name))newPRs.push({name:ex.name,value:e1rm});
        toast(`🏆 PR! ${ex.name}: ${e1rm}kg e1RM`);
      }
    }
    // Auto rest
    const ex=exs[ei];
    const allDone=Object.values(setData[ei]).every(sd=>sd.done);
    const restSecs=parseRest(ex.rest);
    if(restSecs>0&&!allDone){
      const nextHint=s<(parseInt(ex.sets)||3)-1?`Serie ${s+2} — ${ex.name}`:ei<exs.length-1?`Prossimo: ${exs[ei+1].name||exs[ei+1].items?.[0]?.name||'—'}`:'Ultima serie!';
      startRest(restSecs,nextHint);
    }
  }
  render();
};
window.setCxKg=function(ei,ci,s,v){if(!setData[ei][ci])setData[ei][ci]={};if(!setData[ei][ci][s])setData[ei][ci][s]={};setData[ei][ci][s].kg=v;};
window.setCxRpe=function(ei,ci,s,r){if(!setData[ei][ci][s])setData[ei][ci][s]={};setData[ei][ci][s].rpe=r;render();};
window.toggleCxDone=function(ei,ci,s){
  if(!setData[ei][ci][s])setData[ei][ci][s]={};
  setData[ei][ci][s].done=!setData[ei][ci][s].done;
  const ex=exs[ei];
  const isLastItem=ci===ex.items.length-1;
  if(isLastItem&&setData[ei][ci][s].done){
    const restSecs=parseRest(ex.rest||"3'");
    if(restSecs>0)startRest(restSecs,`Round ${s+2} del complex`);
  }
  render();
};
window.toggleCampo=function(ei){campoChecked[ei]=!campoChecked[ei];render();};

// ── REST TIMER
function parseRest(str){
  if(!str)return 0;
  const m=str.match(/(\d+)['m]/);if(m)return parseInt(m[1])*60;
  const s=str.match(/(\d+)[\"s]/);if(s)return parseInt(s[1]);
  const n=str.match(/^\d+$/);if(n)return parseInt(n[0]);
  return 0;
}
function startRest(secs,hint=''){
  restTotal=secs;restLeft=secs;
  document.getElementById('rest-hint').innerHTML=hint?`Prossimo: <strong>${hint}</strong>`:'';
  document.getElementById('rest-ov').classList.remove('hidden');
  updateRest();
  clearInterval(restIv);
  restIv=setInterval(()=>{restLeft--;updateRest();if(restLeft<=0){clearInterval(restIv);skipRest();}},1000);
}
function updateRest(){
  const m=String(Math.floor(restLeft/60)).padStart(2,'0');
  const s=String(restLeft%60).padStart(2,'0');
  const el=document.getElementById('rest-num');
  const pf=document.getElementById('rest-pf');
  if(el){el.textContent=`${m}:${s}`;el.className='rest-num'+(restLeft<=10?' warn':'');}
  if(pf)pf.style.width=`${Math.max(0,restLeft/restTotal*100)}%`;
}
window.skipRest=function(){clearInterval(restIv);document.getElementById('rest-ov').classList.add('hidden');};

// ── NAVIGATION
window.nav=async function(dir){
  if(dir===1){
    if(cur<exs.length-1){cur++;render();}
    else await finishSession();
  } else {
    if(cur>0){cur--;render();}
  }
};

// ── FINISH
async function finishSession(){
  clearInterval(condIv);
  const dur=Math.round((Date.now()-startTs)/60000);
  const totalSets=Object.entries(setData).reduce((tot,[ei,sd])=>{
    if(typeof Object.values(sd||{})[0]==='object'){
      // Check if it's complex (nested)
      const firstVal=Object.values(sd)[0];
      if(firstVal&&typeof firstVal==='object'&&firstVal!==null&&'done' in firstVal){
        return tot+Object.values(sd).filter(s=>s.done).length;
      }
      return tot+Object.values(sd).reduce((t,csd)=>t+Object.values(csd||{}).filter(s=>s&&s.done).length,0);
    }
    return tot;
  },0);

  // Save session log
  await push(ref(db,`session_logs/${AID}`),{
    ts:Date.now(),
    progId:PROG,
    weekIdx:WEEK,
    sessId:SESS,
    sessName:session.name||'Sessione',
    duration:dur,
    totalSets,
    newPRs,
    condSecs:condSecs||0,
    condRounds:condRounds||0
  });

  // Save new PRs
  for(const pr of newPRs){
    const exSnap=await get(ref(db,`rm_exercises/${AID}`));
    const exObj=exSnap.val()||{};
    const exKey=Object.entries(exObj).find(([,e])=>e.name===pr.name)?.[0];
    if(exKey){
      await push(ref(db,`rm_records/${AID}/${exKey}`),{ts:Date.now(),date:new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'}),value:pr.value,type:'sessione',exName:pr.name});
    }
  }

  // Show done screen
  document.getElementById('sapp').style.display='none';
  const ds=document.getElementById('done-screen');
  ds.classList.add('show');
  document.getElementById('c-stats').innerHTML=`
    <div class="c-stat"><div class="c-stat-v">${dur}'</div><div class="c-stat-l">Durata</div></div>
    <div class="c-stat"><div class="c-stat-v">${totalSets}</div><div class="c-stat-l">Serie</div></div>
    <div class="c-stat"><div class="c-stat-v">${newPRs.length}</div><div class="c-stat-l">PR</div></div>`;
  if(newPRs.length){
    document.getElementById('pr-sec').style.display='block';
    document.getElementById('pr-list').innerHTML=newPRs.map(p=>`<div class="pr-item"><span class="pr-item-name">🏆 ${p.name}</span><span class="pr-item-val">${p.value}kg</span></div>`).join('');
  }
}

function toast(msg){const t=document.getElementById('tlive');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
function err(msg){document.getElementById('loading').style.display='none';document.body.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;font-family:sans-serif;color:#EEF2FF;text-align:center;padding:20px;background:#0A0E17;"><div style="font-size:40px">⚠️</div><div>${msg}</div><a href="javascript:history.back()" style="color:#06D6A0;margin-top:8px;">← Indietro</a></div>`;}
</script>
</body>
</html>
